# ── Docker Compose Override — Local Development ──────────────────────
#
# Applied automatically by `docker compose` when `docker-compose.yml`
# is present. Adds dev-friendly defaults:
#   • Bind mounts for hot-reload (cloud-server source)
#   • Higher log levels (RUST_LOG=debug)
#   • Exposed debug ports
#
# To disable: rename this file or set COMPOSE_FILE=docker-compose.yml

services:
  pos-cloud-server:
    environment:
      # Verbose logging for development
      RUST_LOG: "${RUST_LOG:-debug,hyper=info,reqwest=info,tower=info}"
    # Mount local source for faster iteration (requires rebuild)
    # Uncomment to mount the local binary:
    # volumes:
    #   - ./target/release/oz-cloud-server:/app/oz-cloud-server

  license-server:
    environment:
      # More verbose PocketBase logging
      PB_LOG_LEVEL: "${PB_LOG_LEVEL:-debug}"
