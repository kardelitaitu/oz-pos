  </g>
  <g fill="#000000" font-family="'DM Sans', 'Inter', Arial, sans-serif" font-weight="500">
    <text x="118" y="92" font-size="18" letter-spacing="4" text-transform="uppercase">POINT OF SALE</text>
  </g>
</svg>
