# ── Android Build Pipeline ─────────────────────────────────────────────
#
# Builds a signed Android APK + AAB for the OZ-POS tablet client.
#
# Triggered by:
#   - Push to main (verifies the build compiles)
#   - Tag v* (creates a release artifact)
#   - Manual workflow_dispatch
#
# Secrets required:
#   ANDROID_KEYSTORE_BASE64  — base64-encoded .keystore file
#   KEYSTORE_PASSWORD        — keystore master password
#   KEY_PASSWORD             — key password (defaults to KEYSTORE_PASSWORD)
#   KEY_ALIAS                — key alias in the keystore

name: Android Build

# ⚠️ Stub — disabled on push/PR until the NDK toolchain is fully
# stabilised. Run manually via workflow_dispatch or tag push (v*)
# when a release build is needed.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  android-build:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # ── JDK + Android SDK ──────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Rust toolchain ─────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: mozilla/sccache-action@v0.0.10

      # ── Node / UI dependencies ─────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'

      - name: Install UI dependencies
        run: cd ui && npm ci --no-audit --no-fund

      - name: Build UI (tablet)
        run: cd ui && npx vite build --config vite.tablet.config.ts

      # ── Install cargo-ndk + Tauri CLI ──────────────────────────
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # ── Initialize Android project ─────────────────────────────
      - name: Initialize Tauri Android project
        run: |
          cd apps/tablet-client
          cargo tauri android init

      # ── Decode keystore ────────────────────────────────────────
      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > apps/tablet-client/oz-pos.keystore

      # ── Build APK + AAB ────────────────────────────────────────
      - name: Build Android APK
        run: |
          cd apps/tablet-client
          cargo tauri android build --apk --target aarch64 \
            ${TAURI_ANDROID_KEYSTORE_PASSWORD:+--keystore-password "$TAURI_ANDROID_KEYSTORE_PASSWORD"} \
            ${TAURI_ANDROID_KEY_PASSWORD:+--key-password "$TAURI_ANDROID_KEY_PASSWORD"}
        env:
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      # ── Locate output files ────────────────────────────────────
      - name: Find APK output
        run: |
          find apps/tablet-client/gen/android -name "*.apk" -o -name "*.aab" 2>/dev/null | head -20

      # ── Upload APK artifact ────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: oz-pos-tablet-aarch64.apk
          path: |
            apps/tablet-client/gen/android/app/build/outputs/apk/**/*.apk
            apps/tablet-client/gen/android/app/build/outputs/bundle/**/*.aab
          retention-days: 90

      # ── sccache stats ──────────────────────────────────────────
      - name: sccache stats
        run: sccache --show-stats
