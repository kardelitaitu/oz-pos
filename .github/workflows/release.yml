name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev pkg-config

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --workspace --all-features

      - name: UI lint & test
        run: |
          cd ui
          npm ci --no-audit --no-fund
          npm run lint
          npm run typecheck
          npm run test

  build:
    name: Build (${{ matrix.os }})
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle_args: --bundles deb,appimage
            artifact_name: oz-pos_linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_args: --bundles msi,nsis
            artifact_name: oz-pos_windows
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle_args: --bundles dmg
            artifact_name: oz-pos_macos

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri -> target

      - name: Install Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev pkg-config

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'

      - name: Build UI
        run: |
          cd ui
          npm ci --no-audit --no-fund
          npm run build

      - name: Build Tauri app
        run: |
          cd src-tauri
          cargo tauri build ${{ matrix.bundle_args }} --target ${{ matrix.target }}

      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p artifacts
          cp -v src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb artifacts/ 2>/dev/null || true
          cp -v src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage artifacts/ 2>/dev/null || true

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Get-ChildItem -Path "src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi" | Copy-Item -Destination artifacts/
          Get-ChildItem -Path "src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe" | Copy-Item -Destination artifacts/

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p artifacts
          cp -v src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg artifacts/ 2>/dev/null || true

      - name: Generate update metadata
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "{\"version\": \"$VERSION\", \"notes\": \"See the GitHub release for details.\", \"pub_date\": \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\", \"platforms\": {}}" > artifacts/latest.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Generate release body
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > release-body.md << 'EOF'
          ## OZ-POS ${{ github.ref_name }}

          ### Downloads
          | Platform | File |
          |----------|------|
          | Windows (MSI) | `oz-pos_windows/*.msi` |
          | Windows (NSIS) | `oz-pos_windows/*.exe` |
          | Linux (.deb) | `oz-pos_linux/*.deb` |
          | Linux (AppImage) | `oz-pos_linux/*.AppImage` |
          | macOS (DMG) | `oz-pos_macos/*.dmg` |

          ### Install
          - **Windows**: Run the MSI or NSIS installer.
          - **Linux**: `sudo dpkg -i oz-pos_*.deb` or run the AppImage directly.
          - **macOS**: Open the DMG and drag OZ-POS to Applications.

          ### Updating
          Auto-update is supported. The app will check for updates on launch.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OZ-POS ${{ github.ref_name }}
          body_path: release-body.md
          draft: true
          prerelease: false
          files: |
            dist-artifacts/*
