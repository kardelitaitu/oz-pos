# ── Release Pipeline ────────────────────────────────────────────────────
#
# Triggers on tag push (v*). Builds all release targets and publishes
# artifacts to GitHub Releases.
#
# Jobs:
#   1. release-build — desktop + tablet + Docker + UI bundle
#   2. release-publish — create GitHub Release with all artifacts

name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  release-build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: desktop-linux
            os: ubuntu-latest
            binary: oz-pos-app
          - target: desktop-windows
            os: windows-latest
            binary: oz-pos-app.exe
          - target: docker-cloud
            os: ubuntu-latest
            binary: docker
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: mozilla/sccache-action@v0.0.10

      - name: Install system deps (Linux)
        if: runner.os == 'Linux' && matrix.target != 'docker-cloud'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev libudev-dev pkg-config

      - name: Build desktop binary (Linux)
        if: matrix.target == 'desktop-linux'
        run: cargo build --release -p oz-pos-app

      - name: Build desktop binary (Windows)
        if: matrix.target == 'desktop-windows'
        run: cargo build --release -p oz-pos-app

      - name: Build Docker image
        if: matrix.target == 'docker-cloud'
        run: |
          docker build -f Dockerfile.server -t oz-pos-cloud:${{ github.ref_name }} .
          docker save oz-pos-cloud:${{ github.ref_name }} -o oz-pos-cloud.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            target/release/${{ matrix.binary }}
            oz-pos-cloud.tar
          retention-days: 30

  release-publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: release-build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*
