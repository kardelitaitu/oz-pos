name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev pkg-config

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --workspace --all-features

      - name: Docker build & size check
        run: |
          docker build -f Dockerfile.server -t oz-pos-cloud:release .
          SIZE=$(docker run --rm --entrypoint stat oz-pos-cloud:release --format=%s /app/oz-cloud-server)
          MAX=$((50 * 1024 * 1024))
          echo "Binary size: $SIZE bytes ($((SIZE / 1024 / 1024)) MB)"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "Binary size $SIZE exceeds 50 MB limit"
            exit 1
          fi
          echo "Binary size check passed"

      - name: UI lint & test
        run: |
          cd ui
          npm ci --no-audit --no-fund
          npm run lint
          npm run typecheck
          # Tee the test output so the i18n quality gate below can
          # grep for Fluent `Attempt to override an existing message`
          # warnings and the [i18n] translation-completeness warnings
          # on stderr. Fluent prints the former when two .ftl files
          # in the same joined bundle define the same key; the
          # latter are emitted by the translation gate in
          # ui/src/__tests__/i18nBundle.test.tsx.
          npm run test -- --reporter=verbose 2>&1 | tee ui/vitest-output.log

      # ── i18n quality gate (mirrors `.github/workflows/ci.yml#ui`) ────
      #
      # Same single-block consolidation as PR CI: catches both
      # `[i18n]` translation-completeness warnings and Fluent
      # duplicate-key warnings in one decision. Output is
      # categorized so contributors see exactly which class of
      # issue needs fixing.
      - name: i18n quality gate
        
        if: always()
        run: bash scripts/lint-i18n.sh