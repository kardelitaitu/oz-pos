# ── Nightly Full-Matrix CI ──────────────────────────────────────────
#
# Runs every day at 3 AM UTC. Covers the full test matrix that is too
# expensive to run on every PR:
#   • Complete Rust test suite (all features, Linux + Windows + macOS)
#   • All 4 UI test shards
#   • All 3 E2E test shards with Docker Compose
#   • Rust doc generation
#   • Release builds (desktop: Linux + Windows + macOS, tablet: Android)
#   • Benchmarks with regression comparison
#
# Also triggerable manually via workflow_dispatch.

name: Nightly CI

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  SCCACHE_GHA_ENABLED: "true"

jobs:
  # ── Rust: Test Full (all features, cross-platform) ───────────────
  rust-test:
    name: Rust Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev libudev-dev pkg-config
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install librsvg pkg-config 2>/dev/null || true
      - uses: mozilla/sccache-action@v0.0.10
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Run workspace tests (nextest, all features)
        run: cargo nextest run --workspace --all-features --exclude oz-pos-app --exclude oz-pos-tablet --profile ci
      - name: sccache stats
        run: sccache --show-stats

  # ── Rust: Doc generation ─────────────────────────────────────────
  rust-doc:
    name: Rust Doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev libudev-dev pkg-config
      - uses: mozilla/sccache-action@v0.0.10
      - name: Build docs (workspace, no deps)
        run: cargo doc --workspace --no-deps --all-features --exclude oz-pos-app --exclude oz-pos-tablet 2>&1 | tee cargo-doc-output.log
      - name: Count doc warnings
        run: |
          WARNINGS=$(grep -c "warning:" cargo-doc-output.log 2>/dev/null || echo 0)
          echo "Doc warnings: $WARNINGS"
          echo "DOC_WARNINGS=$WARNINGS" >> $GITHUB_ENV
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-docs
          path: target/doc/
          retention-days: 7

  # ── UI: Tests (4-way sharded) ────────────────────────────────────
  ui-test:
    name: UI Tests (shard ${{ matrix.shard }}/${{ matrix.totalShards }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        totalShards: [4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'
      - uses: actions/cache@v4
        with:
          path: ui/node_modules/.cache/vitest
          key: vitest-cache-nighty-${{ runner.os }}-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: vitest-cache-nighty-${{ runner.os }}-
      - run: cd ui && npm ci --no-audit --no-fund
      - name: Run vitest (shard ${{ matrix.shard }}/${{ matrix.totalShards }})
        run: (cd ui && npm run test -- --reporter=verbose --shard=${{ matrix.shard }}/${{ matrix.totalShards }} --pool=forks 2>&1) | tee ui/vitest-output.log
      - name: Gate on act() / flushSync warnings
        if: always()
        run: |
          if grep -E 'Warning: (An update to .* was not wrapped in act|flushSync was called from inside)' ui/vitest-output.log; then
            echo "::warning::vitest emitted act() or flushSync warnings — see ui/vitest-output.log"
            head -50 ui/vitest-output.log || true
          else
            echo "No act() or flushSync warnings detected."
          fi
      - name: i18n quality gate (shard 1 only)
        if: always() && matrix.shard == 1
        run: bash scripts/lint-i18n.sh

  # ── E2E Tests (Playwright) ───────────────────────────────────────
  e2e:
    name: E2E Tests (shard ${{ matrix.shard }}/${{ matrix.totalShards }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
        totalShards: [3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev libudev-dev pkg-config
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: mozilla/sccache-action@v0.0.10
      - name: Install UI dependencies
        run: cd ui && npm ci --no-audit --no-fund
      - name: Install Playwright browsers
        run: cd ui && npx playwright install chromium --with-deps
      - name: Docker layer cache (GHCR)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin 2>/dev/null || true
          docker pull ghcr.io/${{ github.repository }}/oz-pos-cloud:e2e 2>/dev/null || true
          export DOCKER_BUILDKIT=1
          docker compose -f docker-compose.e2e.yml build --build-arg BUILDKIT_INLINE_CACHE=1 2>&1 | tail -3
      - name: Start Docker E2E backend & Vite dev server (parallel)
        env:
          OZ_API_SECRET: ci-test-secret
        run: |
          docker compose -f docker-compose.e2e.yml up -d
          cd ui && npm run dev &
          VITE_PID=$!
          echo "VITE_PID=$VITE_PID" >> $GITHUB_ENV
          DOCKER_READY=false
          VITE_READY=false
          for i in $(seq 1 45); do
            if [ "$DOCKER_READY" != "true" ] && curl -sf http://localhost:3099/api/v1/health > /dev/null 2>&1; then
              echo "Docker backend ready (attempt $i)"
              DOCKER_READY=true
            fi
            if [ "$VITE_READY" != "true" ] && curl -sf http://localhost:1420 > /dev/null 2>&1; then
              echo "Vite dev server ready (attempt $i)"
              VITE_READY=true
            fi
            if [ "$DOCKER_READY" = "true" ] && [ "$VITE_READY" = "true" ]; then
              echo "Both servers ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 45 ]; then
              echo "::error::Server startup timed out"
              docker compose -f docker-compose.e2e.yml logs e2e-cloud-server --tail=50 2>/dev/null || true
              exit 1
            fi
            sleep 2
          done
      - name: Run E2E tests (shard ${{ matrix.shard }}/${{ matrix.totalShards }})
        run: |
          cd ui && npx playwright test --config e2e/playwright.config.ts --project=desktop --shard=${{ matrix.shard }}/${{ matrix.totalShards }} 2>&1 | tee e2e-output.log
      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-shard-${{ matrix.shard }}
          path: ui/e2e-results/
          retention-days: 7
      - name: Upload Playwright trace
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-traces-shard-${{ matrix.shard }}
          path: ui/test-results/
          retention-days: 7
      - name: Stop Docker E2E backend
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  # ── Release: Desktop (Linux AppImage) ────────────────────────────
  release-desktop-linux:
    name: Release Desktop (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev libudev-dev pkg-config
      - uses: mozilla/sccache-action@v0.0.10
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked
      - name: Install UI dependencies
        run: cd ui && npm ci --no-audit --no-fund
      - name: Build desktop (Linux)
        run: cd apps/desktop-client && cargo tauri build --bundles appimage
      - name: Upload desktop (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: oz-pos-desktop-linux.AppImage
          path: apps/desktop-client/target/release/bundle/appimage/*.AppImage
          retention-days: 7
      - name: sccache stats
        run: sccache --show-stats

  # ── Release: Desktop (Windows MSI) ───────────────────────────────
  release-desktop-windows:
    name: Release Desktop (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: mozilla/sccache-action@v0.0.10
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked
      - name: Install UI dependencies
        run: cd ui && npm ci --no-audit --no-fund
      - name: Build desktop (Windows)
        run: cd apps/desktop-client && cargo tauri build --bundles msi
      - name: Upload desktop (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: oz-pos-desktop-windows.msi
          path: apps/desktop-client/target/release/bundle/msi/*.msi
          retention-days: 7
      - name: sccache stats
        run: sccache --show-stats

  # ── Release: Desktop (macOS DMG) ─────────────────────────────────
  release-desktop-macos:
    name: Release Desktop (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install macOS dependencies
        run: |
          brew install librsvg pkg-config 2>/dev/null || true
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: mozilla/sccache-action@v0.0.10
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked
      - name: Install UI dependencies
        run: cd ui && npm ci --no-audit --no-fund
      - name: Build desktop (macOS)
        run: cd apps/desktop-client && cargo tauri build --bundles dmg
      - name: Upload desktop (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: oz-pos-desktop-macos.dmg
          path: apps/desktop-client/target/release/bundle/dmg/*.dmg
          retention-days: 7
      - name: sccache stats
        run: sccache --show-stats

  # ── Release: Tablet (Android APK) ────────────────────────────────
  release-tablet-android:
    name: Release Tablet (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: mozilla/sccache-action@v0.0.10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'
      - name: Install UI dependencies
        run: cd ui && npm ci --no-audit --no-fund
      - name: Build UI (tablet)
        run: cd ui && npx vite build --config vite.tablet.config.ts
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked
      - name: Initialize Tauri Android project
        run: |
          cd apps/tablet-client
          cargo tauri android init
      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > apps/tablet-client/oz-pos.keystore
      - name: Build Android APK
        run: |
          cd apps/tablet-client
          cargo tauri android build --apk --target aarch64 \
            ${TAURI_ANDROID_KEYSTORE_PASSWORD:+--keystore-password "$TAURI_ANDROID_KEYSTORE_PASSWORD"} \
            ${TAURI_ANDROID_KEY_PASSWORD:+--key-password "$TAURI_ANDROID_KEY_PASSWORD"}
        env:
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      - name: Find APK output
        run: |
          find apps/tablet-client/gen/android -name "*.apk" -o -name "*.aab" 2>/dev/null | head -20
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: oz-pos-tablet-aarch64.apk
          path: |
            apps/tablet-client/gen/android/app/build/outputs/apk/**/*.apk
            apps/tablet-client/gen/android/app/build/outputs/bundle/**/*.aab
          retention-days: 14
      - name: sccache stats
        run: sccache --show-stats

  # ── Benchmarks ───────────────────────────────────────────────────
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: mozilla/sccache-action@v0.0.10
      - name: Run cargo bench (oz-core)
        run: cargo bench -p oz-core -- --output-format bencher 2>&1 | tee benchmark-output.txt
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-output.txt
            target/criterion/
          retention-days: 30
      - name: sccache stats
        run: sccache --show-stats
