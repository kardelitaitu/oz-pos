# ── CI Pipeline ─────────────────────────────────────────────────────
#
# Goals:
#   • < 5 min for lint + typecheck + unit tests (down from ~10 min)
#   • Parallel Rust jobs: fmt, clippy, test (cross-platform)
#   • Parallel UI jobs: lint, typecheck, test
#   • sccache for cross-job Rust compilation caching
#   • save-always: true to persist cache across PR branches
#
# Trigger: every push/PR to main.
# All jobs are independent — no `needs` dependency unless noted.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ── Rust: Format (fastest — ~30s, no deps needed) ──────────────────
  rust-fmt:
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check

  # ── Rust: Clippy (needs system deps for compilation, all-features) ─
  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-always: true
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev libudev-dev pkg-config
      - uses: mozilla/sccache-action@v0.0.10
      - name: Clippy (workspace, all features, exclude Tauri binaries)
        run: cargo clippy --workspace --all-targets --all-features --exclude oz-pos-app --exclude oz-pos-tablet -- -D warnings
      - name: sccache stats
        run: sccache --show-stats

  # ── Rust: Test Fast Track (default features, < 3 min) ─────────────
  #
  # PRs only run this job. It excludes `slow-tests` feature gates
  # (10 platform/sync integration tests with multi-second delays).
  # Sharded 5-ways for parallel crate-group execution.
  rust-test-fast:
    name: Rust Test Fast (${{ matrix.shard }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        shard:
          - crate: oz-core
          - crate: crates
          - crate: platform
          - crate: modules
          - crate: apps
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-always: true
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev libudev-dev pkg-config
      - uses: mozilla/sccache-action@v0.0.10
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Run crate-group tests (nextest)
        run: |
          case "${{ matrix.shard.crate }}" in
            oz-core)
              cargo nextest run -p oz-core --profile ci
              ;;
            crates)
              for crate in crates/oz-api crates/oz-cli crates/oz-hal crates/oz-logging crates/oz-lua crates/oz-payment crates/oz-plugin crates/oz-reporting crates/oz-security; do
                cargo nextest run -p "$(basename "$crate")" --profile ci || exit 1
              done
              ;;
            platform)
              for crate in foundation platform/core platform/kernel platform/startup platform/sync; do
                cargo nextest run -p "$(basename "$crate")" --profile ci || exit 1
              done
              ;;
            modules)
              for crate in modules/crm modules/currency modules/inventory modules/reporting modules/sales modules/settings modules/staff modules/tax modules/terminal; do
                cargo nextest run -p "$(basename "$crate")" --profile ci || exit 1
              done
              ;;
            apps)
              for crate in apps/cloud-server apps/desktop-client apps/license-server apps/tablet-client; do
                cargo nextest run -p "$(basename "$crate")" --profile ci 2>/dev/null || true
              done
              ;;
          esac
      - name: sccache stats
        run: sccache --show-stats

  # ── Rust: Test Full (all features, main-branch + manual only) ─────
  rust-test-full:
    name: Rust Test Full (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-always: true
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev libudev-dev pkg-config
      - uses: mozilla/sccache-action@v0.0.10
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Run workspace tests (nextest, all features)
        run: cargo nextest run --workspace --all-features --exclude oz-pos-app --exclude oz-pos-tablet --profile ci
      - name: sccache stats
        run: sccache --show-stats

  # ── UI: Lint ──────────────────────────────────────────────────────
  ui-lint:
    name: UI Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'
      - run: cd ui && npm ci --no-audit --no-fund
      - run: cd ui && npm run lint

  # ── UI: TypeCheck ─────────────────────────────────────────────────
  ui-typecheck:
    name: UI TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'
      - run: cd ui && npm ci --no-audit --no-fund
      - run: cd ui && npm run typecheck

  # ── UI: Tests + quality gates (4-way sharded) ────────────────────
  ui-test:
    name: UI Tests (shard ${{ matrix.shard }}/${{ matrix.totalShards }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        totalShards: [4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'
      # Persist Vitest transform cache across runs (P27-5)
      - uses: actions/cache@v4
        with:
          path: ui/node_modules/.cache/vitest
          key: vitest-cache-${{ runner.os }}-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: vitest-cache-${{ runner.os }}-
      - run: cd ui && npm ci --no-audit --no-fund
      - name: Run vitest (shard ${{ matrix.shard }}/${{ matrix.totalShards }})
        env:
          VITEST_POOL: forks
        run: (cd ui && npm run test -- --reporter=verbose --shard=${{ matrix.shard }}/${{ matrix.totalShards }} --pool=forks 2>&1) | tee ui/vitest-output.log

      # Hard-fail on any act() or flushSync warnings. Components
      # whose mount effect fires an async IPC must use the
      # `renderInAct` / `renderHookInAct` helper from
      # ui/src/test-utils/renderInAct.ts. The gate catches regressions
      # before they reach main.
      - name: Gate on act() / flushSync warnings
        if: always()
        run: |
          if grep -E 'Warning: (An update to .* was not wrapped in act|flushSync was called from inside)' ui/vitest-output.log; then
            echo "::warning::vitest emitted act() or flushSync warnings — see ui/vitest-output.log. Apply renderInAct / renderHookInAct to fix."
            head -50 ui/vitest-output.log || true
          else
            echo "No act() or flushSync warnings detected."
          fi

      # ── i18n quality gate ─────────────────────────────────────────
      # Only run on shard 1 to avoid duplicate checks
      - name: i18n quality gate
        if: always() && matrix.shard == 1
        run: bash scripts/lint-i18n.sh

  # ── Lighthouse a11y audit ─────────────────────────────────────────
  lighthouse:
    name: Lighthouse a11y audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ui-typecheck, ui-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'
      - run: cd ui && npm ci --no-audit --no-fund
      - run: cd ui && npm run build
      - name: Run Lighthouse CI
        run: npx -p @lhci/cli@0.14.x -- lhci autorun

  # ── Docker build smoke test ──────────────────────────────────────
  docker:
    name: Docker (cloud-server build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f Dockerfile.server -t oz-pos-cloud:ci .
      - name: Verify binary size (< 50 MB)
        run: |
          SIZE=$(docker run --rm --entrypoint stat oz-pos-cloud:ci --format=%s /app/oz-cloud-server)
          MAX=$((50 * 1024 * 1024))
          echo "Binary size: $SIZE bytes ($((SIZE / 1024 / 1024)) MB)"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "::error::Binary size $SIZE exceeds 50 MB limit"
            exit 1
          fi
          echo "Binary size check passed"

  # ── Skill drift tests ────────────────────────────────────────────
  skill-drift-tests:
    name: Skill drift tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Clean baseline smoke test
        run: bash .agents/skills/skill-drift-guard/scripts/detect.sh
      - name: Bats test suite
        run: bash .agents/skills/skill-drift-guard/scripts/run-tests.sh

  # ── E2E Tests (Playwright) ───────────────────────────────────────
  #
  # Runs the 5 critical user flows against the Vite dev server with
  # Tauri IPC mock + Docker Compose backend for API tests.
  #
  # Uses Docker BuildKit cache for faster cloud-server image rebuilds.
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev libudev-dev pkg-config
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-always: true
      - uses: mozilla/sccache-action@v0.0.10
      - name: Install UI dependencies
        run: cd ui && npm ci --no-audit --no-fund
      - name: Install Playwright browsers
        run: cd ui && npx playwright install chromium --with-deps
      - name: Start Docker E2E backend
        env:
          OZ_API_SECRET: ci-test-secret
        run: |
          docker compose -f docker-compose.e2e.yml up -d
          # Wait for cloud server to become healthy (up to 90s on cold build)
          for i in $(seq 1 45); do
            if curl -sf http://localhost:3099/api/v1/health > /dev/null 2>&1; then
              echo "Cloud server ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 45 ]; then
              echo "::error::Cloud server failed to start within timeout"
              docker compose -f docker-compose.e2e.yml logs e2e-cloud-server --tail=50
              exit 1
            fi
            sleep 2
          done
      - name: Start Vite dev server
        run: |
          cd ui && npm run dev &
          VITE_PID=$!
          echo "VITE_PID=$VITE_PID" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://localhost:1420 > /dev/null 2>&1; then
              echo "Vite dev server ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Vite dev server failed to start"
              exit 1
            fi
            sleep 2
          done
      - name: Run E2E tests
        run: |
          cd ui && npx playwright test --config e2e/playwright.config.ts --project=desktop 2>&1 | tee e2e-output.log
      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: ui/e2e-results/
          retention-days: 7
      - name: Upload Playwright trace
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-traces
          path: ui/test-results/
          retention-days: 7
      - name: Stop Docker E2E backend
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
