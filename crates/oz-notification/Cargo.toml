[package]
name = "oz-notification"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "WhatsApp Cloud API notification client for OZ-POS — template messaging, media support, webhook verification, and mock driver for testing."

[dependencies]
oz-core = { workspace = true }
foundation = { workspace = true }
