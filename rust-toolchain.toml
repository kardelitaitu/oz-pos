# Rust toolchain pin for OZ-POS.
#
# This file enforces the project's minimum-supported Rust version (MSRV).
# The workspace uses edition = "2024" and the `rust-version` field in
# Cargo.toml is set to "1.85", so this file pins every contributor
# (and CI) to the same toolchain.
#
# - `channel = "1.85.0"` matches the MSRV exactly. Bump this when the
#   MSRV is raised (and update `[workspace.package].rust-version` in
#   Cargo.toml to match).
# - `components` includes the tools `project-scaffold` and the CI matrix
#   call out as mandatory: `rustfmt` and `clippy`.
# - `profile = "minimal"` skips rust-docs and rust-src to keep installs
#   fast. Add `rust-docs` if a contributor needs offline doc rendering.

[toolchain]
channel = "1.85.0"
components = ["rustfmt", "clippy"]
profile = "minimal"
