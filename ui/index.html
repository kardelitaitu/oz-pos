<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OZ-POS</title>

    <!-- Favicon & PWA icons (legacy + modern browser support) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#10b981" />

    <!-- Restore saved theme before first paint to prevent theme flash. -->
    <script>
      (function() {
        var theme = null;
        try { theme = localStorage.getItem('oz-pos-theme-v4'); } catch(e) {}
        if (theme === 'light' || theme === 'dark') {
          document.documentElement.setAttribute('data-theme', theme);
        }
      })();
    </script>

    <!-- Inline theme base styles so the first paint already has the correct background and text color. -->
    <style>
      :root {
        color-scheme: dark;
        accent-color: #5a9fd4;
      }
      html[data-theme="dark"] { color-scheme: dark; }
      html[data-theme="light"] { color-scheme: light; }

      html, body {
        background: radial-gradient(ellipse at 50% -10%, #132540 0%, #07111d 60%, #040a12 100%);
        color: #f0f6ff;
        margin: 0;
        padding: 0;
        min-height: 100dvh;
      }

      /* Light theme override (applied via data-theme attribute or OS preference) */
      html[data-theme="light"] {
        background: linear-gradient(160deg, #f8fafc 0%, #f1f5f9 50%, #eef2f6 100%);
        color: #1e293b;
      }

      @media (prefers-color-scheme: light) {
        html, body {
          background: linear-gradient(160deg, #f8fafc 0%, #f1f5f9 50%, #eef2f6 100%);
          color: #1e293b;
        }
      }
      #root { min-height: 100dvh; }
    </style>

    <!-- Google Font: Inter (variable weight). Preconnect for fast origin fetch. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
