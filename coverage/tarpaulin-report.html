ours. Defaults to 24 if omitted.\n    pub expiry_hours: Option\u003ci64\u003e,\n}\n\n#[derive(Serialize)]\npub struct CreateTokenResponse {\n    pub token: TokenResponse,\n}\n\npub async fn create_token_handler(\n    Json(body): Json\u003cCreateTokenRequest\u003e,\n) -\u003e impl IntoResponse {\n    let resp = create_token(\u0026body.label, body.expiry_hours);\n    Json(CreateTokenResponse { token: resp })\n}\n","traces":[{"line":27,"address":[],"length":0,"stats":{"Line":360287970189639681}},{"line":30,"address":[],"length":0,"stats":{"Line":1441151880758558720}},{"line":31,"address":[],"length":0,"stats":{"Line":360287970189639680}}],"covered":3,"coverable":3},{"path":["C:","\\","My Script","oz-pos","crates","oz-cli","src","error.rs"],"content":"//! Error type for the `oz-cli` binary.\r\n\r\nuse thiserror::Error;\r\n\r\n/// Errors that can originate in the `oz` command-line tool.\r\n#[derive(Debug, Error)]\r\n#[non_exhaustive]\r\npub enum CliError {\r\n    /// A subcommand returned a non-zero status.\r\n    #[error(\"subcommand `{0}` failed: {1}\")]\r\n    Subcommand(\u0026'static str, String),\r\n\r\n    /// The local database could not be opened.\r\n    #[error(\"could not open database: {0}\")]\r\n    OpenDatabase(#[from] rusqlite::Error),\r\n\r\n    /// Bad command-line arguments.\r\n    #[error(\"invalid arguments: {0}\")]\r\n    Args(String),\r\n}\r\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","My Script","oz-pos","crates","oz-cli","src","lib.rs"],"content":"//! Command-line tools for OZ-POS — migrations, backup, export, smoke tests.\r\n//!\r\n//! `oz-cli` is a binary crate (see `src/main.rs`) that exposes the\r\n//! maintenance operations a merchant or operator runs from a terminal:\r\n//! - `oz migrate` — apply SQL migrations\r\n//! - `oz backup` — snapshot the local SQLite store\r\n//! - `oz export` — write a CSV report\r\n//! - `oz smoke` — run a self-test against the local stack\r\n//!\r\n//! The library side of the crate (this file) holds the shared error\r\n//! type so both `main.rs` and the subcommand modules can use it.\r\n\r\n#![deny(unsafe_code)]\r\n#![warn(missing_docs)]\r\n\r\npub mod error;\r\n\r\npub use error::CliError;\r\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","My Script","oz-pos","crates","oz-cli","src","main.rs"],"content":"//! `oz` — OZ-POS command-line tool.\r\n//!\r\n//! Subcommands:\r\n//! - `oz migrate` — apply pending SQL migrations\r\n//! - `oz init-db` — seed the database with default settings + feature preset\r\n//! - `oz product list` — list all products\r\n//! - `oz product get \u003csku\u003e` — show a product by SKU\r\n//! - `oz product create \u003csku\u003e \u003cname\u003e \u003cprice\u003e` — create a new product\r\n//! - `oz product update \u003csku\u003e \u003cname\u003e \u003cprice\u003e` — update an existing product\r\n//! - `oz product delete \u003csku\u003e` — delete a product\r\n//! - `oz backup` — snapshot the local SQLite store (scaffold)\r\n//! - `oz export` — write a CSV report (scaffold)\r\n\r\nuse std::str::FromStr;\r\n\r\nuse anyhow::{Context, Result};\r\nuse clap::{Args, CommandFactory, Parser, Subcommand};\r\nuse rusqlite::Connection;\r\n\r\nuse oz_core::db::Store;\r\nuse oz_core::{CoreError, Currency, FeatureRegistry, Money, Settings, SaleStatus};\r\n\r\n// ── CLI structure ─────────────────────────────────────────────────────\r\n\r\n/// OZ-POS command-line tool.\r\n#[derive(Debug, Parser)]\r\n#[command(name = \"oz\", version, about = \"OZ-POS maintenance and migration CLI\")]\r\nstruct Cli {\r\n    /// Path to the SQLite database (default: ./oz-pos.db).\r\n    #[arg(short, long, global = true, default_value = \"oz-pos.db\")]\r\n    db: String,\r\n\r\n    #[command(subcommand)]\r\n    command: Option\u003cCommand\u003e,\r\n}\r\n\r\n#[derive(Debug, Subcommand)]\r\nenum Command {\r\n    /// Apply pending SQL migrations to the database.\r\n    Migrate,\r\n    /// Seed the database with default settings and feature flags.\r\n    InitDb(InitDbArgs),\r\n    /// Manage products (list, get, create, update, delete).\r\n    Product(ProductArgs),\r\n    /// Snapshot the local SQLite store to a backup file.\r\n    Backup {\r\n        /// Destination path for the backup file.\r\n        #[arg(short, long)]\r\n        output: String,\r\n    },\r\n    /// Write a CSV report for the given time window (scaffold).\r\n    Export {\r\n        /// Report kind (e.g. `daily-summary`, `sales-by-hour`).\r\n        kind: String,\r\n    },\r\n    /// Manage categories (list, get, create, delete).\r\n    Category(CategoryArgs),\r\n    /// Manage inventory (get, adjust).\r\n    Inventory(InventoryArgs),\r\n    /// Manage sales (list, get, update-status).\r\n    Sale(SaleArgs),\r\n    /// Manage customers (list, get, create).\r\n    Customer(CustomerArgs),\r\n    /// Manage users (list, get, create).\r\n    User(UserArgs),\r\n}\r\n\r\n#[derive(Debug, Args)]\r\nstruct CustomerArgs {\r\n    #[command(subcommand)]\r\n    action: CustomerAction,\r\n}\r\n\r\n#[derive(Debug, Subcommand)]\r\nenum CustomerAction {\r\n    /// List all customers.\r\n    List,\r\n    /// Show a customer by id.\r\n    Get {\r\n        /// Customer id.\r\n        id: String,\r\n    },\r\n    /// Create a new customer.\r\n    Create {\r\n        /// Display name.\r\n        name: String,\r\n        /// Email address.\r\n        #[arg(long)]\r\n        email: Option\u003cString\u003e,\r\n        /// Phone number.\r\n        #[arg(long)]\r\n        phone: Option\u003cString\u003e,\r\n        /// Free-form notes.\r\n        #[arg(long)]\r\n        notes: Option\u003cString\u003e,\r\n    },\r\n}\r\n\r\n#[derive(Debug, Args)]\r\nstruct UserArgs {\r\n    #[command(subcommand)]\r\n    action: UserAction,\r\n}\r\n\r\n#[derive(Debug, Subcommand)]\r\nenum UserAction {\r\n    /// List all users.\r\n    List,\r\n    /// Show a user by id.\r\n    Get {\r\n        /// User id.\r\n        id: String,\r\n    },\r\n    /// Create a new user.\r\n    Create {\r\n        /// Login username.\r\n        username: String,\r\n        /// Hashed PIN/password.\r\n        pin_hash: String,\r\n        /// Display name shown on the POS UI.\r\n        display_name: String,\r\n        /// Role id (e.g. \"role-owner\", \"role-cashier\").\r\n        role_id: String,\r\n    },\r\n}\r\n\r\n#[derive(Debug, Args)]\r\nstruct CategoryArgs {\r\n    #[command(subcommand)]\r\n    action: CategoryAction,\r\n}\r\n\r\n#[derive(Debug, Subcommand)]\r\nenum CategoryAction {\r\n    /// List all categories.\r\n    List,\r\n    /// Show a category by id.\r\n    Get {\r\n        /// Category id.\r\n        id: String,\r\n    },\r\n    /// Create a new category.\r\n    Create {\r\n        /// Unique category id (e.g. \"cat-drinks\").\r\n        id: String,\r\n        /// Display name.\r\n        name: String,\r\n        /// Hex colour (e.g. \"#06b6d4\").\r\n        colour: String,\r\n    },\r\n    /// Delete a category by id.\r\n    Delete {\r\n        /// Category id.\r\n        id: String,\r\n    },\r\n}\r\n\r\n#[derive(Debug, Args)]\r\nstruct InventoryArgs {\r\n    #[command(subcommand)]\r\n    action: InventoryAction,\r\n}\r\n\r\n#[derive(Debug, Subcommand)]\r\nenum InventoryAction {\r\n    /// Show current stock for a product by SKU.\r\n    Get {\r\n        /// Product SKU.\r\n        sku: String,\r\n    },\r\n    /// Adjust stock for a product by SKU (e.g. +10 to restock, -3 to sell).\r\n    Adjust {\r\n        /// Product SKU.\r\n        sku: String,\r\n        /// Signed delta (e.g. +10 or -3).\r\n        delta: i64,\r\n    },\r\n}\r\n\r\n#[derive(Debug, Args)]\r\nstruct SaleArgs {\r\n    #[command(subcommand)]\r\n    action: SaleAction,\r\n}\r\n\r\n#[derive(Debug, Subcommand)]\r\nenum SaleAction {\r\n    /// List all sales (most recent first).\r\n    List,\r\n    /// Show a sale by id.\r\n    Get {\r\n        /// Sale UUID.\r\n        id: String,\r\n        /// Output format (default: text, or \"json\").\r\n        #[arg(long, default_value = \"text\")]\r\n        format: String,\r\n    },\r\n    /// Transition a sale to a new status.\r\n    UpdateStatus {\r\n        /// Sale UUID.\r\n        id: String,\r\n        /// New status (pending, active, completed, voided).\r\n        status: String,\r\n    },\r\n}\r\n\r\n#[derive(Debug, Args)]\r\nstruct InitDbArgs {\r\n    /// Feature preset to apply (simple-retail, restaurant, full-store, custom).\r\n    #[arg(long, default_value = \"simple-retail\")]\r\n    preset: String,\r\n}\r\n\r\n#[derive(Debug, Args)]\r\nstruct ProductArgs {\r\n    #[command(subcommand)]\r\n    action: ProductAction,\r\n}\r\n\r\n#[derive(Debug, Subcommand)]\r\nenum ProductAction {\r\n    /// List all products.\r\n    List,\r\n    /// Show a product by SKU.\r\n    Get {\r\n        /// Product SKU.\r\n        sku: String,\r\n    },\r\n    /// Create a new product.\r\n    Create {\r\n        /// Unique product SKU.\r\n        sku: String,\r\n        /// Display name.\r\n        name: String,\r\n        /// Price in minor units (e.g. 350 for $3.50).\r\n        price: i64,\r\n        /// ISO-4217 currency code (default: USD).\r\n        #[arg(long, default_value = \"USD\")]\r\n        currency: String,\r\n    },\r\n    /// Update an existing product by SKU.\r\n    Update {\r\n        /// Product SKU to update.\r\n        sku: String,\r\n        /// New display name.\r\n        name: String,\r\n        /// New price in minor units.\r\n        price: i64,\r\n        /// ISO-4217 currency code (default: USD).\r\n        #[arg(long, default_value = \"USD\")]\r\n        currency: String,\r\n        /// New category id (or empty to clear).\r\n        #[arg(long)]\r\n        category_id: Option\u003cString\u003e,\r\n        /// New barcode (or empty to clear).\r\n        #[arg(long)]\r\n        barcode: Option\u003cString\u003e,\r\n    },\r\n    /// Delete a product by SKU.\r\n    Delete {\r\n        /// Product SKU to delete.\r\n        sku: String,\r\n    },\r\n}\r\n\r\n// ── Entry point ───────────────────────────────────────────────────────\r\n\r\nfn main() -\u003e Result\u003c()\u003e {\r\n    let cli = Cli::parse();\r\n\r\n    // Open connection (shared by most commands).\r\n    let conn = open_db(\u0026cli.db)?;\r\n\r\n    match cli.command {\r\n        Some(Command::Migrate) =\u003e run_migrate(conn),\r\n        Some(Command::InitDb(args)) =\u003e run_init_db(\u0026conn, \u0026args),\r\n        Some(Command::Product(args)) =\u003e run_product(\u0026conn, args),\r\n        Some(Command::Backup { output }) =\u003e run_backup(\u0026conn, \u0026output),\r\n        Some(Command::Export { kind }) =\u003e run_export(\u0026conn, \u0026kind),\r\n        Some(Command::Category(args)) =\u003e run_category(\u0026conn, args),\r\n        Some(Command::Inventory(args)) =\u003e run_inventory(\u0026conn, args),\r\n        Some(Command::Sale(args)) =\u003e run_sale(\u0026conn, args),\r\n        Some(Command::Customer(args)) =\u003e run_customer(\u0026conn, args),\r\n        Some(Command::User(args)) =\u003e run_user(\u0026conn, args),\r\n        None =\u003e {\r\n            let mut cmd = Cli::command();\r\n            cmd.print_help()?;\r\n            println!();\r\n            Ok(())\r\n        }\r\n    }\r\n}\r\n\r\n// ── DB helpers ────────────────────────────────────────────────────────\r\n\r\nfn open_db(path: \u0026str) -\u003e Result\u003cConnection\u003e {\r\n    let conn =\r\n        Connection::open(path).with_context(|| format!(\"opening database at {path}\"))?;\r\n    conn.pragma_update(None, \"foreign_keys\", \"ON\")\r\n        .context(\"enabling foreign_keys\")?;\r\n    conn.pragma_update(None, \"journal_mode\", \"WAL\")\r\n        .context(\"enabling WAL\")?;\r\n    Ok(conn)\r\n}\r\n\r\n// ── Migrate ──────────────────────────────────────────────────────────\r\n\r\nfn run_migrate(conn: Connection) -\u003e Result\u003c()\u003e {\r\n    eprintln!(\"applying migrations...\");\r\n    let mut conn = conn;\r\n    oz_core::migrations::run(\u0026mut conn).context(\"applying migrations\")?;\r\n    eprintln!(\"migrations up to date\");\r\n    Ok(())\r\n}\r\n\r\n// ── Init-DB ──────────────────────────────────────────────────────────\r\n\r\n/// Seed the database with default settings and a feature preset.\r\nfn run_init_db(conn: \u0026Connection, args: \u0026InitDbArgs) -\u003e Result\u003c()\u003e {\r\n    eprintln!(\"seeding database with preset: {}\", args.preset);\r\n\r\n    let store = Store::new(conn);\r\n\r\n    // --- Default settings ---\r\n    Settings::set_store_name(conn, \"My Store\").context(\"setting store name\")?;\r\n    Settings::set_default_currency(conn, \"USD\").context(\"setting default currency\")?;\r\n    Settings::set(conn, oz_core::settings::keys::SETUP_COMPLETE, \"true\")\r\n        .context(\"marking setup complete\")?;\r\n\r\n    // --- Feature preset ---\r\n    let registry = match args.preset.as_str() {\r\n        \"simple-retail\" =\u003e FeatureRegistry::simple_retail(),\r\n        \"restaurant\" =\u003e FeatureRegistry::restaurant(),\r\n        \"full-store\" =\u003e FeatureRegistry::full_store(),\r\n        \"custom\" =\u003e FeatureRegistry::custom(),\r\n        other =\u003e {\r\n            eprintln!(\"unknown preset '{other}'; using custom (no features enabled)\");\r\n            FeatureRegistry::custom()\r\n        }\r\n    };\r\n\r\n    let feature_count = registry.count();\r\n    store\r\n        .save_features(\u0026registry)\r\n        .context(\"saving feature flags\")?;\r\n    eprintln!(\"  enabled {feature_count} feature(s)\");\r\n\r\n    // --- ISO-4217 Currencies ---\r\n    eprintln!(\"  seeding currencies...\");\r\n    conn.execute_batch(\r\n        \"INSERT OR IGNORE INTO currencies (code, numeric_code, name, minor_exponent, symbol) VALUES\r\n            ('USD', '840', 'US Dollar',               2, '$'),\r\n            ('EUR', '978', 'Euro',                    2, '\\u{20ac}'),\r\n            ('GBP', '826', 'British Pound',           2, '\\u{a3}'),\r\n            ('JPY', '392', 'Japanese Yen',            0, '\\u{a5}'),\r\n            ('CAD', '124', 'Canadian Dollar',         2, 'CA$'),\r\n            ('AUD', '036', 'Australian Dollar',       2, 'A$'),\r\n            ('CHF', '756', 'Swiss Franc',             2, 'Fr'),\r\n            ('CNY', '156', 'Chinese Yuan',            2, '\\u{5143}'),\r\n            ('INR', '356', 'Indian Rupee',            2, '\\u{20b9}'),\r\n            ('BRL', '986', 'Brazilian Real',          2, 'R$'),\r\n            ('MXN', '484', 'Mexican Peso',            2, 'Mex$'),\r\n            ('KRW', '410', 'South Korean Won',        0, '\\u{20a9}'),\r\n            ('SEK', '752', 'Swedish Krona',           2, 'kr'),\r\n            ('NOK', '578', 'Norwegian Krone',         2, 'kr'),\r\n            ('DKK', '208', 'Danish Krone',            2, 'kr'),\r\n            ('NZD', '554', 'New Zealand Dollar',      2, 'NZ$'),\r\n            ('SGD', '702', 'Singapore Dollar',        2, 'S$'),\r\n            ('HKD', '344', 'Hong Kong Dollar',        2, 'HK$'),\r\n            ('MYR', '458', 'Malaysian Ringgit',       2, 'RM'),\r\n            ('THB', '764', 'Thai Baht',               2, '\\u{e3f}'),\r\n            ('PHP', '608', 'Philippine Peso',         2, '\\u{20b1}'),\r\n            ('IDR', '360', 'Indonesian Rupiah',       0, 'Rp'),\r\n            ('VND', '704', 'Vietnamese Dong',         0, '\\u{20ab}'),\r\n            ('ZAR', '710', 'South African Rand',      2, 'R'),\r\n            ('RUB', '643', 'Russian Ruble',           2, '\\u{20bd}'),\r\n            ('TRY', '949', 'Turkish Lira',            2, '\\u{20ba}'),\r\n            ('SAR', '682', 'Saudi Riyal',             2, '\\u{fdfc}'),\r\n            ('AED', '784', 'UAE Dirham',              2, '\\u{62f}.\\u{625}'),\r\n            ('ILS', '376', 'Israeli Shekel',          2, '\\u{20aa}'),\r\n            ('PLN', '985', 'Polish Zloty',            2, 'z\\u{142}'),\r\n            ('CZK', '203', 'Czech Koruna',            2, 'K\\u{10d}'),\r\n            ('HUF', '348', 'Hungarian Forint',        0, 'Ft'),\r\n            ('CLP', '152', 'Chilean Peso',            0, 'CLP$'),\r\n            ('COP', '170', 'Colombian Peso',          2, 'COL$'),\r\n            ('PEN', '604', 'Peruvian Sol',            2, 'S/'),\r\n            ('ARS', '032', 'Argentine Peso',          2, 'AR$'),\r\n            ('NGN', '566', 'Nigerian Naira',          2, '\\u{20a6}'),\r\n            ('KES', '404', 'Kenyan Shilling',         2, 'KSh'),\r\n            ('EGP', '818', 'Egyptian Pound',          2, '\\u{a3}');\",\r\n    )\r\n    .context(\"seeding currencies\")?;\r\n\r\n    // --- Default Roles ---\r\n    eprintln!(\"  seeding roles...\");\r\n    conn.execute_batch(\r\n        \"INSERT OR IGNORE INTO roles (id, name, description, permissions) VALUES\r\n            ('role-owner',   'owner',   'Full access to all features and settings',\r\n             '[\\\"*\\\"]'),\r\n            ('role-manager', 'manager', 'Can manage products, categories, and view reports',\r\n             '[\\\"products:crud\\\",\\\"categories:manage\\\",\\\"sales:void\\\",\\\"reports:view\\\"]'),\r\n            ('role-cashier', 'cashier', 'Can process sales and manage the daily register',\r\n             '[\\\"sales:process\\\",\\\"sales:view\\\",\\\"customers:view\\\"]');\",\r\n    )\r\n    .context(\"seeding roles\")?;\r\n\r\n    // --- Admin User ---\r\n    eprintln!(\"  seeding admin user...\");\r\n    conn.execute(\r\n        \"INSERT OR IGNORE INTO users (id, username, pin_hash, display_name, role_id) VALUES (?1, ?2, ?3, ?4, ?5)\",\r\n        rusqlite::params![\"user-admin\", \"admin\", \"hashed_pin_placeholder\", \"Admin\", \"role-owner\"],\r\n    )\r\n    .context(\"seeding admin user\")?;\r\n\r\n    eprintln!(\"database initialised successfully\");\r\n    Ok(())\r\n}\r\n\r\n// ── Backup / Export ────────────────────────────────────────────────────\r\n\r\n/// Create an online SQLite snapshot of the database.\r\nfn run_backup(conn: \u0026Connection, output: \u0026str) -\u003e Result\u003c()\u003e {\r\n    let store = Store::new(conn);\r\n    eprintln!(\"creating backup -\u003e {output}...\");\r\n    store\r\n        .backup(output)\r\n        .with_context(|| format!(\"backup to {output}\"))?;\r\n    eprintln!(\"backup complete\");\r\n    Ok(())\r\n}\r\n\r\n/// Write a CSV report to stdout for the given kind.\r\nfn run_export(conn: \u0026Connection, kind: \u0026str) -\u003e Result\u003c()\u003e {\r\n    let store = Store::new(conn);\r\n\r\n    match kind {\r\n        \"daily-summary\" =\u003e {\r\n            let rows = store.export_daily_summary()?;\r\n            let mut wtr = csv::Writer::from_writer(std::io::stdout());\r\n            for r in \u0026rows {\r\n                wtr.serialize(r)?;\r\n            }\r\n            wtr.flush()?;\r\n        }\r\n        \"sales-by-hour\" =\u003e {\r\n            let rows = store.export_sales_by_hour()?;\r\n            let mut wtr = csv::Writer::from_writer(std::io::stdout());\r\n            for r in \u0026rows {\r\n                wtr.serialize(r)?;\r\n            }\r\n            wtr.flush()?;\r\n        }\r\n        other =\u003e {\r\n            eprintln!(\"unknown export kind '{other}'\");\r\n            eprintln!(\"available kinds: daily-summary, sales-by-hour\");\r\n            std::process::exit(1);\r\n        }\r\n    }\r\n\r\n    Ok(())\r\n}\r\n\r\n// ── Category commands ────────────────────────────────────────────────────\r\n\r\nfn run_category(conn: \u0026Connection, args: CategoryArgs) -\u003e Result\u003c()\u003e {\r\n    let store = Store::new(conn);\r\n\r\n    match args.action {\r\n        CategoryAction::List =\u003e run_category_list(\u0026store),\r\n        CategoryAction::Get { id } =\u003e run_category_get(\u0026store, \u0026id),\r\n        CategoryAction::Create { id, name, colour } =\u003e {\r\n            run_category_create(\u0026store, \u0026id, \u0026name, \u0026colour)\r\n        }\r\n        CategoryAction::Delete { id } =\u003e run_category_delete(\u0026store, \u0026id),\r\n    }\r\n}\r\n\r\nfn run_category_list(store: \u0026Store\u003c'_\u003e) -\u003e Result\u003c()\u003e {\r\n    let categories = store.list_categories().context(\"listing categories\")?;\r\n\r\n    if categories.is_empty() {\r\n        println!(\"No categories found.\");\r\n        return Ok(());\r\n    }\r\n\r\n    println!(\"{:\u003c24} {:\u003c24}  Colour\", \"ID\", \"Name\");\r\n    println!(\"{:-\u003c24} {:-\u003c24}  {:-}\", \"\", \"\", \"\");\r\n\r\n    for c in \u0026categories {\r\n        println!(\"{:\u003c24} {:\u003c24}  {}\", c.id, c.name, c.colour);\r\n    }\r\n\r\n    Ok(())\r\n}\r\n\r\nfn run_category_get(store: \u0026Store\u003c'_\u003e, id: \u0026str) -\u003e Result\u003c()\u003e {\r\n    match store.get_category(id).context(\"looking up category\")? {\r\n        Some(c) =\u003e {\r\n            println!(\"ID:     {}\", c.id);\r\n            println!(\"Name:   {}\", c.name);\r\n            println!(\"Colour: {}\", c.colour);\r\n        }\r\n        None =\u003e {\r\n            println!(\"Category not found: {id}\");\r\n        }\r\n    }\r\n    Ok(())\r\n}\r\n\r\nfn run_category_create(store: \u0026Store\u003c'_\u003e, id: \u0026str, name: \u0026str, colour: \u0026str) -\u003e Result\u003c()\u003e {\r\n    match store.create_category(id, name, colour) {\r\n        Ok(cat) =\u003e {\r\n            println!(\"Created category: {} ({})\", cat.name, cat.id);\r\n        }\r\n        Err(CoreError::Validation { message, .. }) =\u003e {\r\n            eprintln!(\"Validation error: {message}\");\r\n            std::process::exit(1);\r\n        }\r\n        Err(CoreError::Conflict { entity, field }) =\u003e {\r\n            eprintln!(\"Conflict: {entity} already exists ({field})\");\r\n            std::process::exit(1);\r\n        }\r\n        Err(e) =\u003e {\r\n            eprintln!(\"Error: {e}\");\r\n            std::process::exit(1);\r\n        }\r\n    }\r\n    Ok(())\r\n}\r\n\r\nfn run_category_delete(store: \u0026Store\u003c'_\u003e, id: \u0026str) -\u003e Result\u003c()\u003e {\r\n    match store.delete_category(id) {\r\n        Ok(()) =\u003e {\r\n            println!(\"Deleted category: {id}\");\r\n        }\r\n        Err(CoreError::NotFound { .. }) =\u003e {\r\n            eprintln!(\"Category not found: {id}\");\r\n            std::process::exit(1);\r\n        }\r\n        Err(e) =\u003e {\r\n            eprintln!(\"Error: {e}\");\r\n            std::process::exit(1);\r\n        }\r\n    }\r\n    Ok(())\r\n}\r\n\r\n// ── Inventory commands ──────────────────────────────────────────────────\r\n\r\nfn run_inventory(conn: \u0026Connection, args: InventoryArgs) -\u003e Result\u003c()\u003e {\r\n    let store = Store::new(conn);\r\n\r\n    match args.action {\r\n        InventoryAction::Get { sku } =\u003e run_inventory_get(\u0026store, \u0026sku),\r\n        InventoryAction::Adjust { sku, delta } =\u003e run_inventory_adjust(\u0026store, \u0026sku, delta),\r\n    }\r\n}\r\n\r\nfn run_inventory_get(store: \u0026Store\u003c'_\u003e, sku: \u0026str) -\u003e Result\u003c()\u003e {\r\n    let product = store.get_product(sku).context(\"looking up product\")?;\r\n\r\n    match product {\r\n        Some(p) =\u003e {\r\n            let qty = p.stock_qty.unwrap_or(0);\r\n            println!(\"SKU:    {}\", p.product.sku.as_str());\r\n            println!(\"Name:   {}\", p.product.name);\r\n            println!(\"Stock:  {qty}\");\r\n        }\r\n        None =\u003e {\r\n            println!(\"Product not found: {sku}\");\r\n        }\r\n    }\r\n\r\n    Ok(())\r\n}\r\n\r\nfn run_inventory_adjust(store: \u0026Store\u003c'_\u003e, sku: \u0026str, delta: i64) -\u003e Result\u003c()\u003e {\r\n    match store.adjust_stock(sku, delta) {\r\n        Ok(new_qty) =\u003e {\r\n            let verb = if delta \u003e= 0 { \"restocked\" } else { \"sold\" };\r\n            println!(\r\n                \"Stock {verb} for {sku} (delta: {delta:+}) — new qty: {new_qty}\"\r\n            );\r\n        }\r\n        Err(CoreError::NotFound { .. }) =\u003e {\r\n            eprintln!(\"Product not found: {sku}\");\r\n            std::process::exit(1);\r\n        }\r\n        Err(CoreError::Validation { message, .. }) =\u003e {\r\n            eprintln!(\"Validation error: {message}\");\r\n            std::process::exit(1);\r\n        }\r\n        Err(e) =\u003e {\r\n            eprintln!(\"Error: {e}\");\r\n            std::process::exit(1);\r\n        }\r\n    }\r\n\r\n    Ok(())\r\n}\r\n\r\n// ── Sale commands ──────────────────────────────────────────────────────\r\n\r\nfn run_sale(conn: \u0026Connection, args: SaleArgs) -\u003e Result\u003c()\u003e {\r\n    let store = Store::new(conn);\r\n\r\n    match args.action {\r\n        SaleAction::List =\u003e run_sale_list(\u0026store),\r\n        SaleAction::Get { id, format } =\u003e run_sale_get(\u0026store, \u0026id, \u0026format),\r\n        SaleAction::UpdateStatus { id, status } =\u003e run_sale_update_status(\u0026store, \u0026id, \u0026status),\r\n    }\r\n}\r\n\r\nfn run_sale_list(store: \u0026Store\u003c'_\u003e) -\u003e Result\u003c()\u003e {\r\n    let sales = store.list_sales().context(\"listing sales\")?;\r\n\r\n    if sales.is_empty() {\r\n        println!(\"No sales found.\");\r\n        return Ok(());\r\n    }\r\n\r\n    println!(\"{:\u003c40} {:\u003e10} {:\u003e6}  {:\u003e10}  Date\", \"ID\", \"Total\", \"Items\", \"Status\");\r\n    println!(\"{:-\u003c40} {:-\u003e10} {:-\u003e6}  {:-\u003e10}  {:-\u003c4}\", \"\", \"\", \"\", \"\", \"\");\r\n\r\n    for s in \u0026sales {\r\n        let total_str = format!(\r\n            \"{}.{:02}\",\r\n            s.total.minor_units / 100,\r\n            s.total.minor_units.abs() % 100,\r\n        );\r\n        let status_str = match s.status {\r\n            SaleStatus::Pending =\u003e \"pending\",\r\n            SaleStatus::Active =\u003e \"active\",\r\n            SaleStatus::Completed =\u003e \"done\",\r\n            SaleStatus::Voided =\u003e \"voided\",\r\n        };\r\n        // Show only date portion of ISO-8601 timestamp.\r\n        let date_str = s.created_at.as_str();\r\n        let date_str = if date_str.len() \u003e 10 { \u0026date_str[..10] } else { date_str };\r\n        println!(\"{:\u003c40} {:\u003e10} {:\u003e6}  {:\u003e10}  {}\", s.id, total_str, s.line_count, status_str, date_str);\r\n    }\r\n\r\n    Ok(())\r\n}\r\n\r\nfn run_sale_get(store: \u0026Store\u003c'_\u003e, id: \u0026str, format: \u0026str) -\u003e Result\u003c()\u003e {\r\n    match store.get_sale(id).context(\"looking up sale\")? {\r\n        Some(sale) =\u003e {\r\n            if format == \"json\" {\r\n                let json = serde_json::to_string_pretty(\u0026sale)\r\n                    .context(\"serializing sale to JSON\")?;\r\n                println!(\"{json}\");\r\n            } else {\r\n                let total_str = format!(\r\n                    \"{}.{:02} {}\",\r\n                    sale.total.minor_units / 100,\r\n                    sale.total.minor_units.abs() % 100,\r\n                    std::str::from_utf8(\u0026sale.currency.0).unwrap_or(\"???\"),\r\n                );\r\n                println!(\"ID:           {}\", sale.id);\r\n                println!(\"Status:       {:?}\", sale.status);\r\n                println!(\"Total:        {}\", total_str);\r\n                println!(\"Line count:   {}\", sale.line_count);\r\n                println!(\"Currency:     {}\", std::str::from_utf8(\u0026sale.currency.0).unwrap_or(\"???\"));\r\n                println!(\"Created:      {}\", sale.created_at);\r\n                println!(\"Updated:      {}\", sale.updated_at);\r\n\r\n                if !sale.lines.is_empty() {\r\n                    println!();\r\n                    println!(\"{:\u003c4} {:\u003c24} {:\u003e6} {:\u003e10}\", \"#\", \"SKU\", \"Qty\", \"Unit\");\r\n                    println!(\"{:-\u003c4} {:-\u003c24} {:-\u003e6} {:-\u003e10}\", \"\", \"\", \"\", \"\");\r\n                    for line in \u0026sale.lines {\r\n                        let unit_str = format!(\r\n                            \"{}.{:02}\",\r\n                            line.unit_price.minor_units / 100,\r\n                            line.unit_price.minor_units.abs() % 100,\r\n                        );\r\n                        println!(\"{:\u003c4} {:\u003c24} {:\u003e6} {:\u003e10}\", line.line_position, line.sku, line.qty, unit_str);\r\n                    }\r\n                }\r\n            }\r\n        }\r\n        None =\u003e {\r\n            if format == \"json\" {\r\n                println!(\"null\");\r\n            } else {\r\n                println!(\"Sale not found: {id}\");\r\n            }\r\n        }\r\n    }\r\n\r\n    Ok(())\r\n}\r\n\r\nfn run_sale_update_status(store: \u0026Store\u003c'_\u003e, id: \u0026str, status_str: \u0026str) -\u003e Result\u003c()\u003e {\r\n    let to = SaleStatus::from_stored_str(status_str).ok_or_else(|| {\r\n        anyhow::anyhow!(\r\n            \"invalid status '{status_str}'; expected one of: pending, active, completed, voided\"\r\n        )\r\n    })?;\r\n\r\n    match store.update_sale_status(id, to) {\r\n        Ok(sale) =\u003e {\r\n            println!(\"Sale {id} status updated to {:?}\", sale.status);\r\n        }\r\n        Err(CoreError::NotFound { .. }) =\u003e {\r\n            eprintln!(\"Sale not found: {id}\");\r\n            std::process::exit(1);\r\n        }\r\n        Err(CoreError::Validation { message, .. }) =\u003e {\r\n            eprintln!(\"Validation error: {message}\");\r\n            std::process::exit(1);\r\n        }\r\n        Err(e) =\u003e {\r\n            eprintln!(\"Error: {e}\");\r\n            std::process::exit(1);\r\n        }\r\n    }\r\n\r\n    Ok(())\r\n}\r\n\r\n// ── Customer commands ──────────────────────────────────────────────────\r\n\r\nfn run_customer(conn: \u0026Connection, args: CustomerArgs) -\u003e Result\u003c()\u003e {\r\n    let store = Store::new(conn);\r\n\r\n    match args.action {\r\n        CustomerAction::List =\u003e run_customer_list(\u0026store),\r\n        CustomerAction::Get { id } =\u003e run_customer_get(\u0026store, \u0026id),\r\n        CustomerAction::Create { name, email, phone, notes } =\u003e {\r\n            run_customer_create(\u0026store, \u0026name, email.as_deref(), phone.as_deref(), notes.as_deref())\r\n        }\r\n    }\r\n}\r\n\r\nfn run_customer_list(store: \u0026Store\u003c'_\u003e) -\u003e Result\u003c()\u003e {\r\n    let customers = store.list_customers().context(\"listing customers\")?;\r\n\r\n    if customers.is_empty() {\r\n        println!(\"No customers found.\");\r\n        return Ok(());\r\n    }\r\n\r\n    println!(\"{:\u003c40} {:\u003c24} {:\u003c30} {:\u003c16}\", \"ID\", \"Name\", \"Email\", \"Phone\");\r\n    println!(\"{:-\u003c40} {:-\u003c24} {:-\u003c30} {:-\u003c16}\", \"\", \"\", \"\", \"\");\r\n\r\n    for c in \u0026customers {\r\n        let email = c.email.as_deref().unwrap_or(\"-\");\r\n        let phone = c.phone.as_deref().unwrap_or(\"-\");\r\n        println!(\"{:\u003c40} {:\u003c24} {:\u003c30} {:\u003c16}\", c.id, c.name, email, phone);\r\n    }\r\n\r\n    Ok(())\r\n}\r\n\r\nfn run_customer_get(store: \u0026Store\u003c'_\u003e, id: \u0026str) -\u003e Result\u003c()\u003e {\r\n    match store.get_customer(id).context(\"looking up customer\")? {\r\n        Some(c) =\u003e {\r\n            println!(\"ID:      {}\", c.id);\r\n            println!(\"Name:    {}\", c.name);\r\n            println!(\"Email:   {}\", c.email.as_deref().unwrap_or(\"(none)\"));\r\n            println!(\"Phone:   {}\", c.phone.as_deref().unwrap_or(\"(none)\"));\r\n            println!(\"Points:  {}\", c.loyalty_points);\r\n            println!(\"Spent:   {} {}\", c.total_spent_minor, c.currency);\r\n            println!(\"Notes:   {}\", c.notes);\r\n            println!(\"Created: {}\", c.created_at);\r\n            println!(\"Updated: {}\", c.updated_at);\r\n        }\r\n        None =\u003e {\r\n            println!(\"Customer not found: {id}\");\r\n        }\r\n    }\r\n    Ok(())\r\n}\r\n\r\nfn run_customer_create(\r\n    store: \u0026Store\u003c'_\u003e,\r\n    name: \u0026str,\r\n    email: Option\u003c\u0026str\u003e,\r\n    phone: Option\u003c\u0026str\u003e,\r\n    notes: Option\u003c\u0026str\u003e,\r\n) -\u003e Result\u003c()\u003e {\r\n    match store.create_customer(name, email, phone, notes) {\r\n        Ok(c) =\u003e {\r\n            println!(\"Created customer: {} ({})\", c.name, c.id);\r\n        }\r\n        Err(CoreError::Validation { message, .. }) =\u003e {\r\n            eprintln!(\"Validation error: {message}\");\r\n            std::process::exit(1);\r\n        }\r\n        Err(e) =\u003e {\r\n            eprintln!(\"Error: {e}\");\r\n            std::process::exit(1);\r\n        }\r\n    }\r\n    Ok(())\r\n}\r\n\r\n// ── User commands ──────────────────────────────────────────────────────\r\n\r\nfn run_user(conn: \u0026Connection, args: UserArgs) -\u003e Result\u003c()\u003e {\r\n    let store = Store::new(conn);\r\n\r\n    match args.action {\r\n        UserAction::List =\u003e run_user_list(\u0026store),\r\n        UserAction::Get { id } =\u003e run_user_get(\u0026store, \u0026id),\r\n        UserAction::Create {\r\n            username,\r\n            pin_hash,\r\n            display_name,\r\n            role_id,\r\n        } =\u003e run_user_create(\u0026store, \u0026username, \u0026pin_hash, \u0026display_name, \u0026role_id),\r\n    }\r\n}\r\n\r\nfn run_user_list(store: \u0026Store\u003c'_\u003e) -\u003e Result\u003c()\u003e {\r\n    let users = store.list_users().context(\"listing users\")?;\r\n\r\n    if users.is_empty() {\r\n        println!(\"No users found.\");\r\n        return Ok(());\r\n    }\r\n\r\n    println!(\"{:\u003c40} {:\u003c16} {:\u003c24} {:\u003c12} Active\", \"ID\", \"Username\", \"Display Name\", \"Role\");\r\n    println!(\"{:-\u003c40} {:-\u003c16} {:-\u003c24} {:-\u003c12} {:-}\", \"\", \"\", \"\", \"\", \"\");\r\n\r\n    for u in \u0026users {\r\n        let active = if u.is_active { \"yes\" } else { \"no\" };\r\n        println!(\"{:\u003c40} {:\u003c16} {:\u003c24} {:\u003c12} {}\", u.id, u.username, u.display_name, u.role_id, active);\r\n    }\r\n\r\n    Ok(())\r\n}\r\n\r\nfn run_user_get(store: \u0026Store\u003c'_\u003e, id: \u0026str) -\u003e Result\u003c()\u003e {\r\n    match store.get_user(id).context(\"looking up user\")? {\r\n        Some(u) =\u003e {\r\n            println!(\"ID:       {}\", u.id);\r\n            println!(\"Username: {}\", u.username);\r\n            println!(\"Name:     {}\", u.display_name);\r\n            println!(\"Role:     {}\", u.role_id);\r\n            println!(\"Active:   {}\", if u.is_active { \"yes\" } else { \"no\" });\r\n            println!(\"Created:  {}\", u.created_at);\r\n            println!(\"Updated:  {}\", u.updated_at);\r\n        }\r\n        None =\u003e {\r\n            println!(\"User not found: {id}\");\r\n        }\r\n    }\r\n    Ok(())\r\n}\r\n\r\nfn run_user_create(\r\n    store: \u0026Store\u003c'_\u003e,\r\n    username: \u0026str,\r\n    pin_hash: \u0026str,\r\n    display_name: \u0026str,\r\n    role_id: \u0026str,\r\n) -\u003e Result\u003c()\u003e {\r\n    match store.create_user(username, pin_hash, display_name, role_id) {\r\n        Ok(u) =\u003e {\r\n            println!(\"Created user: {} ({})\", u.display_name, u.username);\r\n        }\r\n        Err(CoreError::Validation { message, .. }) =\u003e {\r\n            eprintln!(\"Validation error: {message}\");\r\n            std::process::exit(1);\r\n        }\r\n        Err(CoreError::Conflict { entity, field }) =\u003e {\r\n            eprintln!(\"Conflict: {entity} already exists ({field})\");\r\n            std::process::exit(1);\r\n        }\r\n        Err(e) =\u003e {\r\n            eprintln!(\"Error: {e}\");\r\n            std::process::exit(1);\r\n        }\r\n    }\r\n    Ok(())\r\n}\r\n\r\n// ── Product CRUD ─────────────────────────────────────────────────────\r\n\r\nfn run_product(conn: \u0026Connection, args: ProductArgs) -\u003e Result\u003c()\u003e {\r\n    let store = Store::new(conn);\r\n\r\n    match args.action {\r\n        ProductAction::List =\u003e run_product_list(\u0026store),\r\n        ProductAction::Get { sku } =\u003e run_product_get(\u0026store, \u0026sku),\r\n        ProductAction::Create {\r\n            sku,\r\n            name,\r\n            price,\r\n            currency,\r\n        } =\u003e run_product_create(\u0026store, \u0026sku, \u0026name, price, \u0026currency),\r\n        ProductAction::Update {\r\n            sku,\r\n            name,\r\n            price,\r\n            currency,\r\n            category_id,\r\n            barcode,\r\n        } =\u003e run_product_update(\r\n            \u0026store,\r\n            \u0026sku,\r\n            \u0026name,\r\n            price,\r\n            \u0026currency,\r\n            category_id.as_deref(),\r\n            barcode.as_deref(),\r\n        ),\r\n        ProductAction::Delete { sku } =\u003e run_product_delete(\u0026store, \u0026sku),\r\n    }\r\n}\r\n\r\nfn run_product_list(store: \u0026Store\u003c'_\u003e) -\u003e Result\u003c()\u003e {\r\n    let products = store.list_products().context(\"listing products\")?;\r\n\r\n    if products.is_empty() {\r\n        println!(\"No products found.\");\r\n        return Ok(());\r\n    }\r\n\r\n    println!(\"{:\u003c12} {:\u003c24} {:\u003e10}  Stock\", \"SKU\", \"Name\", \"Price\");\r\n    println!(\"{:-\u003c12} {:-\u003c24} {:-\u003e10}  {:-}\", \"\", \"\", \"\", \"\");\r\n\r\n    for p in \u0026products {\r\n        let price_str = format!(\r\n            \"{}.{:02}\",\r\n            p.product.price.minor_units / 100,\r\n            p.product.price.minor_units.abs() % 100\r\n        );\r\n        let stock_str = match p.stock_qty {\r\n            Some(q) =\u003e q.to_string(),\r\n            None =\u003e \"-\".into(),\r\n        };\r\n        println!(\r\n            \"{:\u003c12} {:\u003c24} {:\u003e10}  {}\",\r\n            p.product.sku.as_str(),\r\n            p.product.name,\r\n            price_str,\r\n            stock_str,\r\n        );\r\n    }\r\n\r\n    Ok(())\r\n}\r\n\r\nfn run_product_get(store: \u0026Store\u003c'_\u003e, sku: \u0026str) -\u003e Result\u003c()\u003e {\r\n    match store.get_product(sku).context(\"looking up product\")? {\r\n        Some(p) =\u003e {\r\n            let price_str = format!(\r\n                \"{}.{:02} {}\",\r\n                p.product.price.minor_units / 100,\r\n                p.product.price.minor_units.abs() % 100,\r\n                std::str::from_utf8(\u0026p.product.price.currency.0).unwrap_or(\"???\"),\r\n            );\r\n            println!(\"SKU:          {}\", p.product.sku.as_str());\r\n            println!(\"Name:         {}\", p.product.name);\r\n            println!(\"Price:        {}\", price_str);\r\n            println!(\r\n                \"Category:     {}\",\r\n                p.category_name.as_deref().unwrap_or(\"(none)\")\r\n            );\r\n            println!(\r\n                \"Barcode:      {}\",\r\n                p.product.barcode.as_deref().unwrap_or(\"(none)\")\r\n            );\r\n            match p.stock_qty {\r\n                Some(q) =\u003e println!(\"Stock:        {q}\"),\r\n                None =\u003e println!(\"Stock:        (no inventory)\"),\r\n            }\r\n            println!(\"ID:           {}\", p.product.id);\r\n            println!(\"Created:      {}\", p.product.created_at);\r\n            println!(\"Updated:      {}\", p.product.updated_at);\r\n        }\r\n        None =\u003e {\r\n            println!(\"Product not found: {sku}\");\r\n        }\r\n    }\r\n    Ok(())\r\n}\r\n\r\nfn run_product_create(\r\n    store: \u0026Store\u003c'_\u003e,\r\n    sku: \u0026str,\r\n    name: \u0026str,\r\n    price_minor: i64,\r\n    currency_code: \u0026str,\r\n) -\u003e Result\u003c()\u003e {\r\n    let currency = Currency::from_str(currency_code)\r\n        .with_context(|| format!(\"inva ,{"line":1027,"address":[],"length":0,"stats":{"Line":0}},{"line":1028,"address":[],"length":0,"stats":{"Line":0}},{"line":1036,"address":[],"length":0,"stats":{"Line":0}},{"line":1037,"address":[],"length":0,"stats":{"Line":0}},{"line":1039,"address":[],"length":0,"stats":{"Line":0}},{"line":1040,"address":[],"length":0,"stats":{"Line":0}},{"line":1041,"address":[],"length":0,"stats":{"Line":0}},{"line":1044,"address":[],"length":0,"stats":{"Line":0}},{"line":1045,"address":[],"length":0,"stats":{"Line":0}},{"line":1047,"address":[],"length":0,"stats":{"Line":0}},{"line":1048,"address":[],"length":0,"stats":{"Line":0}},{"line":1049,"address":[],"length":0,"stats":{"Line":0}},{"line":1051,"address":[],"length":0,"stats":{"Line":0}},{"line":1052,"address":[],"length":0,"stats":{"Line":0}},{"line":1053,"address":[],"length":0,"stats":{"Line":0}},{"line":1057,"address":[],"length":0,"stats":{"Line":0}},{"line":1060,"address":[],"length":0,"stats":{"Line":0}},{"line":1061,"address":[],"length":0,"stats":{"Line":0}},{"line":1062,"address":[],"length":0,"stats":{"Line":0}},{"line":1063,"address":[],"length":0,"stats":{"Line":0}},{"line":1066,"address":[],"length":0,"stats":{"Line":0}},{"line":1067,"address":[],"length":0,"stats":{"Line":0}},{"line":1069,"address":[],"length":0,"stats":{"Line":0}},{"line":1070,"address":[],"length":0,"stats":{"Line":0}},{"line":1071,"address":[],"length":0,"stats":{"Line":0}},{"line":1075,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":437},{"path":["C:","\\","My Script","oz-pos","crates","oz-core","src","cart.rs"],"content":"//! Cart and CartLine — the in-memory sale pipeline.\r\n//!\r\n//! A `Cart` is created with a [`Currency`], lines are added via\r\n//! [`Cart::add_line`], and the cart's [`Cart::total`] is computed by\r\n//! summing line totals in checked arithmetic. Mismatched-currency adds\r\n//! return [`CartError::CurrencyMismatch`] instead of panicking, keeping\r\n//! the \"never panic in library code\" invariant from the `rust-backend`\r\n//! skill.\r\n//!\r\n//! `Cart` is the only mutable type here. It is `Send + Sync` only when\r\n//! wrapped in a `Mutex` or `RwLock`; the Tauri command layer uses\r\n//! `tokio::sync::Mutex\u003cHashMap\u003cCartId, Cart\u003e\u003e` for the in-memory store.\r\n\r\n// Scaffold: a few accessors and field docs are still TODO. The full\r\n// doc pass is tracked in a followup; for now allow the warnings so the\r\n// scaffold compiles under `clippy -- -D warnings`.\r\n#![allow(missing_docs)]\r\n\r\nuse serde::{Deserialize, Serialize};\r\nuse thiserror::Error;\r\nuse uuid::Uuid;\r\n\r\nuse crate::money::Money;\r\nuse crate::sku::{LineId, Sku};\r\n\r\n/// Unique identifier for a cart.\r\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash, Serialize, Deserialize)]\r\npub struct CartId(pub Uuid);\r\n\r\nimpl CartId {\r\n    #[must_use]\r\n    pub fn new() -\u003e Self {\r\n        Self(Uuid::new_v4())\r\n    }\r\n}\r\n\r\nimpl Default for CartId {\r\n    fn default() -\u003e Self {\r\n        Self::new()\r\n    }\r\n}\r\n\r\nimpl std::fmt::Display for CartId {\r\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\r\n        write!(f, \"{}\", self.0)\r\n    }\r\n}\r\n\r\n/// A single line in a cart.\r\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\r\npub struct CartLine {\r\n    pub id: LineId,\r\n    pub sku: Sku,\r\n    pub qty: i64,\r\n    pub unit_price: Money,\r\n}\r\n\r\nimpl CartLine {\r\n    /// Construct a new line. `qty` is asserted \u003e 0.\r\n    ///\r\n    /// # Panics\r\n    /// Panics if `qty \u003c= 0`.\r\n    pub fn new(sku: Sku, qty: i64, unit_price: Money) -\u003e Self {\r\n        assert!(qty \u003e 0, \"qty must be \u003e 0, got {qty}\");\r\n        Self {\r\n            id: LineId::new(),\r\n            sku,\r\n            qty,\r\n            unit_price,\r\n        }\r\n    }\r\n\r\n    /// Total for this line: `unit_price * qty`, in minor units.\r\n    ///\r\n    /// Returns `None` on `i64` overflow.\r\n    #[must_use]\r\n    pub fn total(\u0026self) -\u003e Option\u003cMoney\u003e {\r\n        self.unit_price\r\n            .minor_units\r\n            .checked_mul(self.qty)\r\n            .map(|minor_units| Money {\r\n                minor_units,\r\n                currency: self.unit_price.currency,\r\n            })\r\n    }\r\n}\r\n\r\n/// Failure modes for cart mutations.\r\n#[derive(Debug, Error, PartialEq, Eq)]\r\n#[non_exhaustive]\r\npub enum CartError {\r\n    /// Tried to add a line whose currency differs from the cart's.\r\n    #[error(\"currency mismatch: cart is {cart}, line is {line}\")]\r\n    CurrencyMismatch { cart: String, line: String },\r\n    /// Tried to remove a SKU that isn't in the cart.\r\n    #[error(\"sku not in cart: {0}\")]\r\n    SkuNotInCart(String),\r\n}\r\n\r\n/// An open cart scoped to a single currency.\r\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\r\npub struct Cart {\r\n    id: CartId,\r\n    currency: crate::money::Currency,\r\n    lines: Vec\u003cCartLine\u003e,\r\n}\r\n\r\nimpl Cart {\r\n    /// Create a new empty cart in the given currency.\r\n    #[must_use]\r\n    pub fn new(currency: crate::money::Currency) -\u003e Self {\r\n        Self {\r\n            id: CartId::new(),\r\n            currency,\r\n            lines: Vec::new(),\r\n        }\r\n    }\r\n\r\n    #[must_use]\r\n    pub fn id(\u0026self) -\u003e CartId {\r\n        self.id\r\n    }\r\n    #[must_use]\r\n    pub fn currency(\u0026self) -\u003e crate::money::Currency {\r\n        self.currency\r\n    }\r\n    #[must_use]\r\n    pub fn lines(\u0026self) -\u003e \u0026[CartLine] {\r\n        \u0026self.lines\r\n    }\r\n    #[must_use]\r\n    pub fn line_count(\u0026self) -\u003e usize {\r\n        self.lines.len()\r\n    }\r\n\r\n    /// Append a line. Returns `Err(CartError::CurrencyMismatch)` if the\r\n    /// line's `unit_price.currency` differs from the cart's currency.\r\n    pub fn add_line(\u0026mut self, line: CartLine) -\u003e Result\u003cLineId, CartError\u003e {\r\n        if line.unit_price.currency != self.currency {\r\n            return Err(CartError::CurrencyMismatch {\r\n                cart: currency_summary(\u0026self.currency),\r\n                line: currency_summary(\u0026line.unit_price.currency),\r\n            });\r\n        }\r\n        let id = line.id;\r\n        self.lines.push(line);\r\n        Ok(id)\r\n    }\r\n\r\n    /// Remove every line with the given SKU. Returns `Err` if none found.\r\n    pub fn remove_sku(\u0026mut self, sku: \u0026str) -\u003e Result\u003cusize, CartError\u003e {\r\n        let before = self.lines.len();\r\n        self.lines.retain(|l| l.sku.as_str() != sku);\r\n        let removed = before - self.lines.len();\r\n        if removed == 0 {\r\n            Err(CartError::SkuNotInCart(sku.to_owned()))\r\n        } else {\r\n            Ok(removed)\r\n        }\r\n    }\r\n\r\n    /// Sum of all line totals. Returns `None` on `i64` overflow.\r\n    #[must_use]\r\n    pub fn total(\u0026self) -\u003e Option\u003cMoney\u003e {\r\n        let mut acc = Money::zero(self.currency);\r\n        for line in \u0026self.lines {\r\n            let t = line.total()?;\r\n            acc = acc.checked_add(t)?;\r\n        }\r\n        Some(acc)\r\n    }\r\n}\r\n\r\n/// Render a 3-byte currency code as a UTF-8 string (lossy for non-ASCII).\r\nfn currency_summary(c: \u0026crate::money::Currency) -\u003e String {\r\n    std::str::from_utf8(\u0026c.0).unwrap_or(\"???\").to_owned()\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use crate::money::Currency;\r\n\r\n    fn usd() -\u003e Currency {\r\n        \"USD\".parse().unwrap()\r\n    }\r\n    fn eur() -\u003e Currency {\r\n        \"EUR\".parse().unwrap()\r\n    }\r\n\r\n    #[test]\r\n    fn empty_cart_has_zero_total() {\r\n        let cart = Cart::new(usd());\r\n        assert_eq!(cart.total().unwrap().minor_units, 0);\r\n        assert_eq!(cart.line_count(), 0);\r\n    }\r\n\r\n    #[test]\r\n    fn add_line_appends_and_returns_id() {\r\n        let mut cart = Cart::new(usd());\r\n        let line = CartLine::new(\r\n            Sku::new(\"COFFEE\"),\r\n            2,\r\n            Money {\r\n                minor_units: 350,\r\n                currency: usd(),\r\n            },\r\n        );\r\n        let id = cart.add_line(line).unwrap();\r\n        assert_eq!(cart.line_count(), 1);\r\n        assert_eq!(cart.lines()[0].id, id);\r\n        assert_eq!(cart.total().unwrap().minor_units, 700);\r\n    }\r\n\r\n    #[test]\r\n    fn add_line_currency_mismatch_rejected() {\r\n        let mut cart = Cart::new(usd());\r\n        let bad = CartLine::new(\r\n            Sku::new(\"TEA\"),\r\n            1,\r\n            Money {\r\n                minor_units: 200,\r\n                currency: eur(),\r\n            },\r\n        );\r\n        match cart.add_line(bad) {\r\n            Err(CartError::CurrencyMismatch { .. }) =\u003e {}\r\n            other =\u003e panic!(\"expected CurrencyMismatch, got {other:?}\"),\r\n        }\r\n    }\r\n\r\n    #[test]\r\n    fn remove_sku_drops_matching_lines() {\r\n        let mut cart = Cart::new(usd());\r\n        cart.add_line(CartLine::new(\r\n            Sku::new(\"A\"),\r\n            1,\r\n            Money {\r\n                minor_units: 100,\r\n                currency: usd(),\r\n            },\r\n        ))\r\n        .unwrap();\r\n        cart.add_line(CartLine::new(\r\n            Sku::new(\"B\"),\r\n            1,\r\n            Money {\r\n                minor_units: 200,\r\n                currency: usd(),\r\n            },\r\n        ))\r\n        .unwrap();\r\n        cart.add_line(CartLine::new(\r\n            Sku::new(\"A\"),\r\n            1,\r\n            Money {\r\n                minor_units: 150,\r\n                currency: usd(),\r\n            },\r\n        ))\r\n        .unwrap();\r\n        let removed = cart.remove_sku(\"A\").unwrap();\r\n        assert_eq!(removed, 2);\r\n        assert_eq!(cart.line_count(), 1);\r\n    }\r\n\r\n    #[test]\r\n    fn total_overflow_returns_none() {\r\n        let mut cart = Cart::new(usd());\r\n        cart.add_line(CartLine::new(\r\n            Sku::new(\"BIG\"),\r\n            1,\r\n            Money {\r\n                minor_units: i64::MAX,\r\n                currency: usd(),\r\n            },\r\n        ))\r\n        .unwrap();\r\n        cart.add_line(CartLine::new(\r\n            Sku::new(\"PLUS\"),\r\n            1,\r\n            Money {\r\n                minor_units: 1,\r\n                currency: usd(),\r\n            },\r\n        ))\r\n        .unwrap();\r\n        assert!(cart.total().is_none());\r\n    }\r\n}\r\n","traces":[{"line":32,"address":[],"length":0,"stats":{"Line":2594073385365405696}},{"line":33,"address":[],"length":0,"stats":{"Line":2594073385365405696}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":39,"address":[],"length":0,"stats":{"Line":0}},{"line":44,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":45,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":63,"address":[],"length":0,"stats":{"Line":4179340454199820288}},{"line":64,"address":[],"length":0,"stats":{"Line":8358680908399640576}},{"line":66,"address":[],"length":0,"stats":{"Line":8358680908399640576}},{"line":77,"address":[],"length":0,"stats":{"Line":7493989779944505344}},{"line":78,"address":[],"length":0,"stats":{"Line":7493989779944505344}},{"line":79,"address":[],"length":0,"stats":{"Line":7493989779944505344}},{"line":80,"address":[],"length":0,"stats":{"Line":14987979559889010688}},{"line":81,"address":[],"length":0,"stats":{"Line":7493989779944505344}},{"line":82,"address":[],"length":0,"stats":{"Line":7493989779944505344}},{"line":83,"address":[],"length":0,"stats":{"Line":7493989779944505344}},{"line":111,"address":[],"length":0,"stats":{"Line":2594073385365405696}},{"line":113,"address":[],"length":0,"stats":{"
