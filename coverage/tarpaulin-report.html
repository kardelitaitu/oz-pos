utex;\nuse tokio::task::spawn_blocking;\n\nuse crate::error::HalError;\nuse crate::traits::barcode::BarcodeScanner;\nuse crate::transport::usb::{open_device, UsbDeviceInfo};\nuse crate::types::{Barcode, DeviceInfo};\n\n// ---------------------------------------------------------------------------\n// HID Keyboard usage-ID → ASCII lookup\n// ---------------------------------------------------------------------------\n\n/// Lookup table for USB HID keyboard usage IDs (non-modifier).\n/// Index by usage ID. `None` means unprintable / modifier.\nconst HID_KEY_TABLE: [Option\u003c(char, char)\u003e; 256] = {\n    let mut t: [Option\u003c(char, char)\u003e; 256] = [None; 256];\n    t[0x00] = None; // Reserved / error\n    t[0x01] = None; // Post fail / error\n    t[0x04] = Some(('a', 'A'));\n    t[0x05] = Some(('b', 'B'));\n    t[0x06] = Some(('c', 'C'));\n    t[0x07] = Some(('d', 'D'));\n    t[0x08] = Some(('e', 'E'));\n    t[0x09] = Some(('f', 'F'));\n    t[0x0A] = Some(('g', 'G'));\n    t[0x0B] = Some(('h', 'H'));\n    t[0x0C] = Some(('i', 'I'));\n    t[0x0D] = Some(('j', 'J'));\n    t[0x0E] = Some(('k', 'K'));\n    t[0x0F] = Some(('l', 'L'));\n    t[0x10] = Some(('m', 'M'));\n    t[0x11] = Some(('n', 'N'));\n    t[0x12] = Some(('o', 'O'));\n    t[0x13] = Some(('p', 'P'));\n    t[0x14] = Some(('q', 'Q'));\n    t[0x15] = Some(('r', 'R'));\n    t[0x16] = Some(('s', 'S'));\n    t[0x17] = Some(('t', 'T'));\n    t[0x18] = Some(('u', 'U'));\n    t[0x19] = Some(('v', 'V'));\n    t[0x1A] = Some(('w', 'W'));\n    t[0x1B] = Some(('x', 'X'));\n    t[0x1C] = Some(('y', 'Y'));\n    t[0x1D] = Some(('z', 'Z'));\n    t[0x1E] = Some(('1', '!'));\n    t[0x1F] = Some(('2', '@'));\n    t[0x20] = Some(('3', '#'));\n    t[0x21] = Some(('4', '$'));\n    t[0x22] = Some(('5', '%'));\n    t[0x23] = Some(('6', '^'));\n    t[0x24] = Some(('7', '\u0026'));\n    t[0x25] = Some(('8', '*'));\n    t[0x26] = Some(('9', '('));\n    t[0x27] = Some(('0', ')'));\n    t[0x28] = Some(('\\n', '\\n')); // Enter — barcode terminator\n    t[0x2C] = Some((' ', ' '));   // Space\n    t[0x2D] = Some(('-', '_'));\n    t[0x2E] = Some(('=', '+'));\n    t[0x2F] = Some(('[', '{'));\n    t[0x30] = Some((']', '}'));\n    t[0x31] = Some(('\\\\', '|'));\n    t[0x33] = Some((';', ':'));\n    t[0x34] = Some(('\\'', '\"'));\n    t[0x35] = Some(('`', '~'));\n    t[0x36] = Some((',', '\u003c'));\n    t[0x37] = Some(('.', '\u003e'));\n    t[0x38] = Some(('/', '?'));\n    t\n};\n\n/// Interpret a single HID keyboard report (8 bytes) and return the\n/// character if a non-modifier key is pressed.\nfn hid_report_to_char(report: \u0026[u8; 8]) -\u003e Option\u003cchar\u003e {\n    let modifiers = report[0];\n    let key_code = report[2]; // First pressed key\n\n    if key_code == 0x00 {\n        return None; // No key pressed (keyboard idle)\n    }\n\n    let shift = (modifiers \u0026 0x22) != 0; // LShift (0x02) or RShift (0x20)\n    match HID_KEY_TABLE.get(key_code as usize) {\n        Some(Some((unshifted, shifted))) =\u003e {\n            if shift {\n                Some(*shifted)\n            } else {\n                Some(*unshifted)\n            }\n        }\n        _ =\u003e None,\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Driver\n// ---------------------------------------------------------------------------\n\n/// A barcode scanner driven through a USB HID interrupt endpoint.\npub struct UsbHidBarcodeScanner {\n    handle: Arc\u003cMutex\u003cOption\u003crusb::DeviceHandle\u003crusb::Context\u003e\u003e\u003e\u003e,\n    info: DeviceInfo,\n    usb_info: UsbDeviceInfo,\n}\n\nimpl UsbHidBarcodeScanner {\n    /// Attempt to construct a driver for the given USB device.\n    ///\n    /// Returns `Ok(None)` if the device is not a recognised scanner (this\n    /// is not an error — the caller should try other candidates).\n    pub fn try_new(info: UsbDeviceInfo) -\u003e Self {\n        let device_info = DeviceInfo::new(\n            \u0026info.manufacturer,\n            \u0026info.product,\n            \u0026info.serial,\n        );\n\n        Self {\n            handle: Arc::new(Mutex::new(None)),\n            info: device_info,\n            usb_info: info,\n        }\n    }\n\n    /// Connect all known USB scanners found on the system and return\n    /// their driver instances.\n    pub fn discover_all() -\u003e Vec\u003cSelf\u003e {\n        let devices = match crate::transport::usb::probe_scanners() {\n            Ok(d) =\u003e d,\n            Err(_) =\u003e return Vec::new(),\n        };\n        devices.into_iter().map(Self::try_new).collect()\n    }\n}\n\n#[async_trait]\nimpl BarcodeScanner for UsbHidBarcodeScanner {\n    async fn connect(\u0026self) -\u003e Result\u003cBox\u003cdyn BarcodeScanner\u003e, HalError\u003e {\n        let mut guard = self.handle.lock().await;\n        if guard.is_some() {\n            return Ok(Box::new(Self {\n                handle: self.handle.clone(),\n                info: self.info.clone(),\n                usb_info: self.usb_info.clone(),\n            }));\n        }\n\n        let handle = open_device(\n            self.usb_info.vid,\n            self.usb_info.pid,\n            self.usb_info.interface_number,\n        )?;\n\n        *guard = Some(handle);\n\n        Ok(Box::new(Self {\n            handle: self.handle.clone(),\n            info: self.info.clone(),\n            usb_info: self.usb_info.clone(),\n        }))\n    }\n\n    async fn poll(\u0026mut self, timeout_ms: u32) -\u003e Result\u003cOption\u003cBarcode\u003e, HalError\u003e {\n        let handle_arc = self.handle.clone();\n        let ep_in = self.usb_info.endpoint_in;\n        let total_timeout = Duration::from_millis(timeout_ms as u64);\n\n        spawn_blocking(move || {\n            let mut guard = handle_arc.blocking_lock();\n            let handle = guard\n                .as_mut()\n                .ok_or(HalError::NotFound(\"not connected\".into()))?;\n\n            let deadline = std::time::Instant::now() + total_timeout;\n            let mut code = String::with_capacity(32);\n            let read_timeout = Duration::from_millis(50);\n\n            loop {\n                if std::time::Instant::now() \u003e= deadline {\n                    return if code.is_empty() {\n                        Ok(None)\n                    } else {\n                        Ok(Some(Barcode::new(\u0026code)))\n                    };\n                }\n\n                let mut buf = [0u8; 8];\n                let timeout = std::cmp::min(\n                    read_timeout,\n                    deadline.saturating_duration_since(std::time::Instant::now()),\n                );\n\n                match handle.read_interrupt(ep_in, \u0026mut buf, timeout) {\n                    Ok(_) =\u003e {\n                        match hid_report_to_char(\u0026buf) {\n                            Some('\\n') =\u003e {\n                                // Enter terminator — barcode complete.\n                                // If code is empty (spurious enter), keep reading.\n                                if !code.is_empty() {\n                                    return Ok(Some(Barcode::new(\u0026code)));\n                                }\n                            }\n                            Some(ch) =\u003e code.push(ch),\n                            None =\u003e { /* key-up report or modifier — ignore */ }\n                        }\n                    }\n                    Err(rusb::Error::Timeout) =\u003e {\n                        // Timeout between keys — if we have data, the barcode\n                        // might be complete (scanner without terminator).\n                        if !code.is_empty() {\n                            return Ok(Some(Barcode::new(\u0026code)));\n                        }\n                    }\n                    Err(rusb::Error::NoDevice) =\u003e {\n                        *guard = None;\n                        return Err(HalError::Disconnected);\n                    }\n                    Err(e) =\u003e return Err(HalError::Usb(e.to_string())),\n                }\n            }\n        })\n        .await\n        .map_err(|e| HalError::Usb(format!(\"spawn_blocking join error: {e}\")))?\n    }\n\n    async fn cancel(\u0026self) -\u003e Result\u003c(), HalError\u003e {\n        // USB interrupt reads are synchronous with timeout; they will\n        // naturally expire. No explicit cancel mechanism from rusb.\n        Ok(())\n    }\n\n    fn device_info(\u0026self) -\u003e DeviceInfo {\n        self.info.clone()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn hid_report_parses_letter() {\n        // Report: no modifiers, key code 0x04 = 'a'\n        let report = [0x00, 0x00, 0x04, 0x00, 0x00, 0x00, 0x00, 0x00];\n        assert_eq!(hid_report_to_char(\u0026report), Some('a'));\n    }\n\n    #[test]\n    fn hid_report_with_shift_gives_uppercase() {\n        // Report: LShift (0x02), key code 0x04 = 'A'\n        let report = [0x02, 0x00, 0x04, 0x00, 0x00, 0x00, 0x00, 0x00];\n        assert_eq!(hid_report_to_char(\u0026report), Some('A'));\n    }\n\n    #[test]\n    fn hid_report_no_key_returns_none() {\n        let report = [0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00];\n        assert_eq!(hid_report_to_char(\u0026report), None);\n    }\n\n    #[test]\n    fn hid_report_enter_is_newline() {\n        let report = [0x00, 0x00, 0x28, 0x00, 0x00, 0x00, 0x00, 0x00];\n        assert_eq!(hid_report_to_char(\u0026report), Some('\\n'));\n    }\n\n    #[test]\n    fn hid_report_digit_shifted_gives_symbol() {\n        // RShift (0x20), key code 0x1E = '1' → '!'\n        let report = [0x20, 0x00, 0x1E, 0x00, 0x00, 0x00, 0x00, 0x00];\n        assert_eq!(hid_report_to_char(\u0026report), Some('!'));\n    }\n\n    #[test]\n    fn hid_report_space() {\n        let report = [0x00, 0x00, 0x2C, 0x00, 0x00, 0x00, 0x00, 0x00];\n        assert_eq!(hid_report_to_char(\u0026report), Some(' '));\n    }\n}\n","traces":[{"line":91,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":92,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":93,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":95,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":96,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":99,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":100,"address":[],"length":0,"stats":{"Line":1080863910568919040}},{"line":101,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":102,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":103,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":105,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":108,"address":[],"length":0,"stats":{"Line":0}},{"line":128,"address":[],"length":0,"stats":{"Line":0}},{"line":130,"address":[],"length":0,"stats":{"Line":0}},{"line":131,"address":[],"length":0,"stats":{"Line":0}},{"line":132,"address":[],"length":0,"stats":{"Line":0}},{"line":136,"address":[],"length":0,"stats":{"Line":0}},{"line":144,"address":[],"length":0,"stats":{"Line":0}},{"line":145,"address":[],"length":0,"stats":{"Line":0}},{"line":146,"address":[],"length":0,"stats":{"Line":0}},{"line":147,"address":[],"length":0,"stats":{"Line":0}},{"line":149,"address":[],"length":0,"stats":{"Line":0}},{"line":155,"address":[],"length":0,"stats":{"Line":0}},{"line":180,"address":[],"length":0,"stats":{"Line":0}},{"line":185,"address":[],"length":0,"stats":{"Line":0}},{"line":186,"address":[],"length":0,"stats":{"Line":0}},{"line":187,"address":[],"length":0,"stats":{"Line":0}},{"line":188,"address":[],"length":0,"stats":{"Line":0}},{"line":189,"address":[],"length":0,"stats":{"Line":0}},{"line":191,"address":[],"length":0,"stats":{"Line":0}},{"line":192,"address":[],"length":0,"stats":{"Line":0}},{"line":193,"address":[],"length":0,"stats":{"Line":0}},{"line":196,"address":[],"length":0,"stats":{"Line":0}},{"line":197,"address":[],"length":0,"stats":{"Line":0}},{"line":198,"address":[],"length":0,"stats":{"Line":0}},{"line":200,"address":[],"length":0,"stats":{"Line":0}},{"line":204,"address":[],"length":0,"stats":{"Line":0}},{"line":205,"address":[],"length":0,"stats":{"Line":0}},{"line":206,"address":[],"length":0,"stats":{"Line":0}},{"line":207,"address":[],"length":0,"stats":{"Line":0}},{"line":210,"address":[],"length":0,"stats":{"Line":0}},{"line":212,"address":[],"length":0,"stats":{"Line":0}},{"line":216,"address":[],"length":0,"stats":{"Line":0}},{"line":217,"address":[],"length":0,"stats":{"Line":0}},{"line":220,"address":[],"length":0,"stats":{"Line":0}},{"line":221,"address":[],"length":0,"stats":{"Line":0}},{"line":227,"address":[],"length":0,"stats":{"Line":0}},{"line":228,"address":[],"length":0,"stats":{"Line":0}},{"line":232,"address":[],"length":0,"stats":{"Line":0}},{"line":233,"address":[],"length":0,"stats":{"Line":0}},{"line":235,"address":[],"length":0,"stats":{"Line":0}},{"line":240,"address":[],"length":0,"stats":{"Line":0}},{"line":243,"address":[],"length":0,"stats":{"Line":0}},{"line":249,"address":[],"length":0,"stats":{"Line":0}},{"line":250,"address":[],"length":0,"stats":{"Line":0}}],"covered":11,"coverable":55},{"path":["C:","\\","My Script","oz-pos","crates","oz-hal","src","error.rs"],"content":"//! Error type for the Hardware Abstraction Layer.\r\n//!\r\n//! Every trait method in `oz-hal` returns `Result\u003cT, HalError\u003e`. The enum\r\n//! is `#[non_exhaustive]` so new failure modes can be added without\r\n//! breaking semver. Drivers convert third-party errors with\r\n//! `.map_err(|e| HalError::Usb(e.to_string()))` at the trait boundary\r\n//! — never leak `rusb`/`btleplug`/`serialport` types past the driver.\r\n\r\nuse thiserror::Error;\r\n\r\n/// Errors that can originate in a HAL driver or the HAL runtime.\r\n#[derive(Debug, Error)]\r\n#[non_exhaustive]\r\npub enum HalError {\r\n    /// The requested device id was not in the registry.\r\n    #[error(\"device not found: {0}\")]\r\n    NotFound(String),\r\n\r\n    /// The device was connected but the user/environment disconnected it.\r\n    #[error(\"device disconnected\")]\r\n    Disconnected,\r\n\r\n    /// An `std::io::Error` bubbled up from the transport layer.\r\n    #[error(\"i/o error: {0}\")]\r\n    Io(#[from] std::io::Error),\r\n\r\n    /// A USB transport error.\r\n    #[error(\"usb error: {0}\")]\r\n    Usb(String),\r\n\r\n    /// A Bluetooth transport error.\r\n    #[error(\"bluetooth error: {0}\")]\r\n    Bluetooth(String),\r\n\r\n    /// An operation did not complete within its timeout window.\r\n    #[error(\"operation timed out after {0} ms\")]\r\n    Timeout(u32),\r\n\r\n    /// The device returned a malformed packet or unexpected response.\r\n    #[error(\"protocol error: {0}\")]\r\n    Protocol(String),\r\n\r\n    /// The device is busy with a previous request.\r\n    #[error(\"device busy\")]\r\n    Busy,\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    #[test]\r\n    fn not_found_displays_id() {\r\n        let e = HalError::NotFound(\"scanner-01\".into());\r\n        assert_eq!(e.to_string(), \"device not found: scanner-01\");\r\n    }\r\n\r\n    #[test]\r\n    fn timeout_displays_ms() {\r\n        let e = HalError::Timeout(250);\r\n        assert_eq!(e.to_string(), \"operation timed out after 250 ms\");\r\n    }\r\n\r\n    #[test]\r\n    fn io_conversion_via_from() {\r\n        let io = std::io::Error::new(std::io::ErrorKind::NotFound, \"no such file\");\r\n        let e: HalError = io.into();\r\n        assert!(matches!(e, HalError::Io(_)));\r\n    }\r\n}\r\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","My Script","oz-pos","crates","oz-hal","src","lib.rs"],"content":"//! Hardware Abstraction Layer for OZ-POS.\r\n//!\r\n//! `oz-hal` is the seam between business logic and physical devices:\r\n//! barcode scanners, receipt printers, cash drawers, NFC readers, and\r\n//! payment terminals. Business code only ever sees the trait\r\n//! ([`BarcodeScanner`], [`ReceiptPrinter`], [`CashDrawer`]) — it never\r\n//! imports a specific driver.\r\n//!\r\n//! Every trait has a programmable mock in [`drivers::mock`]. Tests use\r\n//! the mocks; production code uses real drivers registered through\r\n//! [`DriverRegistry`] at startup.\r\n\r\n#![allow(unsafe_code)]\r\n// HAL drivers may need unsafe for FFI\r\n// Scaffold: a number of accessors and field docs are still TODO.\r\n// The full doc pass is tracked as a followup in CHANGELOG.md\r\n// \"Known limitations\"; for now allow the warnings so the scaffold\r\n// compiles under `clippy -- -D warnings`.\r\n#![allow(missing_docs)]\r\n\r\npub mod drivers;\r\npub mod error;\r\npub mod registry;\r\npub mod traits;\r\npub mod transport;\r\npub mod types;\r\n\r\npub use error::HalError;\r\npub use registry::DriverRegistry;\r\npub use traits::barcode::BarcodeScanner;\r\npub use traits::cash_drawer::CashDrawer;\r\npub use traits::printer::ReceiptPrinter;\r\npub use types::{Barcode, BarcodeSymbology, DeviceInfo};\r\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","My Script","oz-pos","crates","oz-hal","src","registry.rs"],"content":"//! `DriverRegistry` — the runtime's catalogue of available hardware.\r\n//!\r\n//! The registry holds `Arc\u003cdyn Trait\u003e` per device category, indexed by a\r\n//! user-defined string id. Commands reach hardware through the registry\r\n//! (`state.registry.scanner(id)`) and never construct a specific driver.\r\n//!\r\n//! Discovery (`DriverRegistry::discover()`) probes USB, Bluetooth, and\r\n//! serial at startup and populates the registry. Failure of one driver\r\n//! does not abort discovery; the rest still get registered.\r\n\r\nuse std::collections::HashMap;\r\nuse std::sync::Arc;\r\n\r\nuse tokio::sync::RwLock;\r\n\r\nuse crate::traits::barcode::BarcodeScanner;\r\nuse crate::traits::cash_drawer::CashDrawer;\r\nuse crate::traits::printer::ReceiptPrinter;\r\nuse crate::types::DeviceInfo;\r\n\r\n/// Shared, mutable catalogue of HAL drivers.\r\n#[derive(Default)]\r\npub struct DriverRegistry {\r\n    scanners: RwLock\u003cHashMap\u003cString, Arc\u003cdyn BarcodeScanner\u003e\u003e\u003e,\r\n    printers: RwLock\u003cHashMap\u003cString, Arc\u003cdyn ReceiptPrinter\u003e\u003e\u003e,\r\n    drawers: RwLock\u003cHashMap\u003cString, Arc\u003cdyn CashDrawer\u003e\u003e\u003e,\r\n}\r\n\r\nimpl DriverRegistry {\r\n    /// Construct an empty registry. Use `register_*` to add devices.\r\n    #[must_use]\r\n    pub fn new() -\u003e Self {\r\n        Self::default()\r\n    }\r\n\r\n    /// Register a barcode scanner under `id`. Overwrites any previous\r\n    /// entry with the same id.\r\n    pub async fn register_scanner(\u0026self, id: \u0026str, driver: Arc\u003cdyn BarcodeScanner\u003e) {\r\n        self.scanners.write().await.insert(id.to_owned(), driver);\r\n    }\r\n\r\n    /// Register a receipt printer under `id`. Overwrites any previous\r\n    /// entry with the same id.\r\n    pub async fn register_printer(\u0026self, id: \u0026str, driver: Arc\u003cdyn ReceiptPrinter\u003e) {\r\n        self.printers.write().await.insert(id.to_owned(), driver);\r\n    }\r\n\r\n    /// Register a cash drawer under `id`. Overwrites any previous\r\n    /// entry with the same id.\r\n    pub async fn register_cash_drawer(\u0026self, id: \u0026str, driver: Arc\u003cdyn CashDrawer\u003e) {\r\n        self.drawers.write().await.insert(id.to_owned(), driver);\r\n    }\r\n\r\n    /// Look up a scanner by id. Returns `None` if no scanner is registered.\r\n    pub async fn scanner(\u0026self, id: \u0026str) -\u003e Option\u003cArc\u003cdyn BarcodeScanner\u003e\u003e {\r\n        self.scanners.read().await.get(id).cloned()\r\n    }\r\n\r\n    /// Look up a printer by id. Returns `None` if no printer is registered.\r\n    pub async fn printer(\u0026self, id: \u0026str) -\u003e Option\u003cArc\u003cdyn ReceiptPrinter\u003e\u003e {\r\n        self.printers.read().await.get(id).cloned()\r\n    }\r\n\r\n    /// Look up a cash drawer by id. Returns `None` if no drawer is registered.\r\n    pub async fn cash_drawer(\u0026self, id: \u0026str) -\u003e Option\u003cArc\u003cdyn CashDrawer\u003e\u003e {\r\n        self.drawers.read().await.get(id).cloned()\r\n    }\r\n\r\n    /// Snapshot of registered scanner ids (for the setup wizard's \"what's\r\n    /// plugged in?\" view).\r\n    pub async fn scanner_ids(\u0026self) -\u003e Vec\u003cString\u003e {\r\n        self.scanners.read().await.keys().cloned().collect()\r\n    }\r\n\r\n    /// Snapshot of registered printer ids.\r\n    pub async fn printer_ids(\u0026self) -\u003e Vec\u003cString\u003e {\r\n        self.printers.read().await.keys().cloned().collect()\r\n    }\r\n\r\n    /// Snapshot of registered cash drawer ids.\r\n    pub async fn drawer_ids(\u0026self) -\u003e Vec\u003cString\u003e {\r\n        self.drawers.read().await.keys().cloned().collect()\r\n    }\r\n\r\n    /// Discover and register available hardware. Failure of one driver\r\n    /// does not abort the rest. Probes USB HID scanners, serial scanners,\r\n    /// and USB receipt printers, then registers them all.\r\n    pub async fn discover(\u0026self) {\r\n        // --- USB HID barcode scanners ---\r\n        for scanner in crate::drivers::usb_scanner::UsbHidBarcodeScanner::discover_all() {\r\n            let info = scanner.device_info();\r\n            let id = if info.serial.is_empty() || info.serial == \"0000\" {\r\n                format!(\"scanner:usb:{}:{}\", info.vendor, info.model)\r\n            } else {\r\n                format!(\"scanner:usb:{}\", info.serial)\r\n            };\r\n            self.register_scanner(\u0026id, Arc::new(scanner)).await;\r\n        }\r\n\r\n        // --- Serial barcode scanners ---\r\n        for scanner in crate::drivers::serial_scanner::SerialBarcodeScanner::discover_all() {\r\n            let info = scanner.device_info();\r\n            // Serial port name is used as the identity key.\r\n            let id = format!(\"scanner:serial:{}\", info.serial);\r\n            self.register_scanner(\u0026id, Arc::new(scanner)).await;\r\n        }\r\n\r\n        // --- USB receipt printers ---\r\n        for printer in crate::drivers::usb_printer::UsbReceiptPrinter::discover_all() {\r\n            let info = printer.device_info();\r\n            let id = if info.serial.is_empty() {\r\n                format!(\"printer:{}:{}\", info.vendor, info.model)\r\n            } else {\r\n                format!(\"printer:{}\", info.serial)\r\n            };\r\n            self.register_printer(\u0026id, Arc::new(printer)).await;\r\n        }\r\n\r\n        // --- Bluetooth (SPP) receipt printers ---\r\n        let bt_ports = crate::transport::serial::probe_bluetooth().unwrap_or_default();\r\n        for port_info in bt_ports {\r\n            let info = DeviceInfo::new(\"bluetooth\", \u0026port_info.description, \u0026port_info.port_name);\r\n            let printer = crate::drivers::bt_printer::BtReceiptPrinter::new(\r\n                \u0026port_info.port_name,\r\n                9600,\r\n                info,\r\n            );\r\n            let id = format!(\"printer:bt:{}\", port_info.port_name);\r\n            self.register_printer(\u0026id, Arc::new(printer)).await;\r\n        }\r\n    }\r\n\r\n    /// Register a TCP (network) printer under the given id. This is not\r\n    /// auto-discovered; the setup wizard calls this when the user\r\n    /// configures a printer by IP address or hostname.\r\n    pub async fn register_tcp_printer(\r\n        \u0026self,\r\n        id: \u0026str,\r\n        addr: \u0026str,\r\n        info: DeviceInfo,\r\n    ) {\r\n        let printer = crate::drivers::tcp_printer::TcpReceiptPrinter::new(addr, info);\r\n        self.register_printer(id, Arc::new(printer)).await;\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use crate::drivers::mock::MockBarcodeScanner;\r\n    use crate::drivers::mock::MockCashDrawer;\r\n    use crate::drivers::mock::MockReceiptPrinter;\r\n    use crate::types::DeviceInfo;\r\n\r\n    #[tokio::test]\r\n    async fn register_and_lookup_scanner() {\r\n        let reg = DriverRegistry::default();\r\n        let scanner: Arc\u003cdyn BarcodeScanner\u003e = Arc::new(MockBarcodeScanner::with_info(\r\n            DeviceInfo::new(\"test\", \"MockScanner\", \"0001\"),\r\n        ));\r\n        reg.register_scanner(\"front\", scanner).await;\r\n        let got = reg.scanner(\"front\").await.unwrap();\r\n        assert_eq!(got.device_info().vendor, \"test\");\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn missing_scanner_returns_none() {\r\n        let reg = DriverRegistry::default();\r\n        assert!(reg.scanner(\"nope\").await.is_none());\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn register_printer_and_drawer() {\r\n        let reg = DriverRegistry::default();\r\n        let printer: Arc\u003cdyn ReceiptPrinter\u003e = Arc::new(MockReceiptPrinter::with_info(\r\n            DeviceInfo::new(\"test\", \"MockPrinter\", \"0002\"),\r\n        ));\r\n        let drawer: Arc\u003cdyn CashDrawer\u003e = Arc::new(MockCashDrawer::with_info(DeviceInfo::new(\r\n            \"test\",\r\n            \"MockDrawer\",\r\n            \"0003\",\r\n        )));\r\n        reg.register_printer(\"default\", printer).await;\r\n        reg.register_cash_drawer(\"default\", drawer).await;\r\n        assert!(reg.printer(\"default\").await.is_some());\r\n        assert!(reg.cash_drawer(\"default\").await.is_some());\r\n    }\r\n}\r\n","traces":[{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":38,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":39,"address":[],"length":0,"stats":{"Line":504403158265495552}},{"line":44,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":4 ,"\\","My Script","oz-pos","crates","oz-hal","src","traits","cash_drawer.rs"],"content":"//! `CashDrawer` — the trait every cash-drawer driver implements.\r\n\r\nuse async_trait::async_trait;\r\n\r\nuse crate::error::HalError;\r\nuse crate::types::DeviceInfo;\r\n\r\n/// A device that opens a cash drawer (via a pulse on the RJ12 kicker).\r\n#[async_trait]\r\npub trait CashDrawer: Send + Sync {\r\n    /// Pulse the kicker to open the drawer.\r\n    async fn open(\u0026self) -\u003e Result\u003c(), HalError\u003e;\r\n\r\n    /// Some drawers report their state (open/closed). The default\r\n    /// implementation returns `Disconnected` because most don't.\r\n    async fn is_open(\u0026self) -\u003e Result\u003cbool, HalError\u003e {\r\n        Err(HalError::Disconnected)\r\n    }\r\n\r\n    /// Device identity, used in logs and the setup wizard.\r\n    fn device_info(\u0026self) -\u003e DeviceInfo;\r\n}\r\n","traces":[{"line":16,"address":[],"length":0,"stats":{"Line":0}},{"line":17,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":2},{"path":["C:","\\","My Script","oz-pos","crates","oz-hal","src","traits","mod.rs"],"content":"//! HAL traits. One file per device category, re-exported here.\r\n\r\npub mod barcode;\r\npub mod cash_drawer;\r\npub mod printer;\r\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","My Script","oz-pos","crates","oz-hal","src","traits","printer.rs"],"content":"//! `ReceiptPrinter` — the trait every receipt printer driver implements.\n\nuse async_trait::async_trait;\n\nuse crate::error::HalError;\nuse crate::types::DeviceInfo;\n\n/// A device that prints customer receipts (and kitchen tickets, in the\n/// future — that's a separate trait once it has more shape).\n#[async_trait]\npub trait ReceiptPrinter: Send + Sync {\n    /// Print a receipt. `body` is plain text; the driver is responsible\n    /// for converting to the device's native format (ESC/POS, StarPRNT,\n    /// etc.) and slicing the paper at the end.\n    async fn print_receipt(\u0026self, body: \u0026str) -\u003e Result\u003c(), HalError\u003e;\n\n    /// Print raw bytes directly to the device (e.g. pre-formatted\n    /// ESC/POS commands from the receipt builder). The default\n    /// implementation converts bytes lossily to a string and delegates\n    /// to [`print_receipt`] — real drivers override this to send the\n    /// exact byte sequence.\n    async fn print_raw(\u0026self, data: \u0026[u8]) -\u003e Result\u003c(), HalError\u003e {\n        let body = String::from_utf8_lossy(data);\n        self.print_receipt(\u0026body).await\n    }\n\n    /// Feed `n` blank lines after the receipt, then cut. Most drivers\n    /// implement this as the standard ESC/POS sequence; a no-op default\n    /// is provided for printers that don't expose a cutter.\n    async fn cut(\u0026self) -\u003e Result\u003c(), HalError\u003e {\n        Ok(())\n    }\n\n    /// Device identity, used in logs and the setup wizard.\n    fn device_info(\u0026self) -\u003e DeviceInfo;\n}\n","traces":[{"line":22,"address":[],"length":0,"stats":{"Line":0}},{"line":23,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":30,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":5},{"path":["C:","\\","My Script","oz-pos","crates","oz-hal","src","transport","mod.rs"],"content":"pub mod serial;\npub mod tcp;\npub mod usb;\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","My Script","oz-pos","crates","oz-hal","src","transport","serial.rs"],"content":"//! Serial port enumeration and connection helpers for serial barcode\n//! scanners and serial receipt printers.\n//!\n//! Many barcode scanners (e.g. Honeywell, Datalogic) and receipt printers\n//! (e.g. Epson) offer a serial (RS-232) interface. On modern machines\n//! this is usually accessed via a USB-to-serial adapter (FTDI, CH340,\n//! CP210x, Prolific).\n\nuse std::time::Duration;\n\nuse serialport::{available_ports, SerialPort, SerialPortBuilder, SerialPortType, UsbPortInfo};\n\nuse crate::error::HalError;\n\n/// Known VID/PID pairs for common USB-to-serial adapters used by POS\n/// hardware. These are matched against the adapter, not the peripheral\n/// itself (which might have a generic serial interface).\nconst KNOWN_SERIAL_ADAPTERS: \u0026[(u16, u16)] = \u0026[\n    (0x0403, 0x6001), // FTDI FT232R\n    (0x0403, 0x6015), // FTDI FT231X\n    (0x0403, 0x6010), // FTDI FT2232C\n    (0x0403, 0x6011), // FTDI FT4232\n    (0x1A86, 0x7523), // CH340\n    (0x1A86, 0x55D4), // CH34x (newer)\n    (0x10C4, 0xEA60), // CP210x\n    (0x10C4, 0xEA70), // CP210x (CP2102N)\n    (0x067B, 0x2303), // Prolific PL2303\n    (0x067B, 0x23C3), // Prolific PL2303GC\n    (0x0403, 0xFA00), // Honeywell specific adapter\n];\n\n/// Static metadata about a discovered serial port.\n#[derive(Debug, Clone)]\npub struct SerialPortInfo {\n    /// OS port name (e.g. `\"COM3\"` on Windows, `\"/dev/ttyUSB0\"` on Linux).\n    pub port_name: String,\n    /// Human-readable description (if available).\n    pub description: String,\n    /// USB vendor ID if the port is behind a USB adapter.\n    pub vid: Option\u003cu16\u003e,\n    /// USB product ID if the port is behind a USB adapter.\n    pub pid: Option\u003cu16\u003e,\n}\n\n/// Enumerate serial ports and return those connected via known POS\n/// hardware adapters, or all ports when `only_known` is false.\n///\n/// Use [`probe_bluetooth()`] specifically to find Bluetooth SPP serial\n/// ports that are typically used by BT receipt printers.\npub fn probe_ports(only_known: bool) -\u003e Result\u003cVec\u003cSerialPortInfo\u003e, HalError\u003e {\n    let ports = available_ports()\n        .map_err(|e| HalError::Io(std::io::Error::other(e.to_string())))?;\n\n    let mut results = Vec::new();\n\n    for port in ports {\n        let (vid, pid) = match \u0026port.port_type {\n            SerialPortType::UsbPort(UsbPortInfo { vid, pid, .. }) =\u003e (Some(*vid), Some(*pid)),\n            SerialPortType::BluetoothPort =\u003e (None, None),\n            SerialPortType::PciPort =\u003e (None, None),\n            _ =\u003e (None, None),\n        };\n\n        if only_known {\n            let adapter_matched = vid\n                .zip(pid)\n                .is_some_and(|(v, p)| KNOWN_SERIAL_ADAPTERS.contains(\u0026(v, p)));\n\n            // If vid/pid are available but not in our known list, skip.\n            // If no vid/pid (e.g. PCI serial card), include it — the\n            // user might have explicitly configured it.\n            if vid.is_some() \u0026\u0026 pid.is_some() \u0026\u0026 !adapter_matched {\n                continue;\n            }\n        }\n\n        results.push(SerialPortInfo {\n            port_name: port.port_name,\n            description: description_for_type(\u0026port.port_type),\n            vid,\n            pid,\n        });\n    }\n\n    Ok(results)\n}\n\n/// Open a serial port at the given baud rate with typical POS device\n/// settings (8 data bits, 1 stop bit, no parity, no flow control).\npub fn open_port(\n    port_name: \u0026str,\n    baud_rate: u32,\n) -\u003e Result\u003cBox\u003cdyn SerialPort\u003e, HalError\u003e {\n    serialport::new(port_name, baud_rate)\n        .data_bits(serialport::DataBits::Eight)\n        .stop_bits(serialport::StopBits::One)\n        .parity(serialport::Parity::None)\n        .flow_control(serialport::FlowControl::None)\n        .timeout(Duration::from_millis(1000))\n        .open()\n        .map_err(|e| HalError::NotFound(format!(\"failed to open serial port {port_name}: {e}\")))\n}\n\n/// Open a serial port with full custom settings.\npub fn open_port_with_settings(\n    builder: SerialPortBuilder,\n) -\u003e Result\u003cBox\u003cdyn SerialPort\u003e, HalError\u003e {\n    builder\n        .open()\n        .map_err(|e| HalError::NotFound(format!(\"failed to open serial port: {e}\")))\n}\n\n/// Enumerate only Bluetooth SPP serial ports — used by BT receipt printers.\n///\n/// On Windows these appear as virtual COM ports after pairing; on Linux\n/// as `/dev/rfcomm*` or `/dev/tty*` with Bluetooth port type.\npub fn probe_bluetooth() -\u003e Result\u003cVec\u003cSerialPortInfo\u003e, HalError\u003e {\n    let ports = available_ports()\n        .map_err(|e| HalError::Io(std::io::Error::other(e.to_string())))?;\n\n    Ok(ports\n        .into_iter()\n        .filter(|p| matches!(p.port_type, SerialPortType::BluetoothPort))\n        .map(|p| SerialPortInfo {\n            port_name: p.port_name,\n            description: description_for_type(\u0026p.port_type),\n            vid: None,\n            pid: None,\n        })\n        .collect())\n}\n\nfn description_for_type(port_type: \u0026SerialPortType) -\u003e String {\n    match port_type {\n        SerialPortType::UsbPort(info) =\u003e {\n            format!(\n                \"{} {}\",\n                info.manufacturer.as_deref().unwrap_or(\"Unknown\"),\n                info.product.as_deref().unwrap_or(\"USB Serial\"),\n            )\n        }\n        SerialPortType::BluetoothPort =\u003e \"Bluetooth Serial\".into(),\n        SerialPortType::PciPort =\u003e \"PCI Serial\".into(),\n        other =\u003e format!(\"{other:?}\"),\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn probe_serial_does_not_panic() {\n        // This test just verifies the function runs without panicking.\n        // No hardware expected in CI — should return an empty vec or error.\n        let result = probe_ports(true);\n        assert!(result.is_ok() || result.is_err());\n    }\n}\n","traces":[{"line":50,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":51,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":52,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":54,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":56,"address":[],"length":0,"sta connect(addr: \u0026str) -\u003e Result\u003cTcpStream, HalError\u003e {\n    let full_addr = if addr.contains(':') {\n        addr.to_owned()\n    } else {\n        format!(\"{addr}:{RAW_PORT}\")\n    };\n\n    timeout(\n        Duration::from_secs(CONNECT_TIMEOUT_SECS),\n        TcpStream::connect(\u0026full_addr),\n    )\n    .await\n    .map_err(|_| HalError::Timeout(CONNECT_TIMEOUT_SECS as u32 * 1000))?\n    .map_err(|e| HalError::NotFound(format!(\"cannot connect to printer at {full_addr}: {e}\")))\n}\n\n/// Write ESC/POS data to a TCP stream and flush.\npub async fn write_all(stream: \u0026mut TcpStream, data: \u0026[u8]) -\u003e Result\u003c(), HalError\u003e {\n    use tokio::io::AsyncWriteExt;\n\n    timeout(Duration::from_secs(10), stream.write_all(data))\n        .await\n        .map_err(|_| HalError::Timeout(10_000))?\n        .map_err(|e| {\n            if e.kind() == std::io::ErrorKind::ConnectionReset\n                || e.kind() == std::io::ErrorKind::ConnectionAborted\n            {\n                HalError::Disconnected\n            } else {\n                HalError::Io(e)\n            }\n        })?;\n\n    stream\n        .flush()\n        .await\n        .map_err(HalError::Io)?;\n\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn raw_port_is_9100() {\n        assert_eq!(RAW_PORT, 9100);\n    }\n\n    #[test]\n    fn connect_timeout_is_reasonable() {\n        const { assert!(CONNECT_TIMEOUT_SECS \u003e 0 \u0026\u0026 CONNECT_TIMEOUT_SECS \u003c= 30); }\n    }\n}\n","traces":[{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":29,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":36,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":0}},{  // Voyager 1450g\n    (0x0C2E, 0x0A11), // Voyager 1452g\n    (0x0C2E, 0x0B10), // Voyager 1900g\n    (0x0C2E, 0x0B11), // Voyager 1902g\n    // Datalogic\n    (0x05F9, 0x2211), // Magellan 800i\n    (0x05F9, 0x2212), // Magellan 900i\n    (0x05F9, 0x2201), // Gryphon\n    (0x05F9, 0x2203), // QuickScan\n    // Zebra\n    (0x06DA, 0x5001), // LI3678\n    (0x06DA, 0x5002), // DS3678\n    (0x06DA, 0x4001), // DS2208\n    (0x06DA, 0x4002), // DS4608\n    // Generic / other\n    (0x045E, 0x0800), // Microsoft USB barcode scanner\n    (0x055D, 0x2020), // Wasp WLR-8950\n];\n\n/// Known receipt printer VID/PID pairs.\npub const KNOWN_PRINTERS: \u0026[(u16, u16)] = \u0026[\n    // Epson\n    (0x0416, 0x5011), // TM-T20\n    (0x0416, 0x5021), // TM-T88VI\n    (0x0416, 0x5031), // TM-T70\n    (0x0416, 0x5041), // TM-m30\n    // Star\n    (0x0519, 0x0201), // SP700\n    (0x0519, 0x0301), // TSP100\n    (0x0519, 0x0401), // mC-Print3\n    // Bixolon\n    (0x0525, 0xA800), // SRP-350\n    (0x0525, 0xA900), // SRP-275\n    // Generic\n    (0x067B, 0x2305), // Prolific-based USB printer\n];\n\n/// Enumerate USB devices whose interface class matches `class`.\npub fn probe_by_class(class: u8) -\u003e Result\u003cVec\u003cUsbDeviceInfo\u003e, HalError\u003e {\n    let context = Context::new()\n        .map_err(|e| HalError::Usb(format!(\"failed to create USB context: {e}\")))?;\n    let devices = context\n        .devices()\n        .map_err(|e| HalError::Usb(format!(\"failed to list USB devices: {e}\")))?;\n\n    let mut results = Vec::new();\n\n    for device in devices.iter() {\n        let desc = match device.device_descriptor() {\n            Ok(d) =\u003e d,\n            Err(_) =\u003e continue,\n        };\n\n        let config = match device.config_descriptor(0) {\n            Ok(c) =\u003e c,\n            Err(_) =\u003e continue,\n        };\n\n        for interface in config.interfaces() {\n            for setting in interface.descriptors() {\n                if setting.class_code() != class {\n                    continue;\n                }\n\n                let if_num = setting.interface_number();\n                let mut ep_in = None;\n                let mut ep_out = None;\n\n                for ep in setting.endpoint_descriptors() {\n                    if ep.direction() == rusb::Direction::In {\n                        ep_in = Some(ep.address());\n                    } else {\n                        ep_out = Some(ep.address());\n                    }\n                }\n\n                let Some(ep_in) = ep_in else { continue };\n\n                let (manufacturer, product, serial) = match device.open() {\n                    Ok(handle) =\u003e (\n                        handle\n                            .read_manufacturer_string_ascii(\u0026desc)\n                            .unwrap_or_default(),\n                        handle\n                            .read_product_string_ascii(\u0026desc)\n                            .unwrap_or_default(),\n                        handle\n                            .read_serial_number_string_ascii(\u0026desc)\n                            .unwrap_or_default(),\n                    ),\n                    Err(_) =\u003e (String::new(), String::new(), String::new()),\n                };\n\n                results.push(UsbDeviceInfo {\n                    vid: desc.vendor_id(),\n                    pid: desc.product_id(),\n                    manufacturer,\n                    product,\n                    serial,\n                    interface_number: if_num,\n                    endpoint_in: ep_in,\n                    endpoint_out: ep_out,\n                });\n            }\n        }\n    }\n\n    Ok(results)\n}\n\n/// Probe for USB HID barcode scanners matching [`KNOWN_SCANNERS`].\n///\n/// Returns an empty vec (not an error) when no hardware is found — this\n/// lets the system fall back to the mock driver.\npub fn probe_scanners() -\u003e Result\u003cVec\u003cUsbDeviceInfo\u0 e| HalError::Usb(format!(\"failed to claim interface {interface}: {e}\")))?;\n\n    // On Linux, detach the kernel driver if it's attached.\n    if handle.kernel_driver_active(interface).unwrap_or(false) {\n        let _ = handle.detach_kernel_driver(interface);\n    }\n\n    Ok(handle)\n}\n","traces":[{"line":72,"address":[],"length":0,"stats":{"Line":0}},{"line":73,"address":[],"length":0,"stats":{"Line":0}},{"line":74,"address":[],"length":0,"stats":{"Line":0}},{"line":75,"address":[],"length":0,"stats":{"Line":0}},{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":79,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[],"length":0,"stats":{"Line":0}},{"line":82,"address":[],"length":0,"stats":{"Line":0}},{"line":83,"address":[],"length":0,"stats":{"Line":0}},{"line":84,"address":[],"length":0,"stats":{"Line":0}},{"line":87,"address":[],"length":0,"stats":{"Line":0}},{"line":88,"address":[],"length":0,"stats":{"Line":0}},{"line":89,"address":[],"length":0,"stats":{"Line":0}},{"line":92,"address":[],"length":0,"stats":{"Line":0}},{"line":93,"address":[],"length":0,"stats":{"Line":0}},{"line":94,"address":[],"length":0,"stats":{"Line":0}},{"line":95,"address":[],"length":0,"stats":{"Line":0}},{"line":98,"address":[],"length":0,"stats":{"Line":0}},{"line":99,"address":[],"length":0,"stats":{"Line":0}},{"line":100,"address":[],"length":0,"stats":{"Line":0}},{"line":102,"address":[],"length":0,"stats":{"Line":0}},{"line":103,"address":[],"length":0,"stats":{"Line":0}},{"line":104,"address":[],"length":0,"stats":{"Line":0}},{"line":106,"address":[],"length":0,"stats":{"Line":0}},{"line":110,"address":[],"length":0,"stats":{"Line":0}},{"line":112,"address":[],"length":0,"stats":{"Line":0}},{"line":113,"address":[],"length":0,"stats":{"Line":0}},{"line":114,"address":[],"length":0,"stats":{"Line":0}},{"line":115,"address":[],"length":0,"stats":{"Line":0}},{"line":116,"address":[],"length":0,"stats":{"Line":0}},{"line":117,"address":[],"length":0 (most retail products).\r\n    Ean13,\r\n    /// UPC-A (US retail).\r\n    UpcA,\r\n    /// Code 128 (logistics).\r\n    Code128,\r\n    /// QR code.\r\n    Qr,\r\n    /// PDF417.\r\n    Pdf417,\r\n}\r\n\r\n/// Static device identity, used in logs and the setup wizard.\r\n#[derive(Debug, Clone, PartialEq, Eq, Hash, Serialize, Deserialize)]\r\npub struct DeviceInfo {\r\n    /// Vendor / brand (e.g., `\"Honeywell\"`, `\"OZ-POS\"` for mocks).\r\n    pub vendor: String,\r\n    /// Model name (e.g., `\"Voyager 1450g\"`).\r\n    pub model: String,\r\n    /// Serial number, or `\"0000-0000\"` for mocks.\r\n    pub serial: String,\r\n}\r\n\r\nimpl DeviceInfo {\r\n    /// Construct a `DeviceInfo` with a single call.\r\n    #[must_use]\r\n    pub fn new(\r\n        vendor: impl Into\u003cString\u003e,\r\n        model: impl Into\u003cString\u003e,\r\n        serial: impl Into\u003cString\u003e,\r\n    ) -\u003e Self {\r\n        Self {\r\n            vendor: vendor.into(),\r\n            model: model.into(),\r\n            serial: serial.into(),\r\n        }\r\n    }\r\n\r\n    /// Render as `\"\u003cvendor\u003e \u003cmodel\u003e (\u003cserial\u003e)\"` for log lines.\r\n    #[must_use]\r\n    pub fn display(\u0026self) -\u003e String {\r\n        format!(\"{} {} ({})\", self.vendor, self.model, self.serial)\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    #[test]\r\n    fn barcode_new_defaults_to_any_symbology() {\r\n        let b = Barcode::new(\"12345\");\r\n        assert_eq!(b.code, \"12345\");\r\n        assert_eq!(b.symbology, BarcodeSymbology::Any);\r\n    }\r\n\r\n    #[test]\r\n    fn device_info_display_format() {\r\n        let info = DeviceInfo::new(\"OZ\", \"Mock\", \"0001\");\r\n        assert_eq!(info.display(), \"OZ Mock (0001)\");\r\n    }\r\n}\r\n","traces":[{"line":18,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":20,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":59,"address":[],"  = tracing_subscriber::EnvFilter::try_from_default_env()\r\n        .unwrap_or_else(|_| tracing_subscriber::EnvFilter::new(\"info\"));\r\n\r\n    tracing_subscriber::fmt()\r\n        .with_env_filter(filter)\r\n        .with_target(false)\r\n        .init();\r\n}\r\n","traces":[{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":29,"address":[],"length":0,"stats":{"Line":0}},{"line":30,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":5},{"path":["C:","\\","My Script","oz-pos","crates","oz-lua","src","error.rs"],"content":"//! Error type for the `oz-lua` runtime.\r\n\r\nuse thiserror::Error;\r\n\r\n/// Errors that can originate in the Lua runtime or script evaluation.\r\n#[derive(Debug, Error)]\r\n#[non_exhaustive]\r\npub enum LuaError {\r\n    /// The Lua VM failed to start.\r\n    #[error(\"lua runtime init failed: {0}\")]\r\n    Init(String),\r\n\r\n    /// A script raised a Lua-level error.\r\n    #[error(\"lua script error: {0}\")]\r\n    Script(String),\r\n\r\n    /// A script tried to call a binding that is not exposed.\r\n    #[error(\"unknown binding: {0}\")]\r\n    UnknownBinding(String),\r\n}\r\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","My Script","oz-pos","crates","oz-lua","src","lib.rs"],"content":"//! Embedded Lua scripting runtime for OZ-POS.\r\n//!\r\n//! `oz-lua` lets merchants customize business rules, promotions, and\r\n//! UI layouts at runtime without recompiling the Rust core. The runtime\r\n//! is built on `rlua` (or its successor `mlua`) and exposes a curated\r\n//! surface of `oz-core` types to Lua scripts.\r\n//!\r\n//! This crate is currently a scaffold — the binding surface will be\r\n//! added in a follow-up. The error type and module structure are in\r\n//! place so the `rust-backend` skill's conventions apply.\r\n\r\n#![deny(unsafe_code)]\r\n#![warn(missing_docs)]\r\n\r\npub mod "path":["C:","\\","My Script","oz-pos","crates","oz-security","src","lib.rs"],"content":"//! Encryption, secrets, and PCI-DSS helpers for OZ-POS.\r\n//!\r\n//! `oz-security` is responsible for at-rest encryption, secret\r\n//! management, key rotation, and the small set of PCI-DSS-related\r\n//! utilities the cashier flow needs (masked PAN display, audit\r\n//! logging, etc.).\r\n//!\r\n//! This crate is a scaffold. Production code lands in a follow-up\r\n//! once the `oz-payment` crate defines the secret shape it needs.\r\n\r\n#![deny(unsafe_code)]\r\n#![warn(missing_docs)]\r\n\r\npub mod error;\r\n\r\npub use error::SecurityError;\r\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","My Script","oz-pos","src-tauri","build.rs"],"content":"fn main() {\r\n    tauri_build::build()\r\n}\r\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","My Script","oz-pos","src-tauri","src","commands","currencies.rs"],"content":"//! Currency-lookup command for the front-end.\n\nuse serde::Serialize;\nuse tauri::command;\n\nuse crate::error::AppError;\n\n/// Currency info returned to the front-end for formatting.\n#[derive(Debug, Serialize)]\npub struct CurrencyInfo {\n    /// ISO-4217 alpha-3 code, e.g. \"USD\".\n    pub code: String,\n    /// Minor-unit exponent (decimal places), e.g. 2 for USD.\n    pub exponent: u32,\n}\n\n#[command]\npub async fn currency_info(\n    code: String,\n) -\u003e Result\u003cCurrencyInfo, AppError\u003e {\n    let currency: oz_core::Currency = code\n        .parse()\n        .map_err(|_| AppError::Invalid(format!(\"invalid currency code: {code}\")))?;\n    Ok(CurrencyInfo {\n        code: String::from_utf8_lossy(\u0026currency.0).into_owned(),\n        exponent: currency.minor_unit_exponent(),\n    })\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[tokio::test]\n    async fn usd_has_exponent_2() {\n        let info = currency_info(\"USD\".into()).await.unwrap();\n        assert_eq!(info.exponent, 2);\n    }\n\n    #[tokio::test]\n    async fn jpy_has_exponent_0() {\n        let info = currency_info(\"JPY\".into()).await.unwrap();\n        assert_eq!(info.exponent, 0);\n    }\n\n    #[tokio::test]\n    async fn invalid_code_is_error() {\n        assert!(currency_info(\"XX\".into()).await.is_err());\n    }\n}\n","traces":[{"line":18,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":21,"address":[],"length":0,"stats":{"Line":504403158265495552}},{"line":23,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":24,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":25,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":26,"address":[],"length":0,"stats":{"Line":144115188075855872}}],"covered":6,"coverable":6},{"path":["C:","\\","My Script","oz-pos","src-tauri","src","commands","hardware.rs"],"content":"//! Hardware-facing Tauri commands: cash drawer, receipt printer, and the\n//! barcode subscription event. All commands reach into the HAL via\n//! `state.registry` — they never construct a concrete driver.\n\nuse serde::{Deserialize, Serialize};\nuse tauri::{Emitter, State, command};\n\nuse oz_core::{Currency, Money, Settings};\nuse oz_hal::drivers::receipt;\n\nuse crate::error::AppError;\nuse crate::state::AppState;\n\n// ── Cash drawer ─────────────────────────────────────────\n\n#[derive(Debug, Deserialize)]\npub struct OpenCashDrawerArgs {\n    /// Optional device id; defaults to \"default\" which is the mock drawer\n    /// registered at startup.\n    #[serde(default)]\n    pub device_id: Option\u003cString\u003e,\n}\n\n#[derive(Debug, Serialize)]\npub struct OpenCashDrawerResult {\n    pub opened: bool,\n}\n\n#[command]\npub async fn open_cash_drawer(\n    args: OpenCashDrawerArgs,\n    state: State\u003c'_, AppState\u003e,\n) -\u003e Result\u003cOpenCashDrawerResult, AppError\u003e {\n    let id = args.device_id.as_deref().unwrap_or(\"default\");\n    let drawer = state\n        .registry\n        .cash_drawer(id)\n        .await\n        .ok_or_else(|| AppError::Invalid(format!(\"no cash drawer registered as '{id}'\")))?;\n    drawer\n        .open()\n        .await\n        .map_err(|e| AppError::Hardware(e.to_string()))?;\n    Ok(OpenCashDrawerResult { opened: true })\n}\n\n// ── Raw text receipt (legacy) ───────────────────────────\n\n#[derive(Debug, Deserialize)]\npub struct PrintReceiptArgs {\n    /// Raw receipt text (lines separated by '\\n'). ESC/POS commands are\n    /// added by the printer driver; the command layer only knows about\n    /// plain text.\n    pub body: String,\n}\n\n#[derive(Debug, Serialize)]\npub struct PrintReceiptResult {\n    pub printed_lines: usize,\n}\n\n#[command]\npub async fn print_receipt(\n    args: PrintReceiptArgs,\n    state: State\u003c'_, AppState\u003e,\n) -\u003e Result\u003cPrintReceiptResult, AppError\u003e {\n    let printer = state\n        .registry\n        .printer(\"default\")\n        .await\n        .ok_or_else(|| AppError::Invalid(\"no receipt printer registered\".into()))?;\n    let lines: Vec\u003c\u0026str\u003e = args.body.lines().collect();\n    let n = lines.len();\n    printer\n        .print_receipt(\u0026args.body)\n        .await\n        .map_err(|e| AppError::Hardware(e.to_string()))?;\n    // Emit a completion event so the front-end can show a toast.\n    if let Some(ref app) = state.app {\n        let _ = app.emit(\"receipt:printed\", serde_json::json!({ \"lines\": n }));\n    }\n    Ok(PrintReceiptResult { printed_lines: n })\n}\n\n// ── Structured sales receipt ────────────────────────────\n\n#[derive(Debug, Deserialize)]\npub struct PrintSalesReceiptArgs {\n    pub date: String,\n    pub receipt_number: String,\n    pub items: Vec\u003cLineItemDto\u003e,\n    pub subtotal: MoneyDto,\n    pub tax: Option\u003cMoneyDto\u003e,\n    pub total: MoneyDto,\n    pub payments: Vec\u003cPaymentDto\u003e,\n}\n\n#[derive(Debug, Deserialize)]\npub struct LineItemDto {\n    pub name: String,\n    pub quantity: u32,\n    pub unit_price: MoneyDto,\n    pub total_price: MoneyDto,\n}\n\n#[derive(Debug, Deserialize)]\npub struct PaymentDto {\n    pub method: String,\n    pub amount: MoneyDto,\n    pub change: Option\u003cMoneyDto\u003e,\n}\n\n/// Flat serialisable representation of Money — the front-end sends\n/// these instead of a nested Money object for simplicity.\n#[derive(Debug, Deserialize)]\npub struct MoneyDto {\n    pub minor_units: i64,\n    pub currency: String,\n}\n\nimpl MoneyDto {\n    fn to_money(\u0026self) -\u003e Result\u003cMoney, AppError\u003e {\n        let currency: Currency = self\n            .currency\n            .parse()\n            .map_err(|_| AppError::Invalid(format!(\"invalid currency code '{}'\", self.currency)))?;\n        Ok(Money {\n            minor_units: self.minor_units,\n            currency,\n        })\n    }\n}\n\n#[derive(Debug, Serialize)]\npub struct PrintSalesReceiptResult {\n    pub printed: bool,\n}\n\n#[command]\npub async fn print_sales_receipt(\n    args: PrintSalesReceiptArgs,\n    state: State\u003c'_, AppState\u003e,\n) -\u003e Result\u003cPrintSalesReceiptResult, AppError\u003e {\n    let printer = state\n        .registry\n        .printer(\"default\")\n        .await\n        .ok_or_else(|| AppError::Invalid(\"no receipt printer registered\".into()))?;\n\n    // Load store info + display settings from the DB.\n    let conn = state.db.lock().await;\n    let store_name = Settings::get_store_name(\u0026conn)?.unwrap_or_else(|| \"OZ-POS Store\".into());\n    let store_address = Settings::get_store_address(\u0026conn)?.unwrap_or_default();\n    let store_tax_id = Settings::get_store_tax_id(\u0026conn)?;\n    let decimals = Settings::get_receipt_decimal_separator(\u0026conn)?;\n    let decimal_separator = match decimals.as_str() {\n        \"comma\" =\u003e receipt::DecimalSeparator::Comma,\n        \"none\" =\u003e receipt::DecimalSeparator::None,\n        _ =\u003e receipt::DecimalSeparator::Dot,\n    };\n    let paper_width = match Settings::get_receipt_paper_width(\u0026conn)?.as_str() {\n        \"narrow\" =\u003e receipt::PaperWidth::Narrow,\n        _ =\u003e receipt::PaperWidth::Standard,\n    };\n    let config = receipt::ReceiptConfig {\n        paper_width,\n        show_currency: Settings::get_receipt_show_currency(\u0026conn)?,\n        decimal_separator,\n        show_tax: Settings::get_receipt_show_tax(\u0026conn)?,\n        footer: {\n            let f = Settings::get_receipt_footer(\u0026conn)?;\n            if f.is_empty() { None } else { Some(f) }\n        },\n    };\n    drop(conn); // release lock before printing\n\n    let receipt = receipt::SalesReceipt {\n        store: receipt::StoreInfo {\n            name: store_name,\n            address: store_address,\n            tax_id: store_tax_id,\n        },\n        date: args.date,\n        receipt_number: args.receipt_number,\n        items: args\n            .items\n            .into_iter()\n            .map(|i| {\n                Ok::\u003c_, AppError\u003e(receipt::LineItem {\n                    name: i.name,\n                    quantity: i.quantity,\n                    unit_price: i.unit_price.to_money()?,\n                    total_price: i.total_price.to_money()?,\n                })\n            })\n            .collect::\u003cResult\u003cVec\u003c_\u003e, _\u003e\u003e()?,\n        subtotal: args.subtotal.to_money()?,\n        tax: args.tax.map(|t| t.to_money()).transpose()?,\n        total: args.total.to_money()?,\n        payments: args\n            .payments\n            .into_iter()\n            .map(|p| {\n                Ok::\u003c_, AppError\u003e(receipt::PaymentInfo {\n                    method: p.method,\n                    amount: p.amount.to_money()?,\n                    change: p.change.map(|c| c.to_money()).transpose()?,\n                })\n            })\n            .collect::\u003cResult\u003cVec\u003c_\u003e, _\u003e\u003e()?,\n    };\n\n    let data = receipt::format_sales_receipt(\u0026receipt, \u0026config);\n    let line_count = receipt.items.len() + 6;\n\n    printer\n        .print_raw(\u0026data)\n        .await\n        .map_err(|e| AppError::Hardware(e.to_string()))?;\n\n    if let Some(ref app) = state.app {\n        let _ = app.emit(\"receipt:printed\", serde_json::json!({ \"lines\": line_count }));\n    }\n\n    Ok(PrintSalesReceiptResult { printed: true })\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn print_receipt_args_deserialise() {\n        let json = r#\"{\"body\":\"COFFEE\\n3.50\\n\"}\"#;\n        let args: PrintReceiptArgs = serde_json::from_str(json).unwrap();\n        assert_eq!(args.body.lines().count(), 2);\n    }\n\n    #[test]\n    fn money_dto_to_money() {\n        let dto = MoneyDto {\n            minor_units: 1550,\n            currency: \"USD\".into(),\n        };\n        let m = dto.to_money().unwrap();\n        assert_eq!(m.minor_units, 1550);\n    }\n\n    #[test]\n    fn money_dto_invalid_currency() {\n        let dto = MoneyDto {\n            minor_units: 100,\n            currency: \"INVALID\".into(),\n        };\n        assert!(dto.to_money().is_err());\n    }\n\n    #[test]\n    fn print_sales_receipt_args_deserialise() {\n        let json = r#\"{\n            \"date\": \"01 Jan 2026\",\n            \"receipt_number\": \"REC-001\",\n            \"items\": [\n                {\n                    \"name\": \"Coffee\",\n                    \"quantity\": 1,\n                    \"unit_price\": { \"minor_units\": 350, \"currency\": \"USD\" },\n                    \"total_price\": { \"minor_units\": 350, \"currency\": \"USD\" }\n                }\n            ],\n            \"subtotal\": { \"minor_units\": 350, \"currency\": \"USD\" },\n            \"total\": { \"minor_units\": 350, \"currency\": \"USD\" },\n            \"payments\": [\n                {\n                    \"method\": \"CASH\",\n                    \"amount\": { \"minor_units\": 500, \"currency\": \"USD\" },\n  Option\u003cString\u003e,\n    /// Sale price with currency.\n    pub price: MoneyDto,\n    /// Machine-readable barcode (EAN-13, UPC-A, etc.) if available.\n    pub barcode: Option\u003cString\u003e,\n    /// Whether the product is in stock (stock_qty \u003e 0 or null = false).\n    pub in_stock: bool,\n}\n\n/// Money DTO matching the front-end `Money` type (snake_case keys).\n#[derive(Debug, Serialize)]\npub struct MoneyDto {\n    pub minor_units: i64,\n    pub currency: String,\n}\n\n/// Fetch all products from the database.\n///\n/// Returns an array of product DTOs with category names and stock\n/// status. The front-end calls this on mount to populate the product\n/// lookup grid.\n#[command]\npub async fn list_products(state: State\u003c'_, AppState\u003e) -\u003e Result\u003cVec\u003cProductDto\u003e, AppError\u003e {\n    let db = state.db.lock().await;\n    run_list_products(\u0026db)\n}\n\n/// Business logic for listing products (extracted for testing).\nfn run_list_products(conn: \u0026rusqlite::Connection) -\u003e Result\u003cVec\u003cProductDto\u003e, AppError\u003e {\n    let store = Store::new(conn);\n    let products = store.list_products()?;\n\n    let dtos: Vec\u003cProductDto\u003e = products\n        .into_iter()\n        .map(|pwd| {\n            let cur_str = std::str::from_utf8(\u0026pwd.product.price.currency.0)\n                .unwrap_or(\"USD\")\n                .to_owned();\n            ProductDto {\n                sku: pwd.product.sku.to_string(),\n                name: pwd.product.name,\n                category: pwd.category_name,\n                price: MoneyDto {\n                    minor_units: pwd.product.price.minor_units,\n                    currency: cur_str,\n                },\n                barcode: pwd.product.barcode,\n                in_stock: pwd.stock_qty.is_some_and(|q| q \u003e 0),\n            }\n        })\n        .collect();\n\n    Ok(dtos)\n}\n\n// ── Create product ──────────────────────────────────────────────────\n\n#[derive(Debug, Deserialize)]\npub struct CreateProductArgs {\n    pub sku: String,\n    pub name: String,\n    pub price_minor: i64,\n    pub currency: String,\n    pub category_id: Option\u003cString\u003e,\n    pub barcode: Option\u003cString\u003e,\n    pub initial_stock: i64,\n}\n\n#[derive(Debug, Serialize)]\npub struct CreateProductResult {\n    pub sku: String,\n}\n\n#[command]\npub async fn create_product(\n    args: CreateProductArgs,\n    state: State\u003c'_, AppState\u003e,\n) -\u003e Result\u003cCreateProductResult, AppError\u003e {\n    let db = state.db.lock().await;\n    let store = Store::new(\u0026db);\n\n    let currency: oz_core::Currency = args\n        .currency\n        .parse()\n        .map_err(|_| AppError::Invalid(format!(\"invalid currency '{}'\", args.currency)))?;\n\n    let price = Money {\n        minor_units: args.price_minor,\n        currency,\n    };\n\n    store.create_product(\n        \u0026args.sku,\n        \u0026args.name,\n        price,\n        args.category_id.as_deref(),\n        args.barcode.as_deref(),\n        args.initial_stock,\n    )?;\n\n    Ok(CreateProductResult { sku: args.sku })\n}\n\n// ── Update product ──────────────────────────────────────────────────\n\n#[derive(Debug, Deserialize)]\npub struct UpdateProductArgs {\n    pub sku: String,\n    pub name: String,\n    pub price_minor: i64,\n    pub currency: String,\n    pub category_id: Option\u003cString\u003e,\n    pub barcode: Option\u003cString\u003e,\n}\n\n#[derive(Debug, Serialize)]\npub struct UpdateProductResult {\n    pub sku: String,\n}\n\n#[command]\npub async fn update_product(\n    args: UpdateProductArgs,\n    state: State\u003c'_, AppState\u003e,\n) -\u003e Result\u003cUpdateProductResult, AppError\u003e {\n    let db = state.db.lock().await;\n    let store = Store::new(\u0026db);\n\n    let currency: oz_core::Currency = args\n        .currency\n        .parse()\n        .map_err(|_| AppError::Invalid(format!(\"invalid currency '{}'\", args.currency)))?;\n\n    let price = Money {\n        minor_units: args.price_minor,\n        currency,\n    };\n\n    store.update_product(\n        \u0026args.sku,\n        \u0026args.name,\n        price,\n        args.category_id.as_deref(),\n        args.barcode.as_deref(),\n    )?;\n\n    Ok(UpdateProductResult { sku: args.sku })\n}\n\n// ── Delete product ──────────────────────────────────────────────────\n\n#[derive(Debug, Deserialize)]\npub struct DeleteProductArgs {\n    pub sku: String,\n}\n\n#[command]\npub async fn delete_product(\n    args: DeleteProductArgs,\n    state: State\u003c'_, AppState\u003e,\n) -\u003e Result\u003c(), AppError\u003e {\n    let db = state.db.lock().await;\n    let store = Store::new(\u0026db);\n    store.delete_product(\u0026args.sku)?;\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use oz_core::migrations;\n    use rusqlite::Connection;\n\n    fn fresh_conn() -\u003e Connection {\n        let mut conn = Connection::open_in_memory().unwrap();\n        conn.pragma_update(None, \"foreign_keys\", \"ON\").unwrap();\n        conn.pragma_update(None, \"journal_mode\", \"WAL\").unwrap();\n        migrations::run(\u0026mut conn).unwrap();\n        conn\n    }\n\n    #[test]\n    fn list_products_empty_db() {\n        let conn = fresh_conn();\n        let products = run_list_products(\u0026conn).unwrap();\n        assert!(products.is_empty());\n    }\n\n    #[test]\n    fn list_products_with_seeded_data() {\n        let conn = fresh_conn();\n\n        // Seed some products directly via SQL.\n        conn.execute_batch(\n            \"INSERT INTO categories (id, name, colour) VALUES\n                ('cat-drinks', 'Drinks', '#06b6d4'),\n                ('cat-food',   'Food',   '#f97316');\n             INSERT INTO products (id, sku, name, price_minor, currency, category_id, barcode, created_at, updated_at) VALUES\n                ('p1', 'LATTE',  'Caffè Latte',  450, 'USD', 'cat-drinks', '4901234567890', '2025-01-01T00:00:00.000Z', '2025-01-01T00:00:00.000Z'),\n                ('p2', 'BAGEL',  'Plain Bagel',   250, 'USD', 'cat-food',   NULL,           '2025-01-01T00:00:00.000Z', '2025-01-01T00:00:00.000Z'),\n                ('p3', 'BROWNIE','Fudge Brownie', 295, 'USD', 'cat-food',   '4901234567906', '2025-01-01T00:00:00.000Z', '2025-01-01T00:00:00.000Z');\n             INSERT INTO inventory (product_id, qty) VALUES\n                ('p1', 50),\n                ('p2', 12);\",\n        )\n        .unwrap();\n\n        let products = run_list_products(\u0026conn).unwrap();\n        assert_eq!(products.len(), 3);\n\n        // Check LATTE.\n        let latte = products.iter().find(|p| p.sku == \"LATTE\").unwrap();\n        assert_eq!(latte.name, \"Caffè Latte\");\n        assert_eq!(latte.category.as_deref(), Some(\"Drinks\"));\n        assert_eq!(latte.price.minor_units, 450);\n        assert_eq!(latte.barcode.as_deref(), Some(\"4901234567890\"));\n        assert!(latte.in_stock);\n\n        // Check BROWNIE (has no inventory row).\n        let brownie = products.iter().find(|p| p.sku == \"BROWNIE\").unwrap();\n        assert!(!brownie.in_stock);\n    }\n}\n","traces":[{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":51,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":52,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":53,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":55,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":57,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":58,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":59,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":60,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":62,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"lin ency: oz_core::Currency = currency_str\r\n        .parse()\r\n        .map_err(|_| AppError::Invalid(format!(\"invalid currency code: {currency_str}\")))?;\r\n    let cart = Cart::new(currency);\r\n    let id = cart.id();\r\n    state.carts.lock().await.insert(id, cart);\r\n    Ok(StartSaleResult { cart_id: id })\r\n}\r\n\r\n#[derive(Debug, Deserialize)]\r\npub struct AddLineArgs {\r\n    pub cart_id: CartId,\r\n    pub sku: Sku,\r\n    pub qty: i64,\r\n    pub unit_price_minor: i64,\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct AddLineResult {\r\n    pub line_id: LineId,\r\n    /// `None` if `unit_price * qty` overflowed `i64` minor units.\r\n    pub line_total: Option\u003cMoney\u003e,\r\n}\r\n\r\n#[command]\r\npub async fn add_line(\r\n    args: AddLineArgs,\r\n    state: State\u003c'_, AppState\u003e,\r\n) -\u003e Result\u003cAddLineResult, AppError\u003e {\r\n    let currency = {\r\n        let carts = state.carts.lock().await;\r\n        let cart = carts\r\n            .get(\u0026args.cart_id)\r\n            .ok_or_else(|| AppError::Invalid(format!(\"cart not found: {}\", args.cart_id)))?;\r\n        cart.currency()\r\n    };\r\n\r\n    let unit_price = Money {\r\n        minor_units: args.unit_price_minor,\r\n        currency,\r\n    };\r\n    let line = oz_core::CartLine::new(args.sku.clone(), args.qty, unit_price);\r\n    let line_id = line.id;\r\n    let line_total = line.total();\r\n\r\n    let mut carts = state.carts.lock().await;\r\n    let cart = carts\r\n        .get_mut(\u0026args.cart_id)\r\n        .ok_or_else(|| AppError::Invalid(format!(\"cart not found: {}\", args.cart_id)))?;\r\n    cart.add_line(line)\r\n        .map_err(|e| AppError::Invalid(e.to_string()))?;\r\n    Ok(AddLineResult {\r\n        line_id,\r\n        line_total,\r\n    })\r\n}\r\n\r\n#[derive(Debug, Deserialize)]\r\npub struct CompleteSaleArgs {\r\n    pub cart_id: CartId,\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct CompleteSaleResult {\r\n    pub sale_id: Uuid,\r\n    /// `None` if the cart's line totals overflowed `i64` minor units.\r\n    /// The front-end should surface a clear error in that case.\r\n    pub total: Option\u003cMoney\u003e,\r\n    pub line_count: usize,\r\n}\r\n\r\n#[command]\r\npub async fn complete_sale(\r\n    args: CompleteSaleArgs,\r\n    state: State\u003c'_, AppState\u003e,\r\n) -\u003e Result\u003cCompleteSaleResult, AppError\u003e {\r\n    let mut carts = state.carts.lock().await;\r\n    let cart = carts\r\n        .remove(\u0026args.cart_id)\r\n        .ok_or_else(|| AppError::Invalid(format!(\"cart not found: {}\", args.cart_id)))?;\r\n    let total = cart.total();\r\n    let line_count = cart.line_count();\r\n    let sale_id = Uuid::new_v4();\r\n    tracing::info!(%sale_id, ?total, line_count, \"sale completed\");\r\n    Ok(CompleteSaleResult {\r\n        sale_id,\r\n        total,\r\n        line_count,\r\n    })\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use oz_core::Currency;\r\n    use oz_core::CartLine;\r\n\r\n    fn usd() -\u003e Currency {\r\n        \"USD\".parse().unwrap()\r\n    }\r\n\r\n    fn price(minor: i64) -\u003e Money {\r\n        Money {\r\n            minor_units: minor,\r\n            currency: usd(),\r\n        }\r\n    }\r\n\r\n    #[test]\r\n    fn start_cart_add_line() {\r\n        // Test the core cart logic directly without Tauri commands.\r\n        let mut cart = oz_core::Cart::new(usd());\r\n        let cart_id = cart.id();\r\n\r\n        let line = CartLine::new(Sku::new(\"COFFEE\"), 2, price(350));\r\n        cart.add_line(line).unwrap();\r\n\r\n        // Verify cart state.\r\n        assert_eq!(cart.line_count(), 1);\r\n        let total = cart.total();\r\n        assert_eq!(total.unwrap().minor_units, 700);\r\n        assert_eq!(total.unwrap().currency, usd());\r\n        assert!(!cart_id.to_string().is_empty());\r\n\r\n        // Second line.\r\n        let line2 = CartLine::new(Sku::new(\"BAGEL\"), 1, price(450));\r\n        cart.add_line(line2).unwrap();\r\n        assert_eq!(cart.line_count(), 2);\r\n        assert_eq!(cart.total().unwrap().minor_units, 1150);\r\n    }\r\n\r\n    #[test]\r\n    fn cart_total_with_fractional_qty() {\r\n        let mut cart = oz_core::Cart::new(usd());\r\n        let line = CartLine::new(Sku::new(\"TEA\"), 3, price(200));\r\n        let line_total = line.total().unwrap();\r\n        cart.add_line(line).unwrap();\r\n        assert_eq!(line_total.minor_units, 600);\r\n        assert_eq!(cart.total().unwrap().minor_units, 600);\r\n    }\r\n}\r\n","traces":[{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":39,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":43,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":48,"address":[],"length":0,"stats":{"Line":0}},{"line":49,"address":[],"length":0,"stats":{"Line":0}},{"line":68,"address":[],"length":0,"stats":{"Line":0}},{"line":72,"address":[],"length":0,"stats":{"Line":0}},{"line":73,"address":[],"length":0,"stats":{"Line":0}},{"line":74,"address":[],"length":0,"stats":{"Line":0}},{"line":75,"address":[],"length":0,"stats":{"Line":0}},{"line":76,"address":[],"length":0,"stats":{"Line":0}},{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[],"length":0,"stats":{"Line":0}},{"line":84,"address":[],"length":0,"stats":{"Line":0}},{"line":85,"address":[],"length":0,"stats":{"Line":0}},{"line":86,"address":[],"length":0,"stats":{"Line":0}},{"line":88,"address":[],"length":0,"stats":{"Line":0}},{"line":89,"address":[],"length":0,"stats":{"Line":0}},{"line":90,"address":[],"length":0,"stats":{"Line":0}},{"line":91,"address":[],"length":0,"stats":{"Line":0}},{"line":92,"address":[],"length":0,"stats":{"Line":0}},
