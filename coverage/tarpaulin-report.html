x line.\n    pub show_tax: bool,\n    /// Footer text (empty = disabled).\n    pub footer: String,\n    /// Paper width: `\"standard\"` or `\"narrow\"`.\n    pub paper_width: String,\n}\n\n// ── Get receipt settings ──────────────────────────────────\n\n#[command]\npub async fn get_receipt_settings(\n    state: State\u003c'_, AppState\u003e,\n) -\u003e Result\u003cReceiptSettingsDto, AppError\u003e {\n    let conn = state.db.lock().await;\n\n    Ok(ReceiptSettingsDto {\n        show_currency: Settings::get_receipt_show_currency(\u0026conn)?,\n        decimal_separator: Settings::get_receipt_decimal_separator(\u0026conn)?,\n        show_tax: Settings::get_receipt_show_tax(\u0026conn)?,\n        footer: Settings::get_receipt_footer(\u0026conn)?,\n        paper_width: Settings::get_receipt_paper_width(\u0026conn)?,\n    })\n}\n\n// ── Set receipt settings ──────────────────────────────────\n\n#[command]\npub async fn set_receipt_settings(\n    args: ReceiptSettingsDto,\n    state: State\u003c'_, AppState\u003e,\n) -\u003e Result\u003c(), AppError\u003e {\n    let conn = state.db.lock().await;\n\n    let tx = conn.unchecked_transaction()?;\n\n    Settings::set_receipt_show_currency(\u0026tx, args.show_currency)?;\n    Settings::set_receipt_decimal_separator(\u0026tx, \u0026args.decimal_separator)?;\n    Settings::set_receipt_show_tax(\u0026tx, args.show_tax)?;\n    Settings::set_receipt_footer(\u0026tx, \u0026args.footer)?;\n    Settings::set_receipt_paper_width(\u0026tx, \u0026args.paper_width)?;\n\n    tx.commit()?;\n\n    Ok(())\n}\n\n// ── Store info DTO ────────────────────────────────────────────\n\n/// Store name, address, and tax ID – shown on printed receipts.\n#[derive(Debug, Serialize, Deserialize)]\npub struct StoreSettingsDto {\n    pub name: String,\n    pub address: String,\n    pub tax_id: String,\n}\n\n// ── Get store settings ────────────────────────────────────────\n\n#[command]\npub async fn get_store_settings(\n    state: State\u003c'_, AppState\u003e,\n) -\u003e Result\u003cStoreSettingsDto, AppError\u003e {\n    let conn = state.db.lock().await;\n\n    Ok(StoreSettingsDto {\n        name: Settings::get_store_name(\u0026conn)?.unwrap_or_default(),\n        address: Settings::get_store_address(\u0026conn)?.unwrap_or_default(),\n        tax_id: Settings::get_store_tax_id(\u0026conn)?.unwrap_or_default(),\n    })\n}\n\n// ── Set store settings ────────────────────────────────────────\n\n#[command]\npub async fn set_store_settings(\n    args: StoreSettingsDto,\n    state: State\u003c'_, AppState\u003e,\n) -\u003e Result\u003c(), AppError\u003e {\n    let conn = state.db.lock().await;\n    let tx = conn.unchecked_transaction()?;\n\n    Settings::set_store_name(\u0026tx, \u0026args.name)?;\n    Settings::set_store_address(\u0026tx, \u0026args.address)?;\n    Settings::set_store_tax_id(\u0026tx, \u0026args.tax_id)?;\n\n    tx.commit()?;\n\n    Ok(())\n}\n","traces":[{"line":37,"address":[],"length":0,"stats":{"Line":0}},{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":43,"address":[],"length":0,"stats":{"Line":0}},{"line":44,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":54,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"length":0,"stats":{"Line":0}},{"line":60,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":63,"address":[],"length":0,"stats":{"Line":0}},{"line":64,"address":[],"length":0,"stats":{"Line":0}},{"line":65,"address":[],"length":0,"stats":{"Line":0}},{"line":66,"address":[],"length":0,"stats":{"Line":0}},{"line":68,"address":[],"length":0,"stats":{"Line":0}},{"line":70,"address":[],"length":0,"stats":{"Line":0}},{"line":86,"address":[],"length":0,"stats":{"Line":0}},{"line":89,"address":[],"length":0,"stats":{"Line":0}},{"line":92,"address":[],"length":0,"stats":{"Line":0}},{"line":93,"address":[],"length":0,"stats":{"Line":0}},{"line":94,"address":[],"length":0,"stats":{"Line":0}},{"line":101,"address":[],"length":0,"stats":{"Line":0}},{"line":105,"address":[],"length":0,"stats":{"Line":0}},{"line":106,"address":[],"length":0,"stats":{"Line":0}},{"line":108,"address":[],"length":0,"stats":{"Line":0}},{"line":109,"address":[],"length":0,"stats":{"Line":0}},{"line":110,"address":[],"length":0,"stats":{"Line":0}},{"line":112,"address":[],"length":0,"stats":{"Line":0}},{"line":114,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":30},{"path":["C:","\\","My Script","oz-pos","src-tauri","src","commands","setup.rs"],"content":"//! Setup Wizard commands.\n//!\n//! `complete_setup` persists the chosen preset and enabled features to\n//! the settings table and marks the wizard as complete.\n//! `get_setup_status` lets the front-end decide whether to show the\n//! wizard or go straight to the main app.\n\nuse serde::{Deserialize, Serialize};\nuse tauri::{command, State};\nuse oz_core::{features, FeatureRegistry, Store, Settings};\n\nuse crate::error::AppError;\nuse crate::state::AppState;\n\n// ── Args ─────────────────────────────────────────────────────────────\n\n#[derive(Debug, Deserialize)]\npub struct CompleteSetupArgs {\n    /// Store preset name (e.g. `\"simple-retail\"`, `\"restaurant\"`).\n    pub preset: String,\n    /// Enabled feature keys (kebab-case, e.g. `\"cash-payment\"`).\n    pub features: Vec\u003cString\u003e,\n}\n\n// ── Response types ───────────────────────────────────────────────────\n\n#[derive(Debug, Serialize)]\npub struct SetupStatus {\n    /// Whether the setup wizard has been completed.\n    pub completed: bool,\n    /// The store preset name, if set.\n    pub preset: Option\u003cString\u003e,\n}\n\n// ── Commands ─────────────────────────────────────────────────────────\n\n/// Persist the chosen preset and features, then mark setup as complete.\n///\n/// Called by the front-end when the user clicks \"Complete Setup\" on\n/// the last step of the wizard.\n#[command]\npub async fn complete_setup(\n    state: State\u003c'_, AppState\u003e,\n    args: CompleteSetupArgs,\n) -\u003e Result\u003c(), AppError\u003e {\n    let db = state.db.lock().await;\n\n    // Convert feature key strings → Feature enum variants.\n    let mut registry = FeatureRegistry::new();\n    for key in \u0026args.features {\n        if let Some(feat) = features::feature_from_key(key) {\n            registry.enable(feat);\n        } else {\n            tracing::warn!(feature = %key, \"unknown feature key in setup, skipping\");\n        }\n    }\n\n    // Save features + preset + completed flag in a single transaction.\n    let tx = db.unchecked_transaction()?;\n    {\n        let store = Store::new(\u0026tx);\n\n        // 1. Persist features.\n        store.save_features(\u0026registry)?;\n\n        // 2. Prune stale feature rows that are no longer enabled.\n        Settings::prune_stale_features(\u0026tx, \u0026registry)?;\n\n        // 3. Save the preset name.\n        Settings::set(\u0026tx, oz_core::settings::keys::STORE_PRESET, \u0026args.preset)?;\n\n        // 4. Mark setup as complete.\n        Settings::set(\u0026tx, oz_core::settings::keys::SETUP_COMPLETE, \"1\")?;\n    }\n    tx.commit()?;\n\n    tracing::info!(\n        preset = %args.preset,\n        feature_count = %args.features.len(),\n        \"setup wizard completed\"\n    );\n\n    Ok(())\n}\n\n/// Returns whether the setup wizard has been completed.\n///\n/// The front-end calls this on mount to decide whether to render\n/// the wizard or the main application.\n#[command]\npub async fn get_setup_status(state: State\u003c'_, AppState\u003e) -\u003e Result\u003cSetupStatus, AppError\u003e {\n    let db = state.db.lock().await;\n\n    let completed = Settings::get(\u0026db, oz_core::settings::keys::SETUP_COMPLETE)?\n        .map(|v| v == \"1\")\n        .unwrap_or(false);\n\n    let preset = Settings::get(\u0026db, oz_core::settings::keys::STORE_PRESET)?;\n\n    Ok(SetupStatus { completed, preset })\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use oz_core::migrations;\n    use rusqlite::Connection;\n\n    /// Create a fresh in-memory connection with migrations applied.\n    fn fresh_conn() -\u003e Connection {\n        let mut conn = Connection::open_in_memory().unwrap();\n        conn.pragma_update(None, \"foreign_keys\", \"ON\").unwrap();\n        migrations::run(\u0026mut conn).unwrap();\n        conn\n    }\n\n    /// Run the same logic as `complete_setup` but with a plain\n    /// `\u0026Connection` so tests don't need a Tauri runtime.\n    ///\n    /// Each individual operation (`save_features`, `prune_stale_features`,\n    /// `set`) handles its own transaction internally. The production\n    /// `complete_setup` command wraps them in a single outer transaction\n    /// for atomicity; tests verify the operations individually.\n    fn run_complete_setup(\n        conn: \u0026Connection,\n        preset: \u0026str,\n        features: \u0026[\u0026str],\n    ) -\u003e Result\u003c(), Box\u003cdyn std::error::Error\u003e\u003e {\n        let mut registry = FeatureRegistry::new();\n        for \u0026key in features {\n            if let Some(feat) = features::feature_from_key(key) {\n                registry.enable(feat);\n            }\n        }\n\n        let store = Store::new(conn);\n        store.save_features(\u0026registry)?;\n        Settings::prune_stale_features(conn, \u0026registry)?;\n        Settings::set(conn, oz_core::settings::keys::STORE_PRESET, preset)?;\n        Settings::set(conn, oz_core::settings::keys::SETUP_COMPLETE, \"1\")?;\n        Ok(())\n    }\n\n    #[test]\n    fn complete_setup_persists_features() {\n        let conn = fresh_conn();\n\n        run_complete_setup(\n            \u0026conn,\n            \"simple-retail\",\n            \u0026[\n                \"cash-payment\",\n                \"barcode-scanning\",\n                \"receipt-printing\",\n                \"inventory-tracking\",\n                \"categories-enabled\",\n                \"tax-engine\",\n            ],\n        )\n        .unwrap();\n\n        // Verify setup is marked complete.\n        let completed = Settings::get(\u0026conn, oz_core::settings::keys::SETUP_COMPLETE)\n            .unwrap()\n            .unwrap();\n        assert_eq!(completed, \"1\");\n\n        let preset = Settings::get(\u0026conn, oz_core::settings::keys::STORE_PRESET)\n            .unwrap()\n            .unwrap();\n        assert_eq!(preset, \"simple-retail\");\n    }\n\n    #[test]\n    fn get_setup_status_defaults_to_not_completed() {\n        let conn = fresh_conn();\n\n        let completed = Settings::get(\u0026conn, oz_core::settings::keys::SETUP_COMPLETE)\n            .unwrap();\n        assert_eq!(completed, None);\n\n        let preset = Settings::get(\u0026conn, oz_core::settings::keys::STORE_PRESET)\n            .unwrap();\n        assert_eq!(preset, None);\n    }\n\n    #[test]\n    fn complete_setup_skips_unknown_features() {\n        let conn = fresh_conn();\n\n        run_complete_setup(\n            \u0026conn,\n            \"custom\",\n            \u0026[\"cash-payment\", \"made-up-feature\"], // unknown, should be skipped\n        )\n        .unwrap();\n\n        // Should still succeed.\n        let completed = Settings::get(\u0026conn, oz_core::settings::keys::SETUP_COMPLETE)\n            .unwrap()\n            .unwrap();\n        assert_eq!(completed, \"1\");\n\n        // Only cash-payment should be enabled.\n        let store = Store::new(\u0026conn);\n        let loaded = store.load_features().unwrap();\n        assert!(loaded.is_enabled(oz_core::Feature::CashPayment));\n        assert!(!loaded.is_enabled(oz_core::Feature::BarcodeScanning));\n    }\n\n    #[test]\n    fn complete_setup_empty_features() {\n        let conn = fresh_conn();\n\n        run_complete_setup(\u0026conn, \"empty-store\", \u0026[]).unwrap();\n\n        let completed = Settings::get(\u0026conn, oz_core::settings::keys::SETUP_COMPLETE)\n            .unwrap()\n            .unwrap();\n        assert_eq!(completed, \"1\");\n\n        let preset = Settings::get(\u0026conn, oz_core::settings::keys::STORE_PRESET)\n            .unwrap()\n            .unwrap();\n        assert_eq!(preset, \"empty-store\");\n\n        // No features should be enabled.\n        let store = Store::new(\u0026conn);\n        let loaded = store.load_features().unwrap();\n        assert_eq!(loaded.count(), 0);\n    }\n\n    #[test]\n    fn complete_setup_with_different_presets() {\n        let conn = fresh_conn();\n\n        // Test restaurant preset.\n        run_complete_setup(\n            \u0026conn,\n            \"restaurant\",\n            \u0026[\n                \"restaurant\",\n                \"cash-payment\",\n                \"receipt-printing\",\n                \"inventory-tracking\",\n                \"categories-enabled\",\n                \"discount-engine\",\n                \"tax-engine\",\n                \"kitchen-display\",\n                \"table-management\",\n                \"staff-login\",\n            ],\n        )\n        .unwrap();\n\n        let completed = Settings::get(\u0026conn, oz_core::settings::keys::SETUP_COMPLETE)\n            .unwrap()\n            .unwrap();\n        assert_eq!(completed, \"1\");\n\n        let preset = Settings::get(\u0026conn, oz_core::settings::keys::STORE_PRESET)\n            .unwrap()\n            .unwrap();\n        assert_eq!(preset, \"restaurant\");\n\n        // Verify restaurant-specific features.\n        let store = Store::new(\u0026conn);\n        let loaded = store.load_features().unwrap();\n        assert!(loaded.is_enabled(oz_core::Feature::Restaurant));\n        assert!(loaded.is_enabled(oz_core::Feature::KitchenDisplay));\n        assert!(loaded.is_enabled(oz_core::Feature::TableManagement));\n        assert!(loaded.is_enabled(oz_core::Feature::StaffLogin));\n        assert!(!loaded.is_enabled(oz_core::Feature::SimpleRetail));\n        assert!(!loaded.is_enabled(oz_core::Feature::CardPayment));\n    }\n\n    #[test]\n    fn complete_setup_all_features_single_preset() {\n        let conn = fresh_conn();\n\n        // Full-store preset: 24 feature keys.\n        run_complete_setup(\n            \u0026conn,\n            \"full-store\",\n            \u0026[\n                \"simple-retail\",\n                \"cash-payment\",\n                \"card-payment\",\n                \"multi-currency\",\n                \"inventory-tracking\",\n                \"product-variants\",\n                \"categories-enabled\",\n                \"staff-login\",\n                \"staff-roles\",\n                \"shift-management\",\n                \"audit-log\",\n                \"barcode-scanning\",\n                \"receipt-printing\",\n                \"cash-drawer\",\n                \"customer-display\",\n                \"nfc-reader\",\n                \"discount-engine\",\n                \"tax-engine\",\n                \"loyalty-program\",\n                \"promotions-engine\",\n                \"product-bundles\",\n                \"reporting\",\n                \"analytics\",\n                \"export-import\",\n            ],\n        )\n        .unwrap();\n\n        let store = Store::new(\u0026conn);\n        let loaded = store.load_features().unwrap();\n        assert!(loaded.count() \u003e= 20);\n        assert!(loaded.is_enabled(oz_core::Feature::SimpleRetail));\n        assert!(loaded.is_enabled(oz_core::Feature::Analytics));\n\n        // Prune should be a no-op since all features match.\n        let removed = Settings::prune_stale_features(\u0026conn, \u0026loaded).unwrap();\n        assert_eq!(removed, 0);\n    }\n\n    #[test]\n    fn complete_setup_allows_multiple_calls() {\n        let conn = fresh_conn();\n\n        // First call with simple-retail.\n        run_complete_setup(\n            \u0026conn,\n            \"simple-retail\",\n            \u0026[\"cash-payment\", \"barcode-scanning\", \"receipt-printing\"],\n        )\n        .unwrap();\n\n        // Second call overwrites with restaurant (pruning handles cleanup).\n        run_complete_setup(\n            \u0026conn,\n            \"restaurant\",\n            \u0026[\n                \"restaurant\",\n                \"cash-payment\",\n                \"kitchen-display\",\n                \"table-management\",\n                \"staff-login\",\n            ],\n        )\n        .unwrap();\n\n        // Preset was overwritten.\n        let preset = Settings::get(\u0026conn, oz_core::settings::keys::STORE_PRESET)\n            .unwrap()\n            .unwrap();\n        assert_eq!(preset, \"restaurant\");\n\n        // Features should be from restaurant, not simple-retail.\n        let store = Store::new(\u0026conn);\n        let loaded = store.load_features().unwrap();\n        assert!(loaded.is_enabled(oz_core::Feature::Restaurant));\n        assert!(!loaded.is_enabled(oz_core::Feature::SimpleRetail));\n    }\n\n    #[test]\n    fn complete_setup_persists_all_settings() {\n        let conn = fresh_conn();\n\n        run_complete_setup(\n            \u0026conn,\n            \"simple-retail\",\n            \u0026[\"cash-payment\", \"receipt-printing\"],\n        )\n        .unwrap();\n\n        // Verify DB state directly.\n        let complete = Settings::get(\u0026conn, oz_core::settings::keys::SETUP_COMPLETE)\n            .unwrap()\n            .unwrap();\n        assert_eq!(complete, \"1\");\n\n        let preset = Settings::get(\u0026conn, oz_core::settings::keys::STORE_PRESET)\n            .unwrap()\n            .unwrap();\n        assert_eq!(preset, \"simple-retail\");\n\n        // Feature flags.\n        let cash = Settings::get(\u0026conn, \"feature.cash-payment\").unwrap().unwrap();\n        assert_eq!(cash, \"1\");\n        let receipt = Settings::get(\u0026conn, \"feature.receipt-printing\").unwrap().unwrap();\n        assert_eq!(receipt, \"1\");\n\n        // Unknown feature should NOT be present.\n        assert_eq!(Settings::get(\u0026conn, \"feature.card-payment\").unwrap(), None);\n    }\n\n    #[test]\n    fn complete_setup_without_transaction_leaves_partial_state() {\n        let conn = fresh_conn();\n\n        // Run a successful setup first.\n        run_complete_setup(\u0026conn, \"simple-retail\", \u0026[\"cash-payment\"]).unwrap();\n\n        // Write feature rows, preset (but NOT setup_complete) outside a\n        // transaction, simulating a crash halfway through.\n        {\n            let mut registry = FeatureRegistry::new();\n            registry.enable(oz_core::Feature::CardPayment);\n\n            let store = Store::new(\u0026conn);\n            store.save_features(\u0026registry).unwrap();\n            Settings::prune_stale_features(\u0026conn, \u0026registry).unwrap();\n            Settings::set(\u0026conn, oz_core::settings::keys::STORE_PRESET, \"broken\").unwrap();\n            // Crashing here — setup_complete is NOT written.\n        }\n\n        // setup_complete is still \"1\" from the first call because the\n        // second attempt crashed before writing it.\n        let complete = Settings::get(\u0026conn, oz_core::settings::keys::SETUP_COMPLETE)\n            .unwrap()\n            .unwrap();\n        assert_eq!(complete, \"1\");\n\n        // preset was written (outside a transaction, so visible despite crash).\n        let preset = Settings::get(\u0026conn, oz_core::settings::keys::STORE_PRESET)\n            .unwrap()\n            .unwrap();\n        assert_eq!(preset, \"broken\");\n    }\n\n    #[test]\n    fn complete_setup_twice_preserves_latest() {\n        let conn = fresh_conn();\n\n        // Run setup twice with different presets.\n        run_complete_setup(\n            \u0026conn,\n            \"first\",\n            \u0026[\"cash-payment\", \"barcode-scanning\"],\n        )\n        .unwrap();\n\n        run_complete_setup(\n            \u0026conn,\n            \"second\",\n            \u0026[\"restaurant\", \"cash-payment\", \"kitchen-display\"],\n        )\n        .unwrap();\n\n        // Second setup's results are in effect.\n        let preset = Settings::get(\u0026conn, oz_core::settings::keys::STORE_PRESET)\n            .unwrap()\n            .unwrap();\n        assert_eq!(preset, \"second\");\n\n        let store = Store::new(\u0026conn);\n        let loaded = store.load_features().unwrap();\n        assert!(loaded.is_enabled(oz_core::Feature::Restaurant));\n        assert!(loaded.is_enabled(oz_core::Feature::KitchenDisplay));\n        assert!(!loaded.is_enabled(oz_core::Feature::BarcodeScanning));\n        assert!(!loaded.is_enabled(oz_core::Feature::SimpleRetail));\n    }\n}\n","traces":[{"line":42,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":49,"address":[],"length":0,"stats":{"Line":0}},{"line":50,"address":[],"length":0,"stats":{"Line":0}},{"line":51,"address":[],"length":0,"stats":{"Line":0}},{"line":52,"address":[],"length":0,"stats":{"Line":0}},{"line":54,"address":[],"length":0,"stats":{"Line":0}},{"line":59,"address":[],"length":0,"stats":{"Line":0}},{"line":61,"address":[],"length":0,"stats":{"Line":0}},{"line":64,"address":[],"length":0,"stats":{"Line":0}},{"line":67,"address":[],"length":0,"stats":{"Line":0}},{"line":70,"address":[],"length":0,"stats":{"Line":0}},{"line":73,"address":[],"length":0,"stats":{"Line":0}},{"line":75,"address":[],"length":0,"stats":{"Line":0}},{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":79,"address":[],"length":0,"stats":{"Line":0}},{"line":83,"address":[],"length":0,"stats":{"Line":0}},{"line":91,"address":[],"length":0,"stats":{"Line":0}},{"line":92,"address":[],"length":0,"stats":{"Line":0}},{"line":94,"address":[],"length":0,"stats":{"Line":0}},{"line":95,"address":[],"length":0,"stats":{"Line":0}},{"line":98,"address":[],"length":0,"stats":{"Line":0}},{"line":100,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":23},{"path":["C:","\\","My Script","oz-pos","src-tauri","src","error.rs"],"content":"//! `AppError` — the single error type returned by every Tauri command.\r\n//!\r\n//! Marked `#[serde(tag = \"kind\", rename_all = \"camelCase\")]` so the\r\n//! TypeScript side sees a `kind` discriminator field, and `non_exhaustive`\r\n//! so new variants can be added without breaking semver.\r\n//!\r\n//! On the front-end, `ui/src/types/domain.ts` mirrors this shape.\r\n//!\r\n//! # TODO(structured-payload)\r\n//!\r\n//! The current `From\u003coz_core::CoreError\u003e` / `From\u003coz_hal::HalError\u003e`\r\n//! impls call `.to_string()` and lose the typed variant. The next\r\n//! refactor should carry a structured sub-payload — e.g.\r\n//! `AppError::Core { kind: CoreErrorKind, message: String }` — so the\r\n//! front-end can branch on both the top-level `kind` and a typed\r\n//! sub-discriminator. The `tauri-ipc` skill calls this out.\r\n\r\nuse serde::Serialize;\r\nuse thiserror::Error;\r\n\r\n/// Discriminated error returned by every `#[tauri::command]`.\r\n#[derive(Debug, Error, Serialize)]\r\n#[serde(tag = \"kind\", rename_all = \"camelCase\")]\r\n#[non_exhaustive]\r\npub enum AppError {\r\n    /// Wraps any `oz_core::CoreError` (DB, money, currency mismatch, …).\r\n    #[error(\"core error: {0}\")]\r\n    Core(String),\r\n\r\n    /// Wraps any `oz_hal::HalError` (device not found, USB timeout, …).\r\n    #[error(\"hardware error: {0}\")]\r\n    Hardware(String),\r\n\r\n    /// A Tauri-level error (state missing, invalid argument, …).\r\n    #[error(\"invalid request: {0}\")]\r\n    Invalid(String),\r\n\r\n    /// Catch-all for unexpected internal errors. Logged with full context.\r\n    #[error(\"internal error: {0}\")]\r\n    Internal(String),\r\n}\r\n\r\nimpl From\u003coz_core::CoreError\u003e for AppError {\r\n    fn from(e: oz_core::CoreError) -\u003e Self {\r\n        Self::Core(e.to_string())\r\n    }\r\n}\r\n\r\nimpl From\u003coz_hal::HalError\u003e for AppError {\r\n    fn from(e: oz_hal::HalError) -\u003e Self {\r\n        Self::Hardware(e.to_string())\r\n    }\r\n}\r\n\r\nimpl From\u003ctauri::Error\u003e for AppError {\r\n    fn from(e: tauri::Error) -\u003e Self {\r\n        Self::Internal(e.to_string())\r\n    }\r\n}\r\n\r\nimpl From\u003canyhow::Error\u003e for AppError {\r\n    fn from(e: anyhow::Error) -\u003e Self {\r\n        Self::Internal(format!(\"{e:#}\"))\r\n    }\r\n}\r\n\r\nimpl From\u003crusqlite::Error\u003e for AppError {\r\n    fn from(e: rusqlite::Error) -\u003e Self {\r\n        Self::Core(format!(\"sqlite: {e}\"))\r\n    }\r\n}\r\n","traces":[{"line":44,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":50,"address":[],"length":0,"stats":{"Line":0}},{"line":51,"address":[],"length":0,"stats":{"Line":0}},{"line":56,"address":[],"length":0,"stats":{"Line":0}},{"line":57,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":63,"address":[],"length":0,"stats":{"Line":0}},{"line":68,"address":[],"length":0,"stats":{"Line":0}},{"line":69,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":10},{"path":["C:","\\","My Script","oz-pos","src-tauri","src","lib.rs"],"content":"//! Tauri v2 application entry point.\r\n//!\r\n//! Wires the [`AppState`] (DB connection, driver registry, config) into the\r\n//! Tauri builder, registers all `#[tauri::command]` handlers, and starts the\r\n//! runtime. Mobile builds use the same code via `#[cfg_attr(mobile,\r\n//! tauri::mobile_entry_point)]`.\r\n//!\r\n//! Adding a new command:\r\n//! 1. Define `pub async fn` with `#[tauri::command]` in `commands/\u003cfeature\u003e.rs`.\r\n//! 2. Add it to the `invoke_handler!` macro below in the same order as the\r\n//!    `commands` module re-exports.\r\n//! 3. Document the command in the `tauri-ipc` skill.\r\n\r\npub mod commands;\r\npub mod error;\r\npub mod state;\r\n\r\nuse tauri::Manager;\r\nuse crate::error::AppError;\r\nuse crate::state::AppState;\r\n\r\n#[cfg_attr(mobile, tauri::mobile_entry_point)]\r\npub fn run() {\r\n    // Initialise structured logging early so the very first line of Tauri\r\n    // output is captured.\r\n    oz_logging::init();\r\n\r\n    let result: Result\u003c(), AppError\u003e = tauri::Builder::default()\r\n        .plugin(tauri_plugin_updater::Builder::new().build())\r\n        .setup(|app| {\r\n            let state = AppState::new(app.handle())\r\n                .map_err(|e| Box::new(e) as Box\u003cdyn std::error::Error\u003e)?;\r\n            app.manage(state);\r\n            Ok(())\r\n        })\r\n        .invoke_handler(tauri::generate_handler![\r\n            commands::currencies::currency_info,\r\n            commands::health::ping,\r\n            commands::health::version,\r\n            commands::sales::start_sale,\r\n            commands::sales::add_line,\r\n            commands::sales::complete_sale,\r\n            commands::hardware::open_cash_drawer,\r\n            commands::hardware::print_receipt,\r\n            commands::hardware::print_sales_receipt,\r\n            commands::settings::get_receipt_settings,\r\n            commands::settings::set_receipt_settings,\r\n            commands::settings::get_store_settings,\r\n            commands::settings::set_store_settings,\r\n            commands::setup::complete_setup,\r\n            commands::products::list_products,\r\n            commands::products::create_product,\r\n            commands::products::update_product,\r\n            commands::products::delete_product,\r\n            commands::setup::get_setup_status,\r\n        ])\r\n        .run(tauri::generate_context!())\r\n        .map_err(AppError::from);\r\n\r\n    if let Err(e) = result {\r\n        tracing::error!(error = %e, \"OZ-POS exited with error\");\r\n        std::process::exit(1);\r\n    }\r\n}\r\n","traces":[{"line":23,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":29,"address":[],"length":0,"stats":{"Line":0}},{"line":30,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":36,"address":[],"length":0,"stats":{"Line":0}},{"line":57,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"length":0,"stats":{"Line":0}},{"line":60,"address":[],"length":0,"stats":{"Line":0}},{"line":61,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":15},{"path":["C:","\\","My Script","oz-pos","src-tauri","src","main.rs"],"content":"// Prevents an additional console window on Windows in release builds.\r\n#![cfg_attr(not(debug_assertions), windows_subsystem = \"windows\")]\r\n\r\nfn main() {\r\n    oz_pos_app_lib::run();\r\n}\r\n","traces":[{"line":4,"address":[],"length":0,"stats":{"Line":0}},{"line":5,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":2},{"path":["C:","\\","My Script","oz-pos","src-tauri","src","state.rs"],"content":"//! `AppState` — the long-lived state managed by Tauri and reached via\r\n//! `State\u003c'_, AppState\u003e` in every command.\r\n//!\r\n//! Holds:\r\n//! - A `rusqlite::Connection` (behind a `tokio::sync::Mutex`) for DB access.\r\n//! - A `DriverRegistry` from `oz_hal` for hardware access.\r\n//! - The Tauri `AppHandle` for emitting events back to the front-end.\r\n//!\r\n//! `AppState::new` opens the local SQLite database, runs migrations, and\r\n//! creates an empty `DriverRegistry`. Hardware is registered at runtime\r\n//! via the setup wizard (or a future `init_hardware` command); the front\r\n//! end never assumes a particular device is plugged in at startup.\r\n//!\r\n//! # Connection pooling\r\n//!\r\n//! The `Mutex\u003cConnection\u003e` here is a single-connection placeholder. A\r\n//! real deployment will switch to `r2d2_sqlite` or `deadpool-sqlite`\r\n//! so that Tauri commands can issue concurrent reads (the `rust-backend`\r\n//! skill prescribes this; switching is mechanical).\r\n\r\nuse std::collections::HashMap;\r\nuse std::path::PathBuf;\r\nuse std::sync::Arc;\r\n\r\nuse rusqlite::Connection;\r\nuse tauri::AppHandle;\r\nuse tauri::Manager;\r\nuse tokio::sync::Mutex;\r\n\r\nuse oz_core::{migrations, Cart, CartId};\r\nuse oz_hal::DriverRegistry;\r\n\r\nuse crate::error::AppError;\r\n\r\n/// Shared application state.\r\npub struct AppState {\r\n    /// SQLite connection for the local store. Wrapped in a `Mutex` so\r\n    /// commands can borrow it across `.await` points safely.\r\n    pub db: Mutex\u003cConnection\u003e,\r\n\r\n    /// HAL driver registry. Use `state.registry.scanner(id)` etc.\r\n    pub registry: Arc\u003cDriverRegistry\u003e,\r\n\r\n    /// Tauri app handle, used for emitting events to the front-end.\r\n    /// `None` in test or headless contexts where no UI is attached.\r\n    pub app: Option\u003cAppHandle\u003e,\r\n\r\n    /// Path to the SQLite database file (for diagnostics + `oz-cli` reuse).\r\n    pub db_path: PathBuf,\r\n\r\n    /// In-memory cart store shared across sales commands.\r\n    /// TODO(oz-core): replace with a SQLite-backed `CartStore` so\r\n    /// carts survive a restart.\r\n    pub carts: Mutex\u003cHashMap\u003cCartId, Cart\u003e\u003e,\r\n}\r\n\r\nimpl AppState {\r\n    /// Open the DB at `\u003capp_data_dir\u003e/oz-pos.db`, run migrations, and\r\n    /// create the empty driver registry.\r\n    pub fn new(app: \u0026AppHandle) -\u003e Result\u003cSelf, AppError\u003e {\r\n        let db_path = resolve_db_path(app)?;\r\n        if let Some(parent) = db_path.parent() {\r\n            std::fs::create_dir_all(parent)\r\n                .map_err(|e| AppError::Internal(format!(\"creating db dir {parent:?}: {e}\")))?;\r\n        }\r\n\r\n        let mut conn = Connection::open(\u0026db_path)\r\n            .map_err(|e| AppError::Internal(format!(\"opening {db_path:?}: {e}\")))?;\r\n        conn.pragma_update(None, \"foreign_keys\", \"ON\")\r\n            .map_err(|e| AppError::Internal(format!(\"enabling foreign_keys: {e}\")))?;\r\n        conn.pragma_update(None, \"journal_mode\", \"WAL\")\r\n            .map_err(|e| AppError::Internal(format!(\"enabling WAL: {e}\")))?;\r\n\r\n        migrations::run(\u0026mut conn)\r\n            .map_err(|e| AppError::Internal(format!(\"running migrations: {e}\")))?;\r\n\r\n        let registry = Arc::new(DriverRegistry::default());\r\n\r\n        tracing::info!(?db_path, \"AppState initialised\");\r\n\r\n        Ok(Self {\r\n            db: Mutex::new(conn),\r\n            registry,\r\n            app: Some(app.clone()),\r\n            db_path,\r\n            carts: Mutex::new(HashMap::new()),\r\n        })\r\n    }\r\n}\r\n\r\nfn resolve_db_path(app: \u0026AppHandle) -\u003e Result\u003cPathBuf, AppError\u003e {\r\n    let dir = app\r\n        .path()\r\n        .app_data_dir()\r\n        .map_err(|e| AppError::Internal(format!(\"resolving app data dir: {e}\")))?;\r\n    Ok(dir.join(\"oz-pos.db\"))\r\n}\r\n\r\n#[cfg(test)]\r\nimpl AppState {\r\n    /// Construct an `AppState` suitable for unit tests.\r\n    /// Creates a lightweight Tauri app handle via `tauri::test::mock_builder`.\r\n    pub fn for_test() -\u003e Self {\r\n        Self {\r\n            db: Mutex::new(Connection::open_in_memory().unwrap()),\r\n            registry: Arc::new(DriverRegistry::default()),\r\n            app: None,\r\n            db_path: \":memory:\".into(),\r\n            carts: Mutex::new(HashMap::new()),\r\n        }\r\n    }\r\n\r\n    /// Construct an `AppState` with a pre-configured connection (migrations\r\n    /// already run). Used by integration tests that     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
