<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

    <script>
        var data = {"files":[{"path":["C:","\\","My Script","oz-pos","crates","oz-api","src","auth.rs"],"content":"//! JSON Web Token generation and validation for the OZ-POS OpenAPI.\n//!\n//! Tokens are signed with HS256 and carry an `exp` (expiration) claim.\n//! The signing secret is loaded from the `OZ_API_SECRET` env var at\n//! startup. Every request to a protected route must include an\n//! `Authorization: Bearer \u003ctoken\u003e` header.\n//!\n//! Token generation via `POST /api/v1/tokens` returns the JWT string\n//! and the expiry timestamp. There is no revocation list in this pass;\n//! tokens are valid until their `exp` claim expires.\n\nuse axum::{\n    extract::Request,\n    http::{StatusCode, header},\n    middleware::Next,\n    response::Response,\n};\nuse chrono::{Duration, Utc};\nuse jsonwebtoken::{DecodingKey, EncodingKey, Header, Validation, decode, encode};\nuse serde::{Deserialize, Serialize};\n\nconst DEFAULT_EXPIRY_HOURS: i64 = 24;\n\n/// The payload embedded in every API token.\n#[derive(Debug, Serialize, Deserialize, Clone)]\npub struct ApiTokenClaims {\n    /// Standard JWT subject — a human-readable label for this token.\n    pub sub: String,\n    /// Token identifier (UUID v4).\n    pub jti: String,\n    /// Standard JWT expiry (epoch seconds).\n    pub exp: usize,\n    /// When the token was issued (epoch seconds).\n    pub iat: usize,\n}\n\n/// Response body returned when a new token is created.\n#[derive(Debug, Serialize)]\npub struct TokenResponse {\n    /// The signed JWT string. Pass this as `Authorization: Bearer \u003ctoken\u003e`.\n    pub token: String,\n    /// ISO-8601 expiry timestamp for display.\n    pub expires_at: String,\n    /// Token identifier (same as `jti` in claims).\n    pub token_id: String,\n}\n\n/// Load the signing secret from the environment.\n///\n/// Falls back to a hard-coded dev secret if `OZ_API_SECRET` is unset,\n/// so the server starts in development without extra config. Production\n/// deployments MUST set `OZ_API_SECRET`.\nfn signing_secret() -\u003e String {\n    std::env::var(\"OZ_API_SECRET\").unwrap_or_else(|_| \"oz-pos-dev-secret-change-in-production\".into())\n}\n\n/// Generate a new signed JWT with the given subject label.\n///\n/// The token expires after `expiry_hours` (default 24). Returns the\n/// signed token string and its expiry timestamp.\npub fn create_token(subject: \u0026str, expiry_hours: Option\u003ci64\u003e) -\u003e TokenResponse {\n    let hours = expiry_hours.unwrap_or(DEFAULT_EXPIRY_HOURS);\n    let now = Utc::now();\n    let exp_time = now + Duration::hours(hours);\n    let token_id = uuid::Uuid::new_v4().to_string();\n\n    let claims = ApiTokenClaims {\n        sub: subject.to_owned(),\n        jti: token_id.clone(),\n        exp: exp_time.timestamp() as usize,\n        iat: now.timestamp() as usize,\n    };\n\n    let secret = signing_secret();\n    let encoding_key = EncodingKey::from_secret(secret.as_bytes());\n    let token =\n        encode(\u0026Header::default(), \u0026claims, \u0026encoding_key).expect(\"token encoding is infallible\");\n\n    TokenResponse {\n        token,\n        expires_at: exp_time.to_rfc3339(),\n        token_id,\n    }\n}\n\n/// Validate a JWT and return its claims.\n///\n/// Returns `Ok(claims)` if the token is valid and not expired.\npub fn validate_token(token_str: \u0026str) -\u003e Result\u003cApiTokenClaims, jsonwebtoken::errors::Error\u003e {\n    let secret = signing_secret();\n    let decoding_key = DecodingKey::from_secret(secret.as_bytes());\n    let mut validation = Validation::default();\n    validation.validate_exp = true;\n    decode::\u003cApiTokenClaims\u003e(token_str, \u0026decoding_key, \u0026validation)\n        .map(|data| data.claims)\n}\n\n/// Axum middleware that rejects requests without a valid JWT.\n///\n/// Attach to protected routes via `Router::layer(from_fn(auth_middleware))`.\npub async fn auth_middleware(mut req: Request, next: Next) -\u003e Result\u003cResponse, StatusCode\u003e {\n    let auth_header = req\n        .headers()\n        .get(header::AUTHORIZATION)\n        .and_then(|v| v.to_str().ok())\n        .ok_or(StatusCode::UNAUTHORIZED)?;\n\n    let token = auth_header\n        .strip_prefix(\"Bearer \")\n        .ok_or(StatusCode::UNAUTHORIZED)?;\n\n    match validate_token(token) {\n        Ok(claims) =\u003e {\n            req.extensions_mut().insert(claims);\n            Ok(next.run(req).await)\n        }\n        Err(_) =\u003e Err(StatusCode::UNAUTHORIZED),\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn create_and_validate() {\n        let resp = create_token(\"test-script\", Some(1));\n        let claims = validate_token(\u0026resp.token).unwrap();\n        assert_eq!(claims.sub, \"test-script\");\n        assert_eq!(claims.jti, resp.token_id);\n    }\n\n    #[test]\n    fn bad_token_is_rejected() {\n        assert!(validate_token(\"not.a.jwt\").is_err());\n    }\n\n    #[test]\n    fn tampered_token_is_rejected() {\n        let resp = create_token(\"tamper\", Some(24));\n        // Append junk to invalidate the signature.\n        let bad = format!(\"{}x\", resp.token);\n        assert!(validate_token(\u0026bad).is_err());\n    }\n\n    #[test]\n    fn expired_token_is_rejected() {\n        // Create a token that was already expired 1 hour ago.\n        let resp = create_token(\"expired\", Some(-1));\n        let result = validate_token(\u0026resp.token);\n        assert!(result.is_err(), \"expired token should be rejected\");\n    }\n\n    #[test]\n    fn empty_token_is_rejected() {\n        assert!(validate_token(\"\").is_err());\n    }\n\n    #[test]\n    fn whitespace_only_token_is_rejected() {\n        assert!(validate_token(\"   \").is_err());\n    }\n}\n","traces":[{"line":53,"address":[],"length":0,"stats":{"Line":6196953087261802496}},{"line":54,"address":[],"length":0,"stats":{"Line":6341068275337658368}},{"line":61,"address":[],"length":0,"stats":{"Line":29543613555 112,"address":[],"length":0,"stats":{"Line":2810246167479189504}},{"line":113,"address":[],"length":0,"stats":{"Line":2594073385365405696}},{"line":114,"address":[],"length":0,"stats":{"Line":7782220156096217088}},{"line":115,"address":[],"length":0,"stats":{"Line":7782220156096217088}},{"line":117,"address":[],"length":0,"stats":{"Line":216172782113783808}}],"covered":35,"coverable":35},{"path":["C:","\\","My Script","oz-pos","crates","oz-api","src","lib.rs"],"content":"//! OZ-POS OpenAPI REST server.\n//!\n//! Starts an axum HTTP server on `OZ_API_PORT` (default 3099) with JWT\n//! authentication on protected routes. The server runs alongside the\n//! Tauri front-end so third-party scripts, kitchen displays, and\n//! inventory scanners can query the POS data.\n//!\n//! # Quick start\n//!\n//! ```ignore\n//! // In src-tauri/src/main.rs or a background task:\n//! oz_api::serve().await?;\n//! ```\n//!\n//! Then generate a token:\n//!\n//! ```bash\n//! curl -X POST http://localhost:3099/api/v1/tokens \\\n//!   -H \"Content-Type: application/json\" \\\n//!   -d '{\"label\": \"my-script\"}'\n//! ```\n//!\n//! Use the token on protected routes:\n//!\n//! ```bash\n//! curl http://localhost:3099/api/v1/products \\\n//!   -H \"Authorization: Bearer \u003ctoken\u003e\"\n//! ```\n\npub mod auth;\npub mod routes;\n\nuse std::sync::Arc;\n\nuse axum::{\n    Router,\n    middleware,\n    routing::{get, patch, post},\n};\nuse rusqlite::Connection;\nuse tokio::sync::Mutex;\nuse tower_http::cors::{Any, CorsLayer};\nuse tower_http::trace::TraceLayer;\nuse tracing::info;\n\n/// Shared application state passed to all axum handlers.\n///\n/// Wraps the SQLite connection in `Arc\u003cMutex\u003c\u003e\u003e` so axum can cheaply\n/// clone it for the [`State`](axum::extract::State) extractor while\n/// ensuring only one handler writes to the database at a time.\n#[derive(Clone)]\npub struct AppState {\n    pub db: Arc\u003cMutex\u003cConnection\u003e\u003e,\n}\n\n/// Build the API router with all routes and middleware.\n///\n/// Public routes (no auth):\n/// - `GET /api/v1/health`\n///\n/// Token management (no auth in this pass; add admin key later):\n/// - `POST /api/v1/tokens`\n///\n/// Protected routes (JWT required):\n/// - `GET /api/v1/products`\n/// - `GET /api/v1/products/:sku`\n/// - `GET /api/v1/categories`\npub fn router(state: AppState) -\u003e Router {\n    let cors = CorsLayer::new()\n        .allow_methods(Any)\n        .allow_headers(Any)\n        .allow_origin(Any);\n\n    let public = Router::new()\n        .route(\"/api/v1/health\", get(routes::health::health))\n        .route(\"/api/v1/tokens\", post(routes::tokens::create_token_handler));\n\n    let protected = Router::new()\n        .route(\"/api/v1/products\", get(routes::products::list_products).post(routes::products::create_product))\n        .route(\"/api/v1/products/{sku}\", get(routes::products::get_product))\n        .route(\"/api/v1/products/{sku}/stock\", patch(routes::products::patch_stock))\n        .route(\"/api/v1/categories\", get(routes::categories::list_categories))\n        .route(\"/api/v1/sales\", post(routes::sales::create_sale))\n        .route(\"/api/v1/sales/{id}\", get(routes::sales::get_sale))\n        .route(\"/api/v1/sales/{id}/status\", patch(routes::sales::update_sale_status))\n        .layer(middleware::from_fn(auth::auth_middleware));\n\n    Router::new()\n        .merge(public)\n        .merge(protected)\n        .with_state(state)\n        .layer(cors)\n        .layer(TraceLayer::new_for_http())\n}\n\n/// Start the server, binding to the port from `OZ_API_PORT` (default 3099).\n///\n/// Opens the SQLite database at `OZ_DB_PATH` (default `oz-pos.db`), runs\n/// migrations, and blocks on the server loop. Spawn in a background\n/// `tokio::task` if the caller needs to continue.\npub async fn serve() {\n    let db_path = std::env::var(\"OZ_DB_PATH\").unwrap_or_else(|_| \"oz-pos.db\".into());\n    let mut conn = Connection::open(\u0026db_path)\n        .expect(\"failed to open API database\");\n    conn.pragma_update(None, \"foreign_keys\", \"ON\")\n        .expect(\"enabling foreign_keys\");\n    conn.pragma_update(None, \"journal_mode\", \"WAL\")\n        .expect(\"enabling WAL\");\n    oz_core::migrations::run(\u0026mut conn)\n        .expect(\"running migrations\");\n\n    let state = AppState {\n        db: Arc::new(Mutex::new(conn)),\n    };\n\n    let port: u16 = std::env::var(\"OZ_API_PORT\")\n        .ok()\n        .and_then(|p| p.parse().ok())\n        .unwrap_or(3099);\n\n    let listener = tokio::net::TcpListener::bind(format!(\"0.0.0.0:{port}\"))\n        .await\n        .expect(\"failed to bind API port\");\n    info!(port, \"OZ-POS API server listening\");\n    axum::serve(listener, router(state))\n        .await\n        .expect(\"API server exited with error\");\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use axum::{\n        body::Body,\n        http::{Request, StatusCode},\n    };\n    use http_body_util::BodyExt;\n    use serde_json::Value;\n    use tower::ServiceExt;\n\n    /// Helper: open an in-memory connection, turn on FKs, run migrations.\n    fn fresh_conn() -\u003e Connection {\n        let mut conn = Connection::open_in_memory().unwrap();\n        conn.pragma_update(None, \"foreign_keys\", \"ON\").unwrap();\n        oz_core::migrations::run(\u0026mut conn).unwrap();\n        conn\n    }\n\n    /// Helper: build a router backed by an empty in-memory database.\n    fn test_app() -\u003e Router {\n        let state = AppState {\n            db: Arc::new(Mutex::new(fresh_conn())),\n        };\n        router(state)\n    }\n\n    /// Helper: build a router with seeded products, categories, and inventory.\n    fn test_app_seeded() -\u003e Router {\n        let conn = fresh_conn();\n        conn.execute_batch(\n            \"INSERT INTO categories (id, name, colour) VALUES\n                ('cat-drinks', 'Drinks',  '#06b6d4'),\n                ('cat-food',   'Food',    '#f97316');\n             INSERT INTO products (id, sku, name, price_minor, currency, category_id) VALUES\n                ('prod-1', 'DRINK-001', 'Espresso',        350, 'USD', 'cat-drinks'),\n                ('prod-2', 'FOOD-001',  'Bagel',           450, 'USD', 'cat-food'),\n                ('prod-3', 'DRINK-002', 'Green Tea',       275, 'USD', 'cat-drinks');\n             INSERT INTO inventory (product_id, qty) VALUES\n                ('prod-1', 50),\n                ('prod-2', 12);\",\n        )\n        .unwrap();\n        let state = AppState {\n            db: Arc::new(Mutex::new(conn)),\n        };\n        router(state)\n    }\n\n    // ── Helpers ───────────────────────────────────────────────────\n\n    async fn body_json(resp: axum::response::Response) -\u003e Value {\n        let bytes = resp\n            .into_body()\n            .collect()\n            .await\n            .expect(\"collect body\")\n            .to_bytes();\n        serde_json::from_slice(\u0026bytes).expect(\"parse JSON body\")\n    }\n\n    fn auth_get(uri: \u0026str, token: \u0026str) -\u003e Request\u003cBody\u003e {\n        Request::builder()\n            .uri(uri)\n            .header(\"Authorization\", format!(\"Bearer {token}\"))\n            .body(Body::empty())\n            .unwrap()\n    }\n\n    fn post_json(uri: \u0026str, body: \u0026str) -\u003e Request\u003cBody\u003e {\n        Request::builder()\n            .method(\"POST\")\n            .uri(uri)\n            .header(\"Content-Type\", \"application/json\")\n            .body(Body::from(body.to_owned()))\n            .unwrap()\n    }\n\n    // ── Health endpoint ──────────────────────────────────────────\n\n    #[tokio::test]\n    async fn health_returns_ok() {\n        let req = Request::builder()\n            .uri(\"/api/v1/health\")\n            .body(Body::empty())\n            .unwrap();\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::OK);\n    }\n\n    #[tokio::test]\n    async fn health_returns_json_with_status_and_version() {\n        let req = Request::builder()\n            .uri(\"/api/v1/health\")\n            .body(Body::empty())\n            .unwrap();\n        let resp = test_app().oneshot(req).await.unwrap();\n        let json = body_json(resp).await;\n        assert_eq!(json[\"status\"], \"ok\");\n        assert!(json[\"version\"].is_string(), \"version should be a string\");\n    }\n\n    // ── Token endpoint ───────────────────────────────────────────\n\n    #[tokio::test]\n    async fn token_creation_returns_200() {\n        let req = post_json(\"/api/v1/tokens\", r#\"{\"label\":\"test\",\"expiry_hours\":1}\"#);\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::OK);\n    }\n\n    #[tokio::test]\n    async fn token_creation_returns_token_fields() {\n        let req = post_json(\"/api/v1/tokens\", r#\"{\"label\":\"my-script\",\"expiry_hours\":8}\"#);\n        let resp = test_app().oneshot(req).await.unwrap();\n        let json = body_json(resp).await;\n        let token = \u0026json[\"token\"];\n        assert!(token[\"token\"].is_string(), \"token field should be a string\");\n        assert!(token[\"expires_at\"].is_string(), \"expires_at should be a string\");\n        assert!(token[\"token_id\"].is_string(), \"token_id should be a string\");\n    }\n\n    #[tokio::test]\n    async fn token_creation_with_default_expiry() {\n        let req = post_json(\"/api/v1/tokens\", r#\"{\"label\":\"no-expiry\"}\"#);\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::OK);\n        let json = body_json(resp).await;\n        assert!(json[\"token\"][\"token\"].is_string());\n    }\n\n    #[tokio::test]\n    async fn token_creation_missing_label_returns_error() {\n        let req = post_json(\"/api/v1/tokens\", r#\"{}\"#);\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::UNPROCESSABLE_ENTITY);\n    }\n\n    #[tokio::test]\n    async fn token_creation_invalid_json() {\n        let req = Request::builder()\n            .method(\"POST\")\n            .uri(\"/api/v1/tokens\")\n            .header(\"Content-Type\", \"application/json\")\n            .body(Body::from(\"not json\"))\n            .unwrap();\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::BAD_REQUEST);\n    }\n\n    #[tokio::test]\n    async fn token_creation_wrong_method_get() {\n        let req = Request::builder()\n            .method(\"GET\")\n            .uri(\"/api/v1/tokens\")\n            .body(Body::empty())\n            .unwrap();\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::METHOD_NOT_ALLOWED);\n    }\n\n    #[tokio::test]\n    async fn token_creation_empty_body() {\n        let req = Request::builder()\n            .method(\"POST\")\n            .uri(\"/api/v1/tokens\")\n            .header(\"Content-Type\", \"application/json\")\n            .body(Body::empty())\n            .unwrap();\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::BAD_REQUEST);\n    }\n\n    #[tokio::test]\n    async fn token_creation_wrong_content_type() {\n        let req = Request::builder()\n            .method(\"POST\")\n            .uri(\"/api/v1/tokens\")\n            .header(\"Content-Type\", \"text/plain\")\n            .body(Body::from(r#\"{\"label\":\"test\"}\"#))\n            .unwrap();\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::UNSUPPORTED_MEDIA_TYPE);\n    }\n\n    #[tokio::test]\n    async fn two_tokens_have_different_values() {\n        let app = test_app();\n        let req1 = post_json(\"/api/v1/tokens\", r#\"{\"label\":\"a\"}\"#);\n        let req2 = post_json(\"/api/v1/tokens\", r#\"{\"label\":\"b\"}\"#);\n        let json1 = body_json(app.clone().oneshot(req1).await.unwrap()).await;\n        let json2 = body_json(app.oneshot(req2).await.unwrap()).await;\n        assert_ne!(\n            json1[\"token\"][\"token\"].as_str(),\n            json2[\"token\"][\"token\"].as_str(),\n            \"two tokens should have different JWT strings\"\n        );\n        assert_ne!(\n            json1[\"token\"][\"token_id\"].as_str(),\n            json2[\"token\"][\"token_id\"].as_str(),\n            \"two tokens should have different IDs\"\n        );\n    }\n\n    // ── Auth middleware ───────────────────────────────────────────\n\n    #[tokio::test]\n    async fn protected_route_rejects_without_token() {\n        let req = Request::builder()\n            .uri(\"/api/v1/products\")\n            .body(Body::empty())\n            .unwrap();\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::UNAUTHORIZED);\n    }\n\n    #[tokio::test]\n    async fn protected_route_accepts_valid_token() {\n        let token = auth::create_token(\"test\", Some(1));\n        let req = auth_get(\"/api/v1/products\", \u0026token.token);\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::OK);\n    }\n\n    #[tokio::test]\n    async fn protected_route_rejects_expired_token() {\n        let token = auth::create_token(\"expired\", Some(-1));\n        let req = auth_get(\"/api/v1/products\", \u0026token.token);\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::UNAUTHORIZED);\n    }\n\n    #[tokio::test]\n    async fn protected_route_rejects_malformed_header() {\n        let req = Request::builder()\n            .uri(\"/api/v1/products\")\n            .header(\"Authorization\", \"NotBearer xyz\")\n            .body(Body::empty())\n            .unwrap();\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::UNAUTHORIZED);\n    }\n\n    #[tokio::test]\n    async fn protected_route_rejects_empty_auth_header() {\n        let req = Request::builder()\n            .uri(\"/api/v1/products\")\n            .header(\"Authorization\", \"\")\n            .body(Body::empty())\n            .unwrap();\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::UNAUTHORIZED);\n    }\n\n    #[tokio::test]\n    async fn protected_route_rejects_garbage_token() {\n        let req = auth_get(\"/api/v1/products\", \"not.a.real.jwt\");\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::UNAUTHORIZED);\n    }\n\n    #[tokio::test]\n    async fn protected_route_rejects_tampered_token() {\n        let token = auth::create_token(\"tamper\", Some(24));\n        let req = auth_get(\"/api/v1/products\", \u0026format!(\"{}x\", token.token));\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::UNAUTHORIZED);\n    }\n\n    // ── Product endpoints (empty DB) ─────────────────────────────\n\n    #[tokio::test]\n    async fn products_list_returns_empty_array() {\n        let token = auth::create_token(\"test\", Some(1));\n        let req = auth_get(\"/api/v1/products\", \u0026token.token);\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::OK);\n        let json = body_json(resp).await;\n        assert!(json.is_array(), \"should return a JSON array\");\n        assert_eq!(json.as_array().unwrap().len(), 0, \"should be empty\");\n    }\n\n    #[tokio::test]\n    async fn product_get_by_sku_requires_auth() {\n        let req = Request::builder()\n            .uri(\"/api/v1/products/ABC123\")\n            .body(Body::empty())\n            .unwrap();\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::UNAUTHORIZED);\n    }\n\n    #[tokio::test]\n    async fn product_get_by_sku_returns_null_for_unknown() {\n        let token = auth::create_token(\"test\", Some(1));\n        let req = auth_get(\"/api/v1/products/ABC123\", \u0026token.token);\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::OK);\n        let json = body_json(resp).await;\n        assert!(json.is_null(), \"should return null for unknown SKU\");\n    }\n\n    // ── Product endpoints (seeded DB) ────────────────────────────\n\n    #[tokio::test]\n    async fn products_list_returns_seeded_products() {\n        let token = auth::create_token(\"test\", Some(1));\n        let req = auth_get(\"/api/v1/products\", \u0026token.token);\n        let resp = test_app_seeded().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::OK);\n        let json = body_json(resp).await;\n        let arr = json.as_array().unwrap();\n        assert_eq!(arr.len(), 3, \"should return 3 seeded products\");\n    }\n\n    #[tokio::test]\n    async fn product_get_by_sku_returns_detail_with_stock() {\n        let token = auth::create_token(\"test\", Some(1));\n        let req = auth_get(\"/api/v1/products/DRINK-001\", \u0026token.token);\n        let resp = test_app_seeded().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::OK);\n        let json = body_json(resp).await;\n        assert_eq!(json[\"sku\"], \"DRINK-001\");\n        assert_eq!(json[\"name\"], \"Espresso\");\n        assert_eq!(json[\"price\"][\"minor_units\"], 350);\n        assert_eq!(json[\"price\"][\"currency\"], \"USD\");\n        assert_eq!(json[\"category_id\"], \"cat-drinks\");\n        assert_eq!(json[\"category_name\"], \"Drinks\");\n        assert_eq!(json[\"stock_qty\"], 50);\n        // New fields from the Product domain type.\n        assert_eq!(json[\"id\"], \"prod-1\");\n        assert!(json[\"barcode\"].is_null());\n        assert!(json[\"created_at\"].is_string());\n        assert!(json[\"updated_at\"].is_string());\n    }\n\n    #[tokio::test]\n    async fn product_get_by_sku_returns_null_for_existing_but_unstocked() {\n        let token = auth::create_token(\"test\", Some(1));\n        // DRINK-002 exists but has no inventory row.\n        let req = auth_get(\"/api/v1/products/DRINK-002\", \u0026token.token);\n        let resp = test_app_seeded().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::OK);\n        let json = body_json(resp).await;\n        assert_eq!(json[\"sku\"], \"DRINK-002\");\n        assert_eq!(json[\"name\"], \"Green Tea\");\n        assert_eq!(json[\"price\"][\"minor_units\"], 275);\n        assert!(json[\"stock_qty\"].is_null(), \"no inventory row → null stock\");\n    }\n\n    // ── Product creation endpoint ───────────────────────────────\n\n    fn auth_post_json(uri: \u0026str, token: \u0026str, body: \u0026str) -\u003e Request\u003cBody\u003e {\n        Request::builder()\n            .method(\"POST\")\n            .uri(uri)\n            .header(\"Authorization\", format!(\"Bearer {token}\"))\n            .header(\"Content-Type\", \"application/json\")\n            .body(Body::from(body.to_owned()))\n            .unwrap()\n    }\n\n    #[tokio::test]\n    async fn create_product_returns_201() {\n        let token = auth::create_token(\"test\", Some(1));\n        let body = r#\"{\"sku\":\"NEW-001\",\"name\":\"New Item\",\"price\":{\"minor_units\":199,\"currency\":\"USD\"}}\"#;\n        let req = auth_post_json(\"/api/v1/products\", \u0026token.token, body);\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::CREATED);\n    }\n\n    #[tokio::test]\n    async fn create_product_returns_fields() {\n        let token = auth::create_token(\"test\", Some(1));\n        let body = r#\"{\"sku\":\"NEW-002\",\"name\":\"Widget\",\"price\":{\"minor_units\":499,\"currency\":\"USD\"},\"category_id\":\"cat-drinks\",\"barcode\":\"5901234123457\"}\"#;\n        let req = auth_post_json(\"/api/v1/products\", \u0026token.token, body);\n        let resp = test_app_seeded().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::CREATED);\n        let json = body_json(resp).await;\n        assert_eq!(json[\"sku\"], \"NEW-002\");\n        assert_eq!(json[\"name\"], \"Widget\");\n        assert_eq!(json[\"price\"][\"minor_units\"], 499);\n        assert_eq!(json[\"price\"][\"currency\"], \"USD\");\n        assert_eq!(json[\"category_id\"], \"cat-drinks\");\n        assert_eq!(json[\"barcode\"], \"5901234123457\");\n        assert!(json[\"id\"].is_string());\n        assert!(json[\"created_at\"].is_string());\n        assert!(json[\"updated_at\"].is_string());\n    }\n\n    #[tokio::test]\n    async fn create_product_with_initial_stock() {\n        let token = auth::create_token(\"test\", Some(1));\n        let body = r#\"{\"sku\":\"STOCKED-1\",\"name\":\"Stocked\",\"price\":{\"minor_units\":100,\"currency\":\"USD\"},\"initial_stock\":25}\"#;\n        let req = auth_post_json(\"/api/v1/products\", \u0026token.token, body);\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::CREATED);\n        let json = body_json(resp).await;\n        assert_eq!(json[\"stock_qty\"], 25);\n    }\n\n    #[tokio::test]\n    async fn create_product_with_zero_stock_no_inventory_row() {\n        let token = auth::create_token(\"test\", Some(1));\n        let body = r#\"{\"sku\":\"NOSTOCK-1\",\"name\":\"NoStock\",\"price\":{\"minor_units\":100,\"currency\":\"USD\"},\"initial_stock\":0}\"#;\n        let req = auth_post_json(\"/api/v1/products\", \u0026token.token, body);\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::CREATED);\n        let json = body_json(resp).await;\n        assert!(json[\"stock_qty\"].is_null(), \"zero stock → no inventory row\");\n    }\n\n    #[tokio::test]\n    async fn create_product_duplicate_sku_returns_409() {\n        let token = auth::create_token(\"test\", Some(1));\n        let body = r#\"{\"sku\":\"DRINK-001\",\"name\":\"Duplicate\",\"price\":{\"minor_units\":100,\"currency\":\"USD\"}}\"#;\n        let req = auth_post_json(\"/api/v1/products\", \u0026token.token, body);\n        let resp = test_app_seeded().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::CONFLICT);\n    }\n\n    #[tokio::test]\n    async fn create_product_requires_auth() {\n        let body = r#\"{\"sku\":\"NEW-001\",\"name\":\"New\",\"price\":{\"minor_units\":100,\"currency\":\"USD\"}}\"#;\n        let req = post_json(\"/api/v1/products\", body);\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::UNAUTHORIZED);\n    }\n\n    #[tokio::test]\n    async fn create_product_empty_sku_returns_400() {\n        let token = auth::create_token(\"test\", Some(1));\n        let body = r#\"{\"sku\":\"   \",\"name\":\"Bad\",\"price\":{\"minor_units\":100,\"currency\":\"USD\"}}\"#;\n        let req = auth_post_json(\"/api/v1/products\", \u0026token.token, body);\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::BAD_REQUEST);\n    }\n\n    #[tokio::test]\n    async fn create_product_empty_name_returns_400() {\n        let token = auth::create_token(\"test\", Some(1));\n        let body = r#\"{\"sku\":\"SKU-OK\",\"name\":\"\",\"price\":{\"minor_units\":100,\"currency\":\"USD\"}}\"#;\n        let req = auth_post_json(\"/api/v1/products\", \u0026token.token, body);\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::BAD_REQUEST);\n    }\n\n    #[tokio::test]\n    async fn create_product_negative_price_returns_400() {\n        let token = auth::create_token(\"test\", Some(1));\n        let body = r#\"{\"sku\":\"SKU-OK\",\"name\":\"Bad Price\",\"price\":{\"minor_units\":-1,\"currency\":\"USD\"}}\"#;\n        let req = auth_post_json(\"/api/v1/products\", \u0026token.token, body);\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::BAD_REQUEST);\n    }\n\n    #[tokio::test]\n    async fn create_product_negative_initial_stock_returns_400() {\n        let token = auth::create_token(\"test\", Some(1));\n        let body = r#\"{\"sku\":\"SKU-OK\",\"name\":\"Bad Stock\",\"price\":{\"minor_units\":100,\"currency\":\"USD\"},\"initial_stock\":-5}\"#;\n        let req = auth_post_json(\"/api/v1/products\", \u0026token.token, body);\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::BAD_REQUEST);\n    }\n\n    // ── Stock adjustment endpoint ───────────────────────────────\n\n    fn auth_patch_json(uri: \u0026str, token: \u0026str, body: \u0026str) -\u003e Request\u003cBody\u003e {\n        Request::builder()\n            .method(\"PATCH\")\n            .uri(uri)\n            .header(\"Authorization\", format!(\"Bearer {token}\"))\n            .header(\"Content-Type\", \"application/json\")\n            .body(Body::from(body.to_owned()))\n            .unwrap()\n    }\n\n    #[tokio::test]\n    async fn patch_stock_sell_reduces_qty() {\n        let token = auth::create_token(\"test\", Some(1));\n        let body = r#\"{\"delta\":-10}\"#;\n        let req = auth_patch_json(\"/api/v1/products/DRINK-001/stock\", \u0026token.token, body);\n        let resp = test_app_seeded().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::OK);\n        let json = body_json(resp).await;\n        assert_eq!(json[\"sku\"], \"DRINK-001\");\n        assert_eq!(json[\"previous_qty\"], 50);\n        assert_eq!(json[\"new_qty\"], 40);\n    }\n\n    #[tokio::test]\n    async fn patch_stock_restock_increases_qty() {\n        let token = auth::create_token(\"test\", Some(1));\n        let body = r#\"{\"delta\":25}\"#;\n        let req = auth_patch_json(\"/api/v1/products/DRINK- e\", \"application/json\")\n            .body(Body::from(body.to_owned()))\n            .unwrap();\n        let resp = test_app_seeded().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::UNAUTHORIZED);\n    }\n\n    // ── Category endpoints ───────────────────────────────────────\n\n    #[tokio::test]\n    async fn categories_list_requires_auth() {\n        let req = Request::builder()\n            .uri(\"/api/v1/categories\")\n            .body(Body::empty())\n            .unwrap();\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::UNAUTHORIZED);\n    }\n\n    #[tokio::test]\n    async fn categories_list_returns_empty_array() {\n        let token = auth::create_token(\"test\", Some(1));\n        let req = auth_get(\"/api/v1/categories\", \u0026token.token);\n        let resp = test_app().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::OK);\n        let json = body_json(resp).await;\n        assert!(json.is_array(), \"should return a JSON array\");\n        assert_eq!(json.as_array().unwrap().len(), 0, \"should be empty\");\n    }\n\n    #[tokio::test]\n    async fn categories_list_returns_seeded_categories() {\n        let token = auth::create_token(\"test\", Some(1));\n        let req = auth_get(\"/api/v1/categories\", \u0026token.token);\n        let resp = test_app_seeded().oneshot(req).await.unwrap();\n        assert_eq!(resp.status(), StatusCode::OK);\n        let json = body_json(resp).await;\n        let arr = json.as_array().unwrap();\n        assert_eq!(arr.len(), 2, \"should return 2 seeded categories\");\n        assert_eq!(arr[0][\"name\"], \"Drinks\");\n        assert_eq!(arr[0][\"colour\"], \"#06b6d4\");\n        assert_eq!(arr[1][\"name\"], \"Food\");\n        assert_eq!(arr[1][\"colour\"], \"#f97316\");\n    }\n\n    // ── Sale endpoints ───────────────────────────────────────────\n\n    #[tokio::test]\n    async fn create_sale_returns_201(  /api/v1/products/:sku` — product detail including stock quantity.\n//! `POST /api/v1/products` — create a new product.\n//! `PATCH /api/v1/products/:sku/stock` — adjust stock quantity.\n\nuse axum::{\n    Json,\n    extract::{Path, State},\n    http::StatusCode,\n    response::{IntoResponse, Response},\n};\nuse serde::{Deserialize, Serialize};\n\nuse oz_core::{CoreError, ProductWithDetails};\nuse oz_core::db::Store;\n\nuse crate::AppState;\n\n// ── Error mapping ─────────────────────────────────────────────────────\n\n/// Convert a [`CoreError`] from the Store into an HTTP response.\nfn store_error_response(e: CoreError) -\u003e Response {\n    match e {\n        CoreError::Validation { message, .. } =\u003e {\n            (StatusCode::BAD_REQUEST, Json(serde_json::json!({\"error\": message}))).into_response()\n        }\n        CoreError::Conflict { .. } =\u003e {\n            (StatusCode::CONFLICT, Json(serde_json::json!({\"error\": \"resource already exists\"}))).into_response()\n        }\n        CoreError::NotFound { .. } =\u003e {\n            (StatusCode::NOT_FOUND, Json(serde_json::json!({\"error\": \"not found\"}))).into_response()\n        }\n        e =\u003e {\n            tracing::error!(\"unexpected store error: {e}\");\n            (StatusCode::INTERNAL_SERVER_ERROR, Json(serde_json::json!({\"error\": \"internal error\"}))).into_response()\n        }\n    }\n}\n\n// ── Request / Response types ──────────────────────────────────────────\n\n/// Request body for creating a new product.\n#[derive(Deserialize)]\npub struct CreateProductRequest {\n    pub sku: String,\n    pub name: String,\n    pub price: oz_core::Money,\n    pub category_id: Option\u003cString\u003e,\n    pub barcode: Option\u003cString\u003e,\n    /// Initial stock quantity (\u003e= 0). If omitted or zero, no inventory row is inserted.\n    pub initial_stock: Option\u003ci64\u003e,\n}\n\n/// Request body for adjusting stock.\n#[derive(Deserialize)]\npub struct PatchStockRequest {\n    /// Positive to restock, negative to sell.\n    pub delta: i64,\n}\n\n/// Response after a successful stock adjustment.\n#[derive(Serialize)]\npub struct PatchStockResponse {\n    pub sku: String,\n    pub previous_qty: i64,\n    pub new_qty: i64,\n}\n\n// ── Handlers ──────────────────────────────────────────────────────────\n\n/// List all products, ordered by name, with category name and stock.\npub async fn list_products(\n    State(state): State\u003cAppState\u003e,\n) -\u003e Response {\n    let db = state.db.lock().await;\n    let store = Store::new(\u0026db);\n\n    match store.list_products() {\n        Ok(products) =\u003e Json(products).into_response(),\n        Err(e) =\u003e store_error_response(e),\n    }\n}\n\n/// Get a single product by SKU, including category name and stock.\n///\n/// Returns JSON `null` when the product is not found.\npub async fn get_product(\n    State(state): State\u003cAppState\u003e,\n    Path(sku): Path\u003cString\u003e,\n) -\u003e Response {\n    let db = state.db.lock().await;\n    let store = Store::new(\u0026db);\n\n    match store.get_product(\u0026sku) {\n        Ok(Some(p)) =\u003e Json(Some(p)).into_response(),\n        Ok(None) =\u003e Json(None as Option\u003cProductWithDetails\u003e).into_response(),\n        Err(e) =\u003e store_error_response(e),\n    }\n}\n\n/// Create a new product.\n///\n/// Accepts a `CreateProductRequest` JSON body. Validation (empty SKU,\n/// empty name, negative price, negative stock) is handled by the Store,\n/// returning 400 on failure. Returns 201 with the created product.\npub async fn create_product(\n    State(state): State\u003cAppState\u003e,\n    Json(body): Json\u003cCreateProductRequest\u003e,\n) -\u003e Response {\n    let initial_stock = body.initial_stock.unwrap_or(0);\n\n    let db = state.db.lock().await;\n    let store = Store::new(\u0026db);\n\n    match store.create_product(\n        \u0026body.sku,\n        \u0026body.name,\n        body.price,\n        body.category_id.as_deref(),\n        body.barcode.as_deref(),\n        initial_stock,\n    ) {\n        Ok(product) =\u003e {\n            let detail = ProductWithDetails {\n                product,\n                category_name: None,\n                stock_qty: if initial_stock \u003e 0 { Some(initial_stock) } else { None },\n            };\n            (StatusCode::CREATED, Json(detail)).into_response()\n        }\n        Err(e) =\u003e store_error_response(e),\n    }\n}\n\n/// Adjust stock for a product by SKU.\n///\n/// Accepts `{ \"delta\": +/-N }`. The Store handles validation, the\n/// `checked_add` / `\u003e=0` guard, and the atomic upsert. Returns 200\n/// with previous and new quantities.\n///\n/// Status codes:\n/// - 200 — stock adjusted successfully\n/// - 404 — product not found\n/// - 422 — adjustment would cause negative stock\npub async fn patch_stock(\n    State(state): State\u003cAppState\u003e,\n    Path(sku): Path\u003cString\u003e,\n    Json(body): Json\u003cPatchStockRequest\u003e,\n) -\u003e Response {\n    let db = state.db.lock().await;\n    let store = Store::new(\u0026db);\n\n    // Read previous stock while we still have it.\n    let product = match store.get_product(\u0026sku) {\n        Ok(Some(p)) =\u003e p,\n        Ok(None) =\u003e {\n            return (StatusCode::NOT_FOUND, Json(serde_json::json!({\"error\": \"product not found\"}))).into_response();\n        }\n        Err(e) =\u003e return store_error_response(e),\n    };\n    let previous_qty = product.stock_qty.unwrap_or(0);\n\n    match store.adjust_stock(\u0026sku, body.delta) {\n        Ok(new_qty) =\u003e {\n            let response = PatchStockResponse {\n                sku,\n                previous_qty,\n                new_qty,\n            };\n            Json(response).into_response()\n        }\n        Err(CoreError::Validation { .. }) =\u003e {\n            // Oversell or overflow -\u003e 422 with details.\n            (\n                StatusCode::UNPROCESSABLE_ENTITY, ize)]\npub struct UpdateSaleStatusRequest {\n    /// Target status (kebab-case, e.g. `\"active\"`, `\"completed\"`, `\"voided\"`).\n    pub status: SaleStatus,\n}\n\n/// Response after a status update.\n#[derive(Serialize)]\npub struct SaleStatusResponse {\n    pub id: String,\n    pub status: SaleStatus,\n    pub updated_at: String,\n}\n\n// ── Handlers ──────────────────────────────────────────────────────────\n\n/// Create a sale from cart lines.\n///\n/// Accepts `{ \"lines\": [{ \"sku\": \"...\", \"qty\": N, \"unit_price\": {...} }, ...] }`.\n/// Builds a `Cart`, converts to `Sale` via the domain type, and persists\n/// header + lines in a single transaction. Returns 201 with the full sale.\npub async fn create_sale(\n    State(state): State\u003cAppState\u003e,\n    Json(body): Json\u003cCreateSaleRequest\u003e,\n) -\u003e Response {\n    if body.lines.is_empty() {\n        return (\n            StatusCode::UNPROCESSABLE_ENTITY,\n            Json(serde_json::json!({\"error\": \"sale must have at least one line\"})),\n        )\n            .into_response();\n    }\n\n    // Infer the currency from the first line; all subsequent lines must match.\n    let first = \u0026body.lines[0];\n    let mut cart = Cart::new(first.unit_price.currency);\n\n    for line in \u0026body.lines {\n        let cl = CartLine::new(Sku::new(\u0026line.sku), line.qty, line.unit_price);\n        if let Err(e) = cart.add_line(cl) {\n            return (StatusCode::UNPROCESSABLE_ENTITY, Json(serde_json::json!({\"error\": e.to_string()}))).into_response();\n        }\n    }\n\n    let sale = match Sale::from_cart(\u0026cart) {\n        Some(s) =\u003e s,\n        None =\u003e {\n            return (\n                StatusCode::UNPROCESSABLE_ENTITY,\n                Json(serde_json::json!({\"error\": \"cart total overflow\"})),\n            )\n                .into_response();\n        }\n    };\n\n    let db = state.db.lock().await;\n    let store = Store::new(\u0026db);\n\n    match store.create_sale(\u0026sale) {\n        Ok(()) =\u003e (StatusCode::CREATED, Json(sale)).into_response(),\n        Err(e) =\u003e store_error_response(e),\n    }\n}\n\n/// Get a single sale by id, including all line items.\n///\n/// Returns JSON `null` when the sale is not found.\npub async fn get_sale(\n    State(state): State\u003cAppState\u003e,\n    Path(id): Path\u003cString\u003e,\n) -\u003e Response {\n    let db = state.db.lock().await;\n    let store = Store::new(\u0026db);\n\n    match store.get_sale(\u0026id) {\n        Ok(Some(sale)) =\u003e Json(Some(sale)).into_response(),\n        Ok(None) =\u003e Json(None as Option\u003cSale\u003e).into_response(),\n        Err(e) =\u003e store_error_response(e),\n    }\n}\n\n/// Transition a sale's status.\n///\n/// Accepts `{ \"status\": \"active|completed|voided\" }`. Validates the\n/// state machine transition. Returns 200 with the updated sale on\n/// success, 404 if the sale doesn't exist, 422 for invalid transitions.\npub async fn update_sale_status(\n    State(state): State\u003cAppState\u003e,\n    Path(id): Path\u003cString\u003e,\n    Json(body): Json\u003cUpdateSaleStatusRequest\u003e,\n) -\u003e Response {\n    let db = state.db.lock().await;\n    let store = Store::new(\u0026db);\n\n    match store.update_sale_status(\u0026id, body.status) {\n        Ok(sale) =\u003e {\n            let resp = SaleStatusResponse {\n                id: sale.id,\n                status: sale.status,\n                updated_at: sale.updated_at,\n            };\n            Json(resp).into_response()\n        }\n        Err(CoreError::Validation { message, .. }) =\u003e {\n            (StatusCode::UNPROCESSABLE_ENTITY, Json(serde_json::json!({\"error\": message}))).into_response()\n        }\n        Err(e) =\u003e store_error_response(e),\n    }\n}\n","traces":[{"line":22,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":23,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":24,"address":[]
