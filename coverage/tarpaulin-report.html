0,"coverable":87},{"path":["C:","\\","My Script","oz-pos","crates","oz-core","src","sku.rs"],"content":"//! Stock-Keeping Unit (SKU) — a string identifier for a product.\r\n//!\r\n//! `Sku` is `#[serde(transparent)]` so it serializes as its inner\r\n//! `String` (the TS front-end sees `\"COFFEE\"`, not a tuple/object).\r\n//! `LineId` is a fresh UUID per line item.\r\n\r\n// Scaffold: a few accessors and field docs are still TODO. The full\r\n// doc pass is tracked in a followup; for now allow the warnings so the\r\n// scaffold compiles under `clippy -- -D warnings`.\r\n#![allow(missing_docs)]\r\n\r\nuse serde::{Deserialize, Serialize};\r\nuse uuid::Uuid;\r\n\r\n/// A SKU string. Trimmed, must be non-empty.\r\n#[derive(Debug, Clone, PartialEq, Eq, Hash, Serialize, Deserialize)]\r\n#[serde(transparent)]\r\npub struct Sku(String);\r\n\r\nimpl Sku {\r\n    /// Construct a SKU from any string-like value, trimming whitespace and\r\n    /// panicking if the result is empty.\r\n    ///\r\n    /// # Panics\r\n    /// Panics if the trimmed input is empty.\r\n    pub fn new(s: impl Into\u003cString\u003e) -\u003e Self {\r\n        let trimmed = s.into().trim().to_owned();\r\n        assert!(!trimmed.is_empty(), \"SKU cannot be empty\");\r\n        Self(trimmed)\r\n    }\r\n\r\n    /// Try-constructor returning `None` for empty input.\r\n    #[must_use]\r\n    pub fn try_new(s: impl Into\u003cString\u003e) -\u003e Option\u003cSelf\u003e {\r\n        let trimmed = s.into().trim().to_owned();\r\n        if trimmed.is_empty() {\r\n            None\r\n        } else {\r\n            Some(Self(trimmed))\r\n        }\r\n    }\r\n\r\n    /// Borrow the underlying string.\r\n    #[must_use]\r\n    pub fn as_str(\u0026self) -\u003e \u0026str {\r\n        \u0026self.0\r\n    }\r\n}\r\n\r\nimpl std::fmt::Display for Sku {\r\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\r\n        f.write_str(\u0026self.0)\r\n    }\r\n}\r\n\r\nimpl From\u003c\u0026str\u003e for Sku {\r\n    fn from(s: \u0026str) -\u003e Self {\r\n        Self::new(s)\r\n    }\r\n}\r\n\r\n/// A `LineId` is a fresh UUID per line item within a cart.\r\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash, Serialize, Deserialize)]\r\n#[serde(transparent)]\r\npub struct LineId(pub Uuid);\r\n\r\nimpl LineId {\r\n    /// Generate a fresh random `LineId`.\r\n    #[must_use]\r\n    pub fn new() -\u003e Self {\r\n        Self(Uuid::new_v4())\r\n    }\r\n}\r\n\r\nimpl Default for LineId {\r\n    fn default() -\u003e Self {\r\n        Self::new()\r\n    }\r\n}\r\n\r\nimpl std::fmt::Display for LineId {\r\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\r\n        write!(f, \"{}\", self.0)\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    #[test]\r\n    fn sku_trims_whitespace() {\r\n        let s = Sku::new(\"  ABC  \");\r\n        assert_eq!(s.as_str(), \"ABC\");\r\n    }\r\n\r\n    #[test]\r\n    #[should_panic(expected = \"SKU cannot be empty\")]\r\n    fn empty_sku_panics() {\r\n        Sku::new(\"   \");\r\n    }\r\n\r\n    #[test]\r\n    fn try_new_returns_none_for_empty() {\r\n        assert!(Sku::try_new(\"\").is_none());\r\n        assert!(Sku::try_new(\"ABC\").is_some());\r\n    }\r\n\r\n    #[test]\r\n    fn line_ids_are_unique() {\r\n        let a = LineId::new();\r\n        let b = LineId::new();\r\n        assert_ne!(a, b);\r\n    }\r\n\r\n    #[test]\r\n    fn sku_serializes_as_bare_string() {\r\n        let s = Sku::new(\"COFFEE\");\r\n        let json = serde_json::to_string(\u0026s).unwrap();\r\n        assert_eq!(json, \"\\\"COFFEE\\\"\");\r\n    }\r\n\r\n    #[test]\r\n    fn line_id_serializes_as_bare_string() {\r\n        let id = LineId::new();\r\n        let json = serde_json::to_string(\u0026id).unwrap();\r\n        // UUID hyphenated form, wrapped in quotes.\r\n        assert!(json.starts_with('\"') \u0026\u0026 json.ends_with('\"'));\r\n        let back: LineId = serde_json::from_str(\u0026json).unwrap();\r\n        assert_eq!(back, id);\r\n    }\r\n}\r\n","traces":[{"line":26,"address":[],"length":0,"stats":{"Line":7421932185906577408}},{"line":27,"address":[],"length":0,"stats":{"Line":3819052484010180608}},{"line":28,"address":[],"length":0,"stats":{"Line":14843864371813154816}},{"line":29,"address":[],"length":0,"stats":{"Line":7349874591868649472}},{"line":34,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":35,"address":[],"length":0,"stats":{"Line":1080863910568919040}},{"line":36,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":37,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":39,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":45,"address":[],"length":0,"stats":{"Line":5404319552844595202}},{"line":46,"address":[],"length":0,"stats":{"Line":5404319552844595202}},{"line":51,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":52,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":57,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":58,"address":[],"length":0,"stats":{"Line":1152921504606846976}},{"line":70,"address":[],"length":0,"stats":{"Line":4395513236313604096}},{"line":71,"address":[],"length":0,"stats":{"Line":4395513236313604096}},{"line":76,"address":[],"length":0,"stats":{"Line":0}},{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":82,"address":[],"length":0,"stats":{"Line":0}},{"line":83,"address":[],"length":0,"stats":{"Line":0}}],"covered":17,"coverable":21},{"path":["C:","\\","My Script","oz-pos","crates","oz-core","src","user.rs"],"content":"//! User and Role domain types — staff management for the POS.\n//!\n//! A [`User`] represents a staff member who can log in to the POS.\n//! Each user has a [`Role`] that determines their permissions\n//! (owner, manager, cashier).\n\nuse serde::{Deserialize, Serialize};\n\n/// A staff role with a set of permissions.\n///\n/// # Schema mapping\n///\n/// Maps 1:1 to the `roles` table (migration `007_customers.sql`).\n/// The `permissions` field is stored as a JSON array of permission\n/// strings (e.g., `[\"sales:void\", \"settings:edit\"]`).\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct Role {\n    /// Internal row id.\n    pub id: String,\n\n    /// Unique role name (e.g. \"owner\", \"manager\", \"cashier\").\n    pub name: String,\n\n    /// Human-readable description.\n    pub description: String,\n\n    /// JSON array of permission strings.\n    pub permissions: String,\n\n    /// ISO-8601 creation timestamp.\n    pub created_at: String,\n\n    /// ISO-8601 last-update timestamp.\n    pub updated_at: String,\n}\n\nimpl Role {\n    /// Create a new role.\n    ///\n    /// # Panics\n    ///\n    /// Panics if `name` is empty after trimming.\n    pub fn new(id: impl Into\u003cString\u003e, name: impl Into\u003cString\u003e) -\u003e Self {\n        let name = name.into().trim().to_owned();\n        assert!(!name.is_empty(), \"role name must not be empty\");\n        Self {\n            id: id.into(),\n            name,\n            description: String::new(),\n            permissions: \"[]\".into(),\n            created_at: String::new(),\n            updated_at: String::new(),\n        }\n    }\n\n    /// Set the description (builder-style).\n    #[must_use]\n    pub fn with_description(mut self, desc: impl Into\u003cString\u003e) -\u003e Self {\n        self.description = desc.into();\n        self\n    }\n}\n\n/// A staff member who can log in to the POS.\n///\n/// # Schema mapping\n///\n/// Maps 1:1 to the `users` table (migration `007_customers.sql`).\n/// The `pin_hash` stores a hashed PIN/password — the actual hash\n/// algorithm is chosen by the authentication layer.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct User {\n    /// Internal row id (UUID v4).\n    pub id: String,\n\n    /// Unique login username.\n    pub username: String,\n\n    /// Hashed PIN/password (algorithm chosen by auth layer).\n    pub pin_hash: String,\n\n    /// Display name shown on the POS UI.\n    pub display_name: String,\n\n    /// FK to `roles.id`.\n    pub role_id: String,\n\n    /// Whether this user can log in.\n    pub is_active: bool,\n\n    /// ISO-8601 creation timestamp.\n    pub created_at: String,\n\n    /// ISO-8601 last-update timestamp.\n    pub updated_at: String,\n}\n\nimpl User {\n    /// Create a new user.\n    ///\n    /// Generates a fresh UUID for `id`.\n    ///\n    /// # Panics\n    ///\n    /// Panics if `username` or `display_name` is empty after trimming.\n    pub fn new(\n        username: impl Into\u003cString\u003e,\n        pin_hash: impl Into\u003cString\u003e,\n        display_name: impl Into\u003cString\u003e,\n        role_id: impl Into\u003cString\u003e,\n    ) -\u003e Self {\n        let username = username.into().trim().to_owned();\n        assert!(!username.is_empty(), \"username must not be empty\");\n        let display_name = display_name.into().trim().to_owned();\n        assert!(!display_name.is_empty(), \"display name must not be empty\");\n\n        Self {\n            id: uuid::Uuid::new_v4().to_string(),\n            username,\n            pin_hash: pin_hash.into(),\n            display_name,\n            role_id: role_id.into(),\n            is_active: true,\n            created_at: String::new(),\n            updated_at: String::new(),\n        }\n    }\n}\n\n/// Well-known role ids used by the seed data.\npub mod builtin_roles {\n    /// Owner — full access to all features and settings.\n    pub const OWNER: \u0026str = \"role-owner\";\n    /// Manager — can manage products, categories, and view reports.\n    pub const MANAGER: \u0026str = \"role-manager\";\n    /// Cashier — can process sales and manage the daily register.\n    pub const CASHIER: \u0026str = \"role-cashier\";\n}\n\n/// Well-known seed user ids.\npub mod seed_users {\n    /// Default admin user created by `oz init-db`.\n    pub const ADMIN: \u0026str = \"user-admin\";\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn new_role() {\n        let r = Role::new(\"role-cashier\", \"Cashier\");\n        assert_eq!(r.id, \"role-cashier\");\n        assert_eq!(r.name, \"Cashier\");\n        assert_eq!(r.description, \"\");\n        assert_eq!(r.permissions, \"[]\");\n    }\n\n    #[test]\n    #[should_panic(expected = \"role name must not be empty\")]\n    fn role_panics_on_empty_name() {\n        Role::new(\"r\", \"   \");\n    }\n\n    #[test]\n    fn role_with_description() {\n        let r = Role::new(\"r\", \"Role\").with_description(\"A test role\");\n        assert_eq!(r.description, \"A test role\");\n    }\n\n    #[test]\n    fn new_user() {\n        let u = User::new(\"alice\", \"hashed_pin\", \"Alice\", \"role-cashier\");\n        assert_eq!(u.username, \"alice\");\n        assert_eq!(u.display_name, \"Alice\");\n        assert_eq!(u.role_id, \"role-cashier\");\n        assert!(u.is_active);\n        assert!(!u.id.is_empty());\n    }\n\n    #[test]\n    #[should_panic(expected = \"username must not be empty\")]\n    fn user_panics_on_empty_username() {\n        User::new(\"\", \"pin\", \"Alice\", \"role-cashier\");\n    }\n\n    #[test]\n    #[should_panic(expected = \"display name must not be empty\")]\n    fn user_panics_on_empty_display_name() {\n        User::new(\"alice\", \"pin\", \"   \", \"role-cashier\");\n    }\n\n    #[test]\n    fn serde_roundtrip() {\n        let u = User::new(\"alice\", \"pin123\", \"Alice\", \"role-cashier\");\n        let json = serde_json::to_string(\u0026u).unwrap();\n        let back: User = serde_json::from_str(\u0026json).unwrap();\n        assert_eq!(back, u);\n    }\n}\n","traces":[{"line":43,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":44,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":45,"address":[],"length _trait;\nuse tokio::sync::Mutex;\nuse tokio::task::spawn_blocking;\n\nuse crate::error::HalError;\nuse crate::traits::printer::ReceiptPrinter;\nuse crate::transport::serial::open_port;\nuse crate::types::DeviceInfo;\n\nuse super::escpos;\n\n/// A receipt printer driven through a Bluetooth serial (SPP) connection.\npub struct BtReceiptPrinter {\n    port_name: String,\n    baud_rate: u32,\n    port: Arc\u003cMutex\u003cOption\u003cBox\u003cdyn serialport::SerialPort + Send\u003e\u003e\u003e\u003e,\n    info: DeviceInfo,\n    partial_cut: bool,\n}\n\nimpl BtReceiptPrinter {\n    /// Create a new BT printer at the given serial port and baud rate.\n    pub fn new(\n        port_name: impl Into\u003cString\u003e,\n        baud_rate: u32,\n        info: DeviceInfo,\n    ) -\u003e Self {\n        Self {\n            port_name: port_name.into(),\n            baud_rate,\n            port: Arc::new(Mutex::new(None)),\n            info,\n            partial_cut: false,\n        }\n    }\n\n    /// Set whether to use a partial cut instead of full cut.\n    pub fn with_partial_cut(mut self, partial: bool) -\u003e Self {\n        self.partial_cut = partial;\n        self\n    }\n\n    async fn ensure_connected(\u0026self) -\u003e Result\u003c(), HalError\u003e {\n        let mut guard = self.port.lock().await;\n        if guard.is_some() {\n            return Ok(());\n        }\n\n        let mut port = open_port(\u0026self.port_name, self.baud_rate)?;\n        port.set_timeout(std::time::Duration::from_secs(5))\n            .map_err(|e| HalError::Protocol(format!(\"serial set_timeout: {e}\")))?;\n\n        *guard = Some(port);\n        Ok(())\n    }\n\n    async fn write_to_port(\u0026self, data: \u0026[u8]) -\u003e Result\u003c(), HalError\u003e {\n        let port_arc = self.port.clone();\n        let data_owned = data.to_vec();\n\n        spawn_blocking(move || {\n            let mut guard = port_arc.blocking_lock();\n            let port = guard\n                .as_mut()\n                .ok_or(HalError::NotFound(\"not connected\".into()))?;\n\n            use std::io::Write;\n            port.write_all(\u0026data_owned)\n                .map_err(HalError::Io)?;\n            port.flush().map_err(HalError::Io)?;\n            Ok(())\n        })\n        .await\n        .map_err(|e| HalError::Protocol(format!(\"serial write join error: {e}\")))?\n    }\n}\n\n#[async_trait]\nimpl ReceiptPrinter for BtReceiptPrinter {\n    async fn print_receipt(\u0026self, body: \u0026str) -\u003e Result\u003c(), HalError\u003e {\n        self.ensure_connected().await?;\n        let data = escpos::format_receipt(body);\n        self.write_to_port(\u0026data).await\n    }\n\n    async fn print_raw(\u0026self, data: \u0026[u8]) -\u003e Result\u003c(), HalError\u003e {\n        self.ensure_connected().await?;\n        self.write_to_port(data).await\n    }\n\n    async fn cut(\u0026self) -\u003e Result\u003c(), HalError\u003e {\n        self.ensure_connected().await?;\n        let data = if self.partial_cut {\n            escpos::CUT_PARTIAL.to_vec()\n        } else {\n            escpos::CUT_FULL.to_vec()\n        };\n        self.write_to_port(\u0026data).await\n    }\n\n    fn device_info(\u0026self) -\u003e DeviceInfo {\n        self.info.clone()\n    }\n}\n","traces":[{"line":35,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":43,"address":[],"length":0,"stats":{"Line":0}},{"line":50,"address":[],"length":0,"stats":{"Line":0}},{"line":51,"address":[],"length":0,"stats":{"Line":0}},{"line":52,"address":[],"length":0,"stats":{"Line":0}},{"line":55,"address":[],"length":0,"stats":{"Line":0}},{"line":56,"address":[],"length":0,"stats":{"Line":0}},{"line":57,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"length":0,"stats":{"Line":0}},{"line":61,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":63,"address":[],"length":0,"sta 7).\n#[allow(dead_code)]\npub const FONT_B: \u0026[u8] = \u0026[0x1B, 0x4D, 0x01];\n\n/// Set line spacing to default (30 dots).\npub const LINE_SPACING_DEFAULT: \u0026[u8] = \u0026[0x1B, 0x32];\n\n// ── Alignment ────────────────────────────────────────────\n/// Left-align subsequent text.\npub const ALIGN_LEFT: \u0026[u8] = \u0026[0x1B, 0x61, 0x00];\n/// Centre-align subsequent text.\npub const ALIGN_CENTER: \u0026[u8] = \u0026[0x1B, 0x61, 0x01];\n/// Right-align subsequent text.\npub const ALIGN_RIGHT: \u0026[u8] = \u0026[0x1B, 0x61, 0x02];\n\n// ── Font decoration ──────────────────────────────────────\n/// Enable bold/emphasised mode.\npub const BOLD_ON: \u0026[u8] = \u0026[0x1B, 0x45, 0x01];\n/// Disable bold/emphasised mode.\npub const BOLD_OFF: \u0026[u8] = \u0026[0x1B, 0x45, 0x00];\n\n/// Underline on (1-dot thickness).\n#[allow(dead_code)]\npub const UNDERLINE_ON: \u0026[u8] = \u0026[0x1B, 0x2D, 0x01];\n/// Underline off.\n#[allow(dead_code)]\npub const UNDERLINE_OFF: \u0026[u8] = \u0026[0x1B, 0x2D, 0x00];\n\n// ── Character size (GS ! n) ──────────────────────────────\n/// Normal 1×1 size.\n#[allow(dead_code)]\npub const SIZE_NORMAL: \u0026[u8] = \u0026[0x1D, 0x21, 0x00];\n/// Double height (2×1).\n#[allow(dead_code)]\npub const DBL_HEIGHT: \u0026[u8] = \u0026[0x1D, 0x21, 0x01];\n/// Double width (1×2).\n#[allow(dead_code)]\npub const DBL_WIDTH: \u0026[u8] = \u0026[0x1D, 0x21, 0x10];\n/// Double height + width (2×2).\n#[allow(dead_code)]\npub const DBL_BOTH: \u0026[u8] = \u0026[0x1D, 0x21, 0x11];\n\n// ── Feed / spacing ───────────────────────────────────────\n/// Feed n lines (ESC d n). Call with the desired count.\npub fn feed(n: u8) -\u003e Vec\u003cu8\u003e {\n    vec![0x1B, 0x64, n]\n}\n\n// ── Legacy formatter ─────────────────────────────────────\n\n/// Build an ESC/POS byte buffer from a plain-text receipt body.\npub fn format_receipt(body: \u0026str) -\u003e Vec\u003cu8\u003e {\n    let mut buf = Vec::with_capacity(body.len() + 64);\n\n    buf.extend_from_slice(ESC_INIT);\n    buf.extend_from_slice(LINE_SPACING_DEFAULT);\n    buf.extend_from_slice(FONT_A);\n\n    for line in body.lines() {\n        buf.extend_from_slice(line.as_bytes());\n        buf.extend_from_slice(LF);\n    }\n\n    buf\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn formatted_receipt_starts_with_init() {\n        let data = format_receipt(\"Hello\\nWorld\");\n        assert!(data.starts_with(ESC_INIT), \"missing ESC @ init\");\n    }\n\n    #[test]\n    fn formatted_receipt_contains_body_text() {\n        let data = format_receipt(\"Hello\\nWorld\");\n        assert!(\n            data.windows(b\"Hello\".len()).any(|w| w == b\"Hello\"),\n            \"missing body text\"\n        );\n    }\n\n    #[test]\n    fn formatted_receipt_has_line_feeds() {\n        let data = format_receipt(\"Hello\\nWorld\");\n        assert!(\n            data.windows(LF.len()).any(|w| w == LF),\n            \"missing line feeds\"\n        );\n    }\n\n    #[test]\n    fn cut_commands_are_correct() {\n        assert_eq!(CUT_FULL, \u0026[0x1D, 0x56, 0x00]);\n        assert_eq!(CUT_PARTIAL, \u0026[0x1D, 0x56, 0x01]);\n    }\n\n    #[test]\n    fn alignment_commands_are_correct() {\n        assert_eq!(ALIGN_LEFT, \u0026[0x1B, 0x61, 0x00]);\n        assert_eq!(ALIGN_CENTER, \u0026[0x1B, 0x61, 0x01]);\n        assert_eq!(ALIGN_RIGHT, \u0026[0x1B, 0x61, 0x02]);\n    }\n\n    #[test]\n    fn bold_commands_are_correct() {\n        assert_eq!(BOLD_ON, \u0026[0x1B, 0x45, 0x01]);\n        assert_eq!(BOLD_OFF, \u0026[0x1B, 0x45, 0x00]);\n    }\n\n    #[test]\n    fn size_commands_are_correct() {\n        assert_eq!(SIZE_NORMAL, \u0026[0x1D, 0x21, 0x00]);\n        assert_eq!(DBL_HEIGHT, \u0026[0x1D, 0x21, 0x01]);\n        assert_eq!(DBL_WIDTH, \u0026[0x1D, 0x21, 0x10]);\n        assert_eq!(DBL_BOTH, \u0026[0x1D, 0x21, 0x11]);\n    }\n\n    #[test]\n    fn feed_n_produces_correct_bytes() {\n        assert_eq!(feed(3), \u0026[0x1B, 0x64, 3]);\n        assert_eq!(feed(0), \u0026[0x1B, 0x64, 0]);\n    }\n}\n","traces":[{"line":62,"address":[],"length":0,"stats":{"Line":1008806316530991104}},{"line":63,"address":[],"length":0,"stats":{"Line":2017612633061982208}},{"line":69,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":70,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":72,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":73,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":74,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":76,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":77,"address":[],"length":0,"stats":{"Line":1729382256910270464}},{"line":78,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":81,"address":[],"length":0,"stats":{"Line":216172782113783808}}],"covered":11,"coverable":11},{"path":["C:","\\","My Script","oz-pos","crates","oz-hal","src","drivers","mock.rs"],"content":"//! Mock implementations of every HAL trait.\r\n//!\r\n//! Mocks are **stateful** and **programmable**: tests push inputs, then\r\n//! assert what the rest of the system did with them. Call counters\r\n//! (`connect_calls`, `poll_calls`, …) make assertions trivial.\r\n//!\r\n//! Mocks implement the same trait as the real driver — no special\r\n//! \"mock mode\" in business code.\r\n\r\nuse std::collections::VecDeque;\r\nuse std::sync::atomic::{AtomicUsize, Ordering};\r\nuse std::sync::{Arc, Mutex};\r\n\r\nuse async_trait::async_trait;\r\n\r\nuse crate::error::HalError;\r\nuse crate::traits::barcode::BarcodeScanner;\r\nuse crate::traits::cash_drawer::CashDrawer;\r\nuse crate::traits::printer::ReceiptPrinter;\r\nuse crate::types::{Barcode, DeviceInfo};\r\n\r\n// --- Barcode scanner mock -----------------------------------------------\r\n\r\n/// Programmable mock for `BarcodeScanner`. Tests push scans into the\r\n/// queue; the mock returns them in order.\r\n#[derive(Clone)]\r\npub struct MockBarcodeScanner {\r\n    queue: Arc\u003cMutex\u003cVecDeque\u003cBarcode\u003e\u003e\u003e,\r\n    pub connect_calls: Arc\u003cAtomicUsize\u003e,\r\n    pub poll_calls: Arc\u003cAtomicUsize\u003e,\r\n    pub cancel_calls: Arc\u003cAtomicUsize\u003e,\r\n    pub info: DeviceInfo,\r\n}\r\n\r\nimpl MockBarcodeScanner {\r\n    /// Construct a mock with default identity `(\"mock\", \"MockBarcode\", \"0000\")`.\r\n    #[must_use]\r\n    pub fn new() -\u003e Self {\r\n        Self::with_info(DeviceInfo::new(\"mock\", \"MockBarcode\", \"0000\"))\r\n    }\r\n\r\n    /// Construct a mock with custom identity.\r\n    #[must_use]\r\n    pub fn with_info(info: DeviceInfo) -\u003e Self {\r\n        Self {\r\n            queue: Arc::new(Mutex::new(VecDeque::new())),\r\n            connect_calls: Arc::new(AtomicUsize::new(0)),\r\n            poll_calls: Arc::new(AtomicUsize::new(0)),\r\n            cancel_calls: Arc::new(AtomicUsize::new(0)),\r\n            info,\r\n        }\r\n    }\r\n\r\n    /// Queue a barcode to be returned by the next `poll`.\r\n    pub fn push(\u0026self, code: Barcode) {\r\n        self.queue\r\n            .lock()\r\n            .expect(\"mock queue poisoned\")\r\n            .push_back(code);\r\n    }\r\n\r\n    /// Number of queued scans (for assertions).\r\n    #[must_use]\r\n    pub fn queue_len(\u0026self) -\u003e usize {\r\n        self.queue.lock().expect(\"mock queue poisoned\").len()\r\n    }\r\n}\r\n\r\nimpl Default for MockBarcodeScanner {\r\n    fn default() -\u003e Self {\r\n        Self::new()\r\n    }\r\n}\r\n\r\n#[async_trait]\r\nimpl BarcodeScanner for MockBarcodeScanner {\r\n    async fn connect(\u0026self) -\u003e Result\u003cBox\u003cdyn BarcodeScanner\u003e, HalError\u003e {\r\n        self.connect_calls.fetch_add(1, Ordering::SeqCst);\r\n        Ok(Box::new(self.clone()))\r\n    }\r\n\r\n    async fn poll(\u0026mut self, timeout_ms: u32) -\u003e Result\u003cOption\u003cBarcode\u003e, HalError\u003e {\r\n        self.poll_calls.fetch_add(1, Ordering::SeqCst);\r\n        // Honour timeout by short-circuiting when the queue is empty.\r\n        // A real driver would block on a USB/BT channel.\r\n        if self.queue.lock().expect(\"mock queue poisoned\").is_empty() {\r\n            if timeout_ms == 0 {\r\n                return Ok(None);\r\n            }\r\n            let sleep_ms = u64::from(timeout_ms.min(50));\r\n            tokio::time::sleep(std::time::Duration::from_millis(sleep_ms)).await;\r\n        }\r\n        Ok(self.queue.lock().expect(\"mock queue poisoned\").pop_front())\r\n    }\r\n\r\n    async fn cancel(\u0026self) -\u003e Result\u003c(), HalError\u003e {\r\n        self.cancel_calls.fetch_add(1, Ordering::SeqCst);\r\n        Ok(())\r\n    }\r\n\r\n    fn device_info(\u0026self) -\u003e DeviceInfo {\r\n        self.info.clone()\r\n    }\r\n}\r\n\r\n// --- Receipt printer mock -----------------------------------------------\r\n\r\n/// Programmable mock for `ReceiptPrinter`. Captures every printed body\r\n/// so tests can assert what the system tried to print.\r\n#[derive(Clone)]\r\npub struct MockReceiptPrinter {\r\n    pub printed: Arc\u003cMutex\u003cVec\u003cString\u003e\u003e\u003e,\r\n    /// Captured raw bytes from `print_raw` calls.\r\n    pub printed_raw: Arc\u003cMutex\u003cVec\u003cVec\u003cu8\u003e\u003e\u003e\u003e,\r\n    pub cut_calls: Arc\u003cAtomicUsize\u003e,\r\n    pub info: DeviceInfo,\r\n    /// If set, every `print_receipt` returns this error instead of Ok.\r\n    pub fail_with: Arc\u003cMutex\u003cOption\u003cHalError\u003e\u003e\u003e,\r\n}\r\n\r\nimpl MockReceiptPrinter {\r\n    #[must_use]\r\n    pub fn new() -\u003e Self {\r\n        Self::with_info(DeviceInfo::new(\"mock\", \"MockPrinter\", \"0000\"))\r\n    }\r\n\r\n    #[must_use]\r\n    pub fn with_info(info: DeviceInfo) -\u003e Self {\r\n        Self {\r\n            printed: Arc::new(Mutex::new(Vec::new())),\r\n            printed_raw: Arc::new(Mutex::new(Vec::new())),\r\n            cut_calls: Arc::new(AtomicUsize::new(0)),\r\n            info,\r\n            fail_with: Arc::new(Mutex::new(None)),\r\n        }\r\n    }\r\n\r\n    /// Program the next `print_receipt` to return `err` (and any\r\n    /// subsequent calls until cleared).\r\n    pub fn set_next_error(\u0026self, err: HalError) {\r\n        *self.fail_with.lock().expect(\"poisoned\") = Some(err);\r\n    }\r\n}\r\n\r\nimpl Default for MockReceiptPrinter {\r\n    fn default() -\u003e Self {\r\n        Self::new()\r\n    }\r\n}\r\n\r\n#[async_trait]\r\nimpl ReceiptPrinter for MockReceiptPrinter {\r\n    async fn print_receipt(\u0026self, body: \u0026str) -\u003e Result\u003c(), HalError\u003e {\r\n        if let Some(err) = self.fail_with.lock().expect(\"poisoned\").take() {\r\n            return Err(err);\r\n        }\r\n        self.printed.lock().expect(\"poisoned\").push(body.to_owned());\r\n        Ok(())\r\n    }\r\n\r\n    async fn print_raw(\u0026self, data: \u0026[u8]) -\u003e Result\u003c(), HalError\u003e {\r\n        if let Some(err) = self.fail_with.lock().expect(\"poisoned\").take() {\r\n            return Err(err);\r\n        }\r\n        self.printed_raw.lock().expect(\"poisoned\").push(data.to_vec());\r\n        Ok(())\r\n    }\r\n\r\n    async fn cut(\u0026self) -\u003e Result\u003c(), HalError\u003e {\r\n        self.cut_calls.fetch_add(1, Ordering::SeqCst);\r\n        Ok(())\r\n    }\r\n\r\n    fn device_info(\u0026self) -\u003e DeviceInfo {\r\n        self.info.clone()\r\n    }\r\n}\r\n\r\n// --- Cash drawer mock ---------------------------------------------------\r\n\r\n/// Programmable mock for `CashDrawer`. Counts `open` calls; can be\r\n/// programmed to fail.\r\n#[derive(Clone)]\r\npub struct MockCashDrawer {\r\n    pub open_calls: Arc\u003cAtomicUsize\u003e,\r\n    pub info: DeviceInfo,\r\n    pub fail_with: Arc\u003cMutex\u003cOption\u003cHalError\u003e\u003e\u003e,\r\n}\r\n\r\nimpl MockCashDrawer {\r\n    #[must_use]\r\n    pub fn new() -\u003e Self {\r\n        Self::with_info(DeviceInfo::new(\"mock\", \"MockDrawer\", \"0000\"))\r\n    }\r\n\r\n    #[must_use]\r\n    pub fn with_info(info: DeviceInfo) -\u003e Self {\r\n        Self {\r\n            open_calls: Arc::new(AtomicUsize::new(0)),\r\n            info,\r\n            fail_with: Arc::new(Mutex::new(None)),\r\n        }\r\n    }\r\n\r\n    pub fn set_next_error(\u0026self, err: HalError) {\r\n        *self.fail_with.lock().expect(\"poisoned\") = Some(err);\r\n    }\r\n}\r\n\r\nimpl Default for MockCashDrawer {\r\n    fn default() -\u003e Self {\r\n        Self::new()\r\n    }\r\n}\r\n\r\n#[async_trait]\r\nimpl CashDrawer for MockCashDrawer {\r\n    async fn open(\u0026self) -\u003e Result\u003c(), HalError\u003e {\r\n        self.open_calls.fetch_add(1, Ordering::SeqCst);\r\n        if let Some(err) = self.fail_with.lock().expect(\"poisoned\").take() {\r\n            return Err(err);\r\n        }\r\n        Ok(())\r\n    }\r\n\r\n    fn device_info(\u0026self) -\u003e DeviceInfo {\r\n        self.info.clone()\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    #[tokio::test]\r\n    async fn barcode_mock_returns_pushed_codes() {\r\n        let m = MockBarcodeScanner::new();\r\n        m.push(Barcode::new(\"ABC\"));\r\n        m.push(Barcode::new(\"DEF\"));\r\n        let mut dyn_scanner: Box\u003cdyn BarcodeScanner\u003e = m.connect().await.unwrap();\r\n        assert_eq!(dyn_scanner.poll(0).await.unwrap().unwrap().code, \"ABC\");\r\n        assert_eq!(dyn_scanner.poll(0).await.unwrap().unwrap().code, \"DEF\");\r\n        assert!(dyn_scanner.poll(0).await.unwrap().is_none());\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn receipt_mock_captures_bodies() {\r\n        let p = MockReceiptPrinter::new();\r\n        p.print_receipt(\"hello\\n\").await.unwrap();\r\n        p.print_receipt(\"world\\n\").await.unwrap();\r\n        assert_eq!(p.printed.lock().unwrap().len(), 2);\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn drawer_mock_counts_opens() {\r\n        let d = MockCashDrawer::new();\r\n        d.open().await.unwrap();\r\n        d.open().await.unwrap();\r\n        assert_eq!(d.open_calls.load(Ordering::SeqCst), 2);\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn printer_returns_programmed_error() {\r\n        let p = MockReceiptPrinter::new();\r\n        p.set_next_error(HalError::Disconnected);\r\n        assert!(matches!(\r\n            p.print_receipt(\"x\").await,\r\n            Err(HalError::Disconnected)\r\n        ));\r\n        // After the error is consumed, subsequent calls succeed.\r\n        p.print_receipt(\"y\").await.unwrap();\r\n    }\r\n}\r\n","traces":[{"line":38,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":39,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":44,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":46,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":47,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":48,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":49,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":55,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":56,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":59,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":64,"address":[],"length":0,"stats":{"Line":0}},{"line":65,"address":[],"length":0,"stats":{"Line":0}},{"line":70,"address":[],"length":0,"stats":{"Line":0}},{"line":71,"address":[],"length":0,"stats":{"Line":0}},{"line":77,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":82,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":96,"address":[],"length":0,"stats":{"Line":0}},{"line":101,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":102,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":123,"address":[],"length":0,"stats":{"Line":14411518807585587 //! Mocks live in `mock.rs` and are compiled unconditionally so tests\r\n//! never need a `mock` feature flag.\r\n\r\npub mod bt_printer;\r\npub mod escpos;\r\npub mod mock;\r\npub mod receipt;\r\npub mod serial_scanner;\r\npub mod tcp_printer;\r\npub mod usb_printer;\r\npub mod usb_scanner;\r\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","My Script","oz-pos","crates","oz-hal","src","drivers","receipt.rs"],"content":"//! Receipt data types and ESC/POS formatting.\n//!\n//! Defines structured receipt models ([`SalesReceipt`]) and the\n//! [`format_sales_receipt`] function that produces a ready-to-print\n//! byte buffer. Display options are controlled through [`ReceiptConfig`].\n//!\n//! # Layout (80 mm / 48 characters)\n//!\n//! ```text\n//! ┌───────────────────────────────────────────────┐\n//! │               STORE NAME                │\n//! │             123 Main Street              │\n//! ├───────────────────────────────────────────────┤\n//! │ 01 Jan 2026           #REC-001         │\n//! ├───────────────────────────────────────────────┤\n//! │ Item                   Qty  Price  Total│\n//! │ Milk 2%                  1  $3.50   $3.50│\n//! │ Bread White              2  $2.00   $4.00│\n//! ├───────────────────────────────────────────────┤\n//! │ SUBTOTAL:                      $12.00│\n//! │ TAX:                            $1.20│\n//! ├───────────────────────────────────────────────┤\n//! │ TOTAL:                        $13.20│\n//! │                                       │\n//! │ CASH:                          $20.00│\n//! │ CHANGE:                         $6.80│\n//! ├───────────────────────────────────────────────┤\n//! │        Thanks for shopping!             │\n//! └───────────────────────────────────────────────┘\n//! ```\n\nuse oz_core::Money;\n\nuse super::escpos;\n\n// ── Paper width ──────────────────────────────────────────\n\n/// Thermal paper width presets.\n#[derive(Debug, Clone, Copy)]\npub enum PaperWidth {\n    /// ~58 mm paper (~32 monospace characters).\n    Narrow,\n    /// ~80 mm paper (~48 monospace characters).\n    Standard,\n}\n\nimpl PaperWidth {\n    /// Maximum number of ASCII characters per line.\n    #[must_use]\n    pub fn chars(self) -\u003e usize {\n        match self {\n            Self::Narrow =\u003e 32,\n            Self::Standard =\u003e 48,\n        }\n    }\n}\n\n// ── Decimal separator ────────────────────────────────────\n\n/// How fractional amounts are displayed on receipts.\n#[derive(Debug, Clone, Copy)]\npub enum DecimalSeparator {\n    /// Period separator: `12.50`\n    Dot,\n    /// Comma separator: `12,50`\n    Comma,\n    /// No fractional digits: `12`\n    None,\n}\n\nimpl DecimalSeparator {\n    /// Which exponent to use when formatting. `None` means truncate\n    /// fractional digits entirely.\n    #[must_use]\n    pub fn effective_exponent(self, raw: u32) -\u003e Option\u003cusize\u003e {\n        match self {\n            Self::Dot | Self::Comma =\u003e Some(raw as usize),\n            Self::None =\u003e None,\n        }\n    }\n}\n\n// ── Receipt display configuration ───────────────────────\n\n/// Per-store display options for receipts. Stored in the\n/// `settings` table and loaded before each print.\n#[derive(Debug, Clone)]\npub struct ReceiptConfig {\n    /// Paper width — controls line length.\n    pub paper_width: PaperWidth,\n    /// Whether to prefix amounts with the currency symbol (e.g. `\"$\"`).\n    pub show_currency: bool,\n    /// Decimal separator style.\n    pub decimal_separator: DecimalSeparator,\n    /// Whether to print a tax line.\n    pub show_tax: bool,\n    /// Optional footer text (centered at the bottom).\n    pub footer: Option\u003cString\u003e,\n}\n\nimpl Default for ReceiptConfig {\n    fn default() -\u003e Self {\n        Self {\n            paper_width: PaperWidth::Standard,\n            show_currency: false,\n            decimal_separator: DecimalSeparator::Dot,\n            show_tax: true,\n            footer: None,\n        }\n    }\n}\n\n// ── Store info ───────────────────────────────────────────\n\n/// Store information printed at the top of every receipt.\n#[derive(Debug, Clone)]\npub struct StoreInfo {\n    /// Store display name.\n    pub name: String,\n    /// Street address line(s), joined with ` / `.\n    pub address: String,\n    /// Optional tax registration number.\n    pub tax_id: Option\u003cString\u003e,\n}\n\n// ── Line item ────────────────────────────────────────────\n\n/// A single product line on a receipt.\n#[derive(Debug, Clone)]\npub struct LineItem {\n    /// Product display name.\n    pub name: String,\n    /// Quantity purchased.\n    pub quantity: u32,\n    /// Price per unit.\n    pub unit_price: Money,\n    /// Quantity × unit price.\n    pub total_price: Money,\n}\n\n// ── Payment info ─────────────────────────────────────────\n\n/// A payment applied to the receipt.\n#[derive(Debug, Clone)]\npub struct PaymentInfo {\n    /// Payment method label (e.g. `\"CASH\"`, `\"CARD\"`, `\"QRIS\"`).\n    pub method: String,\n    /// Amount tendered.\n    pub amount: Money,\n    /// Change returned, if applicable.\n    pub change: Option\u003cMoney\u003e,\n}\n\n// ── Sales receipt ────────────────────────────────────────\n\n/// A complete sales receipt ready to format and print.\n///\n/// Display formatting (currency prefix, decimal separator, etc.)\n/// is handled by [`ReceiptConfig`] passed to [`format_sales_receipt`].\n#[derive(Debug, Clone)]\npub struct SalesReceipt {\n    /// Store identity printed at the top.\n    pub store: StoreInfo,\n    /// Transaction date string (already localised).\n    pub date: String,\n    /// Sequential receipt / invoice number.\n    pub receipt_number: String,\n    /// Purchased line items.\n    pub items: Vec\u003cLineItem\u003e,\n    /// Subtotal before tax.\n    pub subtotal: Money,\n    /// Tax amount (None =\u003e no tax line).\n    pub tax: Option\u003cMoney\u003e,\n    /// Grand total (subtotal + tax).\n    pub total: Money,\n    /// Payments tendered.\n    pub payments: Vec\u003cPaymentInfo\u003e,\n}\n\n// ── Helpers ──────────────────────────────────────────────\n\n/// Format a `Money` value according to display config.\nfn format_money(m: \u0026Money, config: \u0026ReceiptConfig) -\u003e String {\n    let raw_exp = m.currency.minor_unit_exponent() as usize;\n    let divisor = 10_i64.pow(raw_exp as u32);\n    let sign = if m.minor_units \u003c 0 { \"-\" } else { \"\" };\n    let abs_val = m.minor_units.unsigned_abs();\n    let major = abs_val / divisor as u64;\n    let minor = abs_val % divisor as u64;\n\n    let prefix = if config.show_currency {\n        currency_symbol(\u0026m.currency)\n    } else {\n        \"\"\n    };\n\n    match config.decimal_separator {\n        DecimalSeparator::None =\u003e {\n            format!(\"{sign}{prefix}{major}\")\n        }\n        DecimalSeparator::Comma =\u003e {\n            format!(\"{sign}{prefix}{major},{minor:0width$}\", width = raw_exp)\n        }\n        DecimalSeparator::Dot =\u003e {\n            format!(\"{sign}{prefix}{major}.{minor:0width$}\", width = raw_exp)\n        }\n    }\n}\n\n/// Best-effort currency symbol for the given ISO-4217 code.\n/// Falls back to the code itself if no common symbol is known.\nfn currency_symbol(currency: \u0026oz_core::Currency) -\u003e \u0026'static str {\n    let code = std::str::from_utf8(\u0026currency.0).unwrap_or(\"  \");\n    match code {\n        \"USD\" | \"SGD\" | \"HKD\" =\u003e \"$\",\n        \"EUR\" =\u003e \"€\",\n        \"GBP\" =\u003e \"£\",\n        \"JPY\" =\u003e \"¥\",\n        \"IDR\" =\u003e \"Rp\",\n        \"MYR\" =\u003e \"RM\",\n        \"PHP\" =\u003e \"₱\",\n        \"THB\" =\u003e \"฿\",\n        \"KRW\" =\u003e \"₩\",\n        \"BRL\" =\u003e \"R$\",\n        _ =\u003e \"$\",\n    }\n}\n\n/// Truncate a string to at most `max` characters, appending `…` if\n/// truncated.\nfn truncate(s: \u0026str, max: usize) -\u003e String {\n    if s.len() \u003c= max {\n        s.to_owned()\n    } else if max \u003e 1 {\n        format!(\"{}…\", \u0026s[..max.saturating_sub(1)])\n    } else {\n        \"…\".to_owned()\n    }\n}\n\n// ── Builder ──────────────────────────────────────────────\n\n/// Internal builder that accumulates ESC/POS bytes.\nstruct ReceiptBuilder {\n    buf: Vec\u003cu8\u003e,\n    width: usize,\n}\n\nimpl ReceiptBuilder {\n    fn new(width: usize) -\u003e Self {\n        Self {\n            buf: Vec::with_capacity(2048),\n            width,\n        }\n    }\n\n    fn init(\u0026mut self) {\n        self.buf.extend_from_slice(escpos::ESC_INIT);\n        self.buf.extend_from_slice(escpos::LINE_SPACING_DEFAULT);\n        self.buf.extend_from_slice(escpos::FONT_A);\n    }\n\n    fn left(\u0026mut self) {\n        self.buf.extend_from_slice(escpos::ALIGN_LEFT);\n    }\n\n    fn text(\u0026mut self, s: \u0026str) {\n        self.buf.extend_from_slice(s.as_bytes());\n        self.buf.extend_from_slice(escpos::LF);\n    }\n\n    fn center(\u0026mut self, s: \u0026str) {\n        self.buf.extend_from_slice(escpos::ALIGN_CENTER);\n        self.buf.extend_from_slice(s.as_bytes());\n        self.buf.extend_from_slice(escpos::LF);\n        self.left();\n    }\n\n    fn bold_center(\u0026mut self, s: \u0026str) {\n        self.buf.extend_from_slice(escpos::BOLD_ON);\n        self.center(s);\n        self.buf.extend_from_slice(escpos::BOLD_OFF);\n    }\n\n    fn bold(\u0026mut self, s: \u0026str) {\n        self.buf.extend_from_slice(escpos::BOLD_ON);\n        self.text(s);\n        self.buf.extend_from_slice(escpos::BOLD_OFF);\n    }\n\n    fn separator(\u0026mut self) {\n        self.text(\u0026\"─\".repeat(self.width));\n    }\n\n    fn blank(\u0026mut self) {\n        self.text(\"\");\n    }\n\n    fn feed(\u0026mut self, n: u8) {\n        self.buf.extend_from_slice(\u0026escpos::feed(n));\n    }\n\n    fn cut(\u0026mut self) {\n        self.buf.extend_from_slice(escpos::CUT_FULL);\n    }\n\n    fn build(self) -\u003e Vec\u003cu8\u003e {\n        self.buf\n    }\n}\n\n// ── Column layout helpers ────────────────────────────────\n\n/// Column widths for the item table, keyed by paper width.\nstruct TableCols {\n    name: usize,\n    qty: usize,\n    price: usize,\n    total: usize,\n    sep: \u0026'static str,\n}\n\nimpl TableCols {\n    fn for_width(w: usize) -\u003e Self {\n        match w {\n            32 =\u003e Self { name: 16, qty: 3, price: 5, total: 5, sep: \" \" },\n            _ =\u003e Self { name: 26, qty: 4, price: 6, total: 6, sep: \"  \" },\n        }\n    }\n}\n\n// ── Public formatter ─────────────────────────────────────\n\n/// Build an ESC/POS byte buffer for a sales receipt.\n///\n/// `config` controls display options (currency prefix, decimal\n/// separator, paper width, tax visibility, footer text).\n///\n/// The returned buffer can be sent directly to any printer via\n/// [`ReceiptPrinter::print_raw`] — it includes the initialisation\n/// sequence, all text and formatting commands, a 3-line paper feed,\n/// and a full paper cut.\npub fn format_sales_receipt(r: \u0026SalesReceipt, config: \u0026ReceiptConfig) -\u003e Vec\u003cu8\u003e {\n    let w = config.paper_width.chars();\n    let mut b = ReceiptBuilder::new(w);\n\n    b.init();\n    b.blank();\n\n    // ── Header (centered + bold) ──────────────────────\n    b.bold_center(\u0026r.store.name);\n    for line in r.store.address.split('/') {\n        let trimmed = line.trim();\n        if !trimmed.is_empty() {\n            b.center(trimmed);\n        }\n    }\n    if let Some(ref tax_id) = r.store.tax_id {\n        b.center(\u0026format!(\"NPWP: {tax_id}\"));\n    }\n    b.blank();\n    b.separator();\n\n    // ── Date / receipt number ─────────────────────────\n    let right_text = format!(\"#{}\", r.receipt_number);\n    let left_text = \u0026r.date;\n    let gap = \" \".repeat(w.saturating_sub(left_text.len() + right_text.len() + 1));\n    b.text(\u0026format!(\"{left_text}{gap}{right_text}\"));\n    b.separator();\n\n    // ── Column headers ────────────────────────────────\n    let cols = TableCols::for_width(w);\n    {\n        let name_w = cols.name.saturating_sub(4);\n        let qty_h = right_pad(\"Qty\", cols.qty);\n        let price_h = right_pad(\"Price\", cols.price);\n        let total_h = right_pad(\"Total\", cols.total);\n        let header = format!(\n            \"Item{:\u003cname_w$}{s}{qty_h}{s}{price_h}{s}{total_h}\",\n            \"\", s = cols.sep,\n        );\n        b.bold(\u0026header);\n    }\n\n    // ── Line items ────────────────────────────────────\n    for item in \u0026r.items {\n        let name = truncate(\u0026item.name, cols.name);\n        let qty_s = format!(\"{}\", item.quantity);\n        let price_s = format_money(\u0026item.unit_price, config);\n        let total_s = format_money(\u0026item.total_price, config);\n\n        let qty_pad = cols.qty.saturating_sub(qty_s.len());\n        let price_pad = cols.price.saturating_sub(price_s.len());\n        let total_pad = cols.total.saturating_sub(total_s.len());\n\n        let line = format!(\n            \"{:\u003cname$}{sep}{:\u003eqty_pad$}{qty_s}{sep}{:\u003eprice_pad$}{price_s}{sep}{:\u003etotal_pad$}{total_s}\",\n            name, \"\", \"\", \"\",\n            name = cols.name,\n            sep = cols.sep,\n            qty_pad = qty_pad,\n            price_pad = price_pad,\n            total_pad = total_pad,\n        );\n        b.text(\u0026line);\n    }\n    b.separator();\n\n    // ── Totals (right-aligned) ────────────────────────\n    b.text(\u0026right_line(\"SUBTOTAL:\", \u0026format_money(\u0026r.subtotal, config), w));\n    if config.show_tax \u0026\u0026 let Some(ref tax) = r.tax {\n        b.text(\u0026right_line(\"TAX:\", \u0026format_money(tax, config), w));\n    }\n    b.separator();\n    b.bold(\u0026right_line(\"TOTAL:\", \u0026format_money(\u0026r.total, config), w));\n    b.blank();\n\n    // ── Payments ──────────────────────────────────────\n    for pmt in \u0026r.payments {\n        b.text(\u0026right_line(\u0026pmt.method.to_uppercase(), \u0026format_money(\u0026pmt.amount, config), w));\n        if let Some(ref chg) = pmt.change {\n            b.text(\u0026right_line(\"CHANGE:\", \u0026format_money(chg, config), w));\n        }\n    }\n\n    // ── Footer ────────────────────────────────────────\n    if let Some(ref footer) = config.footer {\n        b.separator();\n        b.center(footer);\n    }\n\n    b.blank();\n    b.feed(3);\n    b.cut();\n    b.build()\n}\n\n/// Right-pad a string to at least `width` characters with leading spaces.\nfn right_pad(s: \u0026str, width: usize) -\u003e String {\n    if s.len() \u003e= width {\n        s.to_owned()\n    } else {\n        format!(\"{:\u003ewidth$}\", s, width = width)\n    }\n}\n\n/// Line with right-aligned value: `\"LABEL         12.50\"`\nfn right_line(label: \u0026str, value: \u0026str, width: usize) -\u003e String {\n    let content_w = label.len() + 1 + value.len();\n    if content_w \u003e= width {\n        format!(\"{label} {value}\")\n    } else {\n        let gap = \" \".repeat(width - content_w);\n        format!(\"{label}{gap}{value}\")\n    }\n}\n\n// ── Tests ────────────────────────────────────────────────\n\n#[cfg(test)]\nmod tests {\n    use oz_core::Currency;\n\n    use super::*;\n\n    fn usd_money(amount: i64) -\u003e Money {\n        Money {\n            minor_units: amount,\n            currency: \"USD\".parse::\u003cCurrency\u003e().unwrap(),\n        }\n    }\n\n    fn default_config() -\u003e ReceiptConfig {\n        ReceiptConfig::default()\n    }\n\n    fn sample_receipt() -\u003e SalesReceipt {\n        SalesReceipt {\n            store: StoreInfo {\n                name: \"OZ MART\".into(),\n                address: \"123 Main Street / Springfield, IL 62701\".into(),\n                tax_id: Some(\"12-3456789\".into()),\n            },\n            date: \"01 Jan 2026\".into(),\n            receipt_number: \"REC-001\".into(),\n            items: vec![\n                LineItem {\n                    name: \"Milk 2%\".into(),\n                    quantity: 1,\n                    unit_price: usd_money(350),\n                    total_price: usd_money(350),\n                },\n                LineItem {\n                    name: \"Bread White\".into(),\n                    quantity: 2,\n                    unit_price: usd_money(200),\n                    total_price: usd_money(400),\n                },\n                LineItem {\n                    name: \"Eggs (dozen)\".into(),\n                    quantity: 1,\n                    unit_price: usd_money(450),\n                    total_price: usd_money(450),\n                },\n            ],\n            subtotal: usd_money(1200),\n            tax: Some(usd_money(120)),\n            total: usd_money(1320),\n            payments: vec![PaymentInfo {\n                method: \"CASH\".into(),\n                amount: usd_money(2000),\n                change: Some(usd_money(680)),\n            }],\n        }\n    }\n\n    #[test]\n    fn format_money_dot_default() {\n        let cfg = default_config();\n        assert_eq!(format_money(\u0026usd_money(1550), \u0026cfg), \"15.50\");\n        assert_eq!(format_money(\u0026usd_money(0), \u0026cfg), \"0.00\");\n        assert_eq!(format_money(\u0026usd_money(100), \u0026cfg), \"1.00\");\n    }\n\n    #[test]\n    fn format_money_comma() {\n        let cfg = ReceiptConfig {\n            decimal_separator: DecimalSeparator::Comma,\n            ..default_config()\n        };\n        assert_eq!(format_money(\u0026usd_money(1550), \u0026cfg), \"15,50\");\n    }\n\n    #[test]\n    fn format_money_no_decimals() {\n        let cfg = ReceiptConfig {\n            decimal_separator: DecimalSeparator::None,\n            ..default_config()\n        };\n        assert_eq!(format_money(\u0026usd_money(1550), \u0026cfg), \"15\");\n        assert_eq!(format_money(\u0026usd_money(100), \u0026cfg), \"1\");\n    }\n\n    #[test]\n    fn format_money_with_currency() {\n        let cfg = ReceiptConfig {\n            show_currency: true,\n            ..default_config()\n        };\n        assert_eq!(format_money(\u0026usd_money(1550), \u0026cfg), \"$15.50\");\n    }\n\n    #[test]\n    fn format_money_with_currency_no_decimals() {\n        let cfg = ReceiptConfig {\n            show_currency: true,\n            decimal_separator: DecimalSeparator::None,\n            ..default_config()\n        };\n        assert_eq!(format_money(\u0026usd_money(2000), \u0026cfg), \"$20\");\n    }\n\n    #[test]\n    fn format_money_negative() {\n        let cfg = default_config();\n        let m = Money {\n            minor_units: -1550,\n            currency: \"USD\".parse::\u003cCurrency\u003e().unwrap(),\n        };\n        assert_eq!(format_money(\u0026m, \u0026cfg), \"-15.50\");\n    }\n\n    #[test]\n    fn truncate_short_string() {\n        assert_eq!(truncate(\"Hello\", 10), \"Hello\");\n    }\n\n    #[test]\n    fn truncate_long_string() {\n        assert_eq!(truncate(\"Hello World\", 8), \"Hello W…\");\n    }\n\n    #[test]\n    fn sales_receipt_contains_store_name() {\n        let data = format_sales_receipt(\u0026sample_receipt(), \u0026default_config());\n        let text = String::from_utf8_lossy(\u0026data);\n        assert!(text.contains(\"OZ MART\"));\n    }\n\n    #[test]\n    fn sales_receipt_contains_receipt_number() {\n        let data = format_sales_receipt(\u0026sample_receipt(), \u0026default_config());\n        let text = String::from_utf8_lossy(\u0026data);\n        assert!(text.contains(\"#REC-001\"));\n    }\n\n    #[test]\n    fn sales_receipt_contains_item_names() {\n        let data = format_sales_receipt(\u0026sample_receipt(), \u0026default_config());\n        let text = String::from_utf8_lossy(\u0026data);\n        assert!(text.contains(\"Milk 2%\"));\n        assert!(text.contains(\"Bread White\"));\n        assert!(text.contains(\"Eggs (dozen)\"));\n    }\n\n    #[test]\n    fn sales_receipt_contains_total() {\n        let data = format_sales_receipt(\u0026sample_receipt(), \u0026default_config());\n        let text = String::from_utf8_lossy(\u0026data);\n        assert!(text.contains(\"13.20\"));\n    }\n\n    #[test]\n    fn sales_receipt_contains_tax_when_show_tax() {\n        let cfg = ReceiptConfig { show_tax: true, ..default_config() };\n        let data = format_sales_receipt(\u0026sample_receipt(), \u0026cfg);\n        let text = String::from_utf8_lossy(\u0026data);\n        assert!(text.contains(\"TAX:\"));\n        assert!(text.contains(\"1.20\"));\n    }\n\n    #[test]\n    fn sales_receipt_hides_tax_when_show_tax_false() {\n        let cfg = ReceiptConfig { show_tax: false, ..default_config() };\n        let data = format_sales_receipt(\u0026sample_receipt(), \u0026cfg);\n        let text = String::from_utf8_lossy(\u0026data);\n        assert!(!text.contains(\"TAX:\"), \"tax should not appear when show_tax=false\");\n    }\n\n    #[test]\n    fn sales_receipt_contains_currency_when_enabled() {\n        let cfg = ReceiptConfig { show_currency: true, ..default_config() };\n        let data = format_sales_receipt(\u0026sample_receipt(), \u0026cfg);\n        let text = String::from_utf8_lossy(\u0026data);\n        assert!(text.contains(\"$13.20\"), \"receipt should show $ prefix: {:?}\", text);\n    }\n\n    #[test]\n    fn sales_receipt_contains_payment_and_change() {\n        let data = format_sales_receipt(\u0026sample_receipt(), \u0026default_config());\n        let text = String::from_utf8_lossy(\u0026data);\n        assert!(text.contains(\"CASH\"));\n        assert!(text.contains(\"20.00\"));\n        assert!(text.contains(\"CHANGE:\"));\n        assert!(text.contains(\"6.80\"));\n    }\n\n    #[test]\n    fn sales_receipt_contains_footer() {\n        let cfg = ReceiptConfig {\n            footer: Some(\"Thank you for shopping!\".into()),\n            ..default_config()\n        };\n        let data = format_sales_receipt(\u0026sample_receipt(), \u0026cfg);\n        let text = String::from_utf8_lossy(\u0026data);\n        assert!(text.contains(\"Thank you for shopping!\"));\n    }\n\n    #[test]\n    fn sales_receipt_starts_with_esc_init() {\n        let data = format_sales_receipt(\u0026sample_receipt(), \u0026default_config());\n        assert!(data.starts_with(escpos::ESC_INIT));\n    }\n\n    #[test]\n    fn sales_receipt_ends_with_cut() {\n        let data = format_sales_receipt(\u0026sample_receipt(), \u0026default_config());\n        assert!(data.ends_with(escpos::CUT_FULL));\n    }\n\n    #[test]\n    fn narrow_width_uses_32_chars() {\n        let cfg = ReceiptConfig {\n            paper_width: PaperWidth::Narrow,\n            ..default_config()\n        };\n        let data = format_sales_receipt(\u0026sample_receipt(), \u0026cfg);\n        let text = String::from_utf8_lossy(\u0026data);\n        for line in text.lines() {\n            let dash_count = line.chars().filter(|\u0026c| c == '─').count();\n            if dash_count \u003e 0 {\n                assert!(dash_count \u003c= 32, \"separator too long: {dash_count}\");\n            }\n        }\n    }\n\n    #[test]\n    fn right_line_pads_correctly() {\n        let result = right_line(\"TOTAL:\", \"13.20\", 48);\n        assert!(result.starts_with(\"TOTAL:\"));\n        assert!(result.ends_with(\"13.20\"));\n    }\n\n    #[test]\n    fn decimal_separator_effective_exponent() {\n        assert_eq!(DecimalSeparator::Dot.effective_exponent(2), Some(2));\n        assert_eq!(DecimalSeparator::Comma.effective_exponent(3), Some(3));\n        assert_eq!(DecimalSeparator::None.effective_exponent(2), None);\n    }\n\n    #[test]\n    fn currency_symbol_known_codes() {\n        let usd: oz_core::Currency = \"USD\".parse().unwrap();\n        let eur: oz_core::Currency = \"EUR\".parse().unwrap();\n        let idr: oz_core::Currency = \"IDR\".parse().unwrap();\n        assert_eq!(currency_symbol(\u0026usd), \"$\");\n via\n//! serial commands) is not yet implemented — the scanner must be\n//! pre-configured to match the baud rate used here.\n\nuse std::sync::Arc;\n\nuse async_trait::async_trait;\nuse tokio::sync::Mutex;\nuse tokio::task::spawn_blocking;\n\nuse crate::error::HalError;\nuse crate::traits::barcode::BarcodeScanner;\nuse crate::transport::serial::{open_port, SerialPortInfo};\nuse crate::types::{Barcode, DeviceInfo};\n\n/// Common baud rates supported by most serial barcode scanners.\npub const DEFAULT_BAUD: u32 = 9600;\n\n/// A barcode scanner driven through a serial port.\npub struct SerialBarcodeScanner {\n    port_name: String,\n    baud_rate: u32,\n    /// Wrapped in `Option` so we can detect \"not connected\" vs \"disconnected\".\n    port: Arc\u003cMutex\u003cOption\u003cBox\u003cdyn serialport::SerialPort + Send\u003e\u003e\u003e\u003e,\n    info: DeviceInfo,\n}\n\nimpl SerialBarcodeScanner {\n    /// Create a new serial scanner stub targeting the given port.\n    pub fn new(info: SerialPortInfo, baud_rate: u32) -\u003e Self {\n        let device_info = DeviceInfo::new(\n            \"serial\",\n            \u0026info.description,\n            \u0026info.port_name,\n        );\n\n        Self {\n            port_name: info.port_name,\n            baud_rate,\n            port: Arc::new(Mutex::new(None)),\n            info: device_info,\n        }\n    }\n\n    /// Create a new serial scanner at the default baud rate (9600).\n    pub fn new_default(info: SerialPortInfo) -\u003e Self {\n        Self::new(info, DEFAULT_BAUD)\n    }\n\n    /// Discover serial ports connected via a known USB-serial adapter and\n    /// return a driver for each one.\n    pub fn discover_all() -\u003e Vec\u003cSelf\u003e {\n        let ports = match crate::transport::serial::probe_ports(true) {\n            Ok(p) =\u003e p,\n            Err(_) =\u003e return Vec::new(),\n        };\n        ports.into_iter().map(Self::new_default).collect()\n    }\n}\n\n#[async_trait]\nimpl BarcodeScanner for SerialBarcodeScanner {\n    async fn connect(\u0026self) -\u003e Result\u003cBox\u003cdyn BarcodeScanner\u003e, HalError\u003e {\n        let mut guard = self.port.lock().await;\n        if guard.is_some() {\n            return Ok(Box::new(Self {\n                port_name: self.port_name.clone(),\n                baud_rate: self.baud_rate,\n                port: self.port.clone(),\n                info: self.info.clone(),\n            }));\n        }\n\n        let mut port = open_port(\u0026self.port_name, self.baud_rate)?;\n\n        // Enable read timeout so poll() doesn't block forever.\n        port.set_timeout(std::time::Duration::from_millis(500))\n            .map_err(|e| HalError::Protocol(format!(\"serial set_timeout: {e}\")))?;\n\n        *guard = Some(port);\n\n        Ok(Box::new(Self {\n            port_name: self.port_name.clone(),\n            baud_rate: self.baud_rate,\n            port: self.port.clone(),\n            info: self.info.clone(),\n        }))\n    }\n\n    async fn poll(\u0026mut self, timeout_ms: u32) -\u003e Result\u003cOption\u003cBarcode\u003e, HalError\u003e {\n        let port_arc = self.port.clone();\n\n        spawn_blocking(move || {\n            let mut guard = port_arc.blocking_lock();\n            let port = guard\n                .as_mut()\n                .ok_or(HalError::NotFound(\"not connected\".into()))?;\n\n            let timeout = std::time::Duration::from_millis(timeout_ms as u64);\n            let deadline = std::time::Instant::now() + timeout;\n\n            let mut buf = Vec::with_capacity(64);\n\n            loop {\n                if std::time::Instant::now() \u003e= deadline {\n                    return if buf.is_empty() {\n                        Ok(None)\n                    } else {\n                        let code = String::from_utf8_lossy(\u0026buf).trim().to_owned();\n                        Ok(Some(Barcode::new(code)))\n                    };\n                }\n\n                let mut byte = [0u8; 1];\n                match port.read(\u0026mut byte) {\n                    Ok(0) | Err(_) =\u003e {\n                        if buf.is_empty() {\n                            return Ok(None);\n                        }\n                        let code = String::from_utf8_lossy(\u0026buf).trim().to_owned();\n                        return Ok(Some(Barcode::new(code)));\n                    }\n                    Ok(1) =\u003e {\n                        if byte[0] == b'\\r' || byte[0] == b'\\n' {\n                            if buf.is_empty() {\n                                continue;\n                            }\n                            let code = String::from_utf8_lossy(\u0026buf).trim().to_owned();\n                            return Ok(Some(Barcode::new(code)));\n                        }\n                        buf.push(byte[0]);\n                    }\n                    Ok(n) =\u003e {\n                        for \u0026b in \u0026byte[..n] {\n                            if b == b'\\r' || b == b'\\n' {\n                                if buf.is_empty() {\n                                    continue;\n                                }\n                                let code = String::from_utf8_lossy(\u0026buf).trim().to_owned();\n                                return Ok(Some(Barcode::new(code)));\n                            }\n                            buf.push(b);\n                        }\n                    }\n                }\n            }\n        })\n        .await\n        .map_err(|e| HalError::Usb(format!(\"serial poll join error: {e}\")))?\n    }\n\n    async fn cancel(\u0026self) -\u003e Result\u003c(), HalError\u003e {\n        // Serial reads have short timeouts; they'll expire naturally.\n        Ok(())\n    }\n\n    fn device_info(\u0026self) -\u003e DeviceInfo {\n        self.info.clone()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn serial_discover_does_not_panic() {\n        // No hardware expected in CI — should return empty vec.\n        let scanners = SerialBarcodeScanner::discover_all();\n        assert!(scanners.is_empty() || !scanners.is_empty());\n    }\n}\n","traces":[{"line":38,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":41,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":42,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":46,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":48,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":54,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":55,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":60,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":61,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":62,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":63,"address":[],"length":0,"stats":{"Line":0}},{"line":65,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":71,"address":[],"length":0,"stats":{"Line":0}},{"line":86,"address":[],"length":0,"stats":{"Line":0}},{"line":98,"address":[],"length":0,"stats":{"Line":0}},{"line":101,"address":[],"length":0,"stats":{"Line":0}},{"line":102,"address":[],"length":0,"stats":{"Line":0}},{"line":103,"address":[],"length":0,"stats":{"Line":0}},{"line":104,"address":[],"length":0,"stats":{"Line":0}},{"line":105,"address":[],"length":0,"stats":{"Line":0}},{"line":107,"address":[],"length":0,"stats":{"Line":0}},{"line":108,"address":[],"length":0,"stats":{"Line":0}},{"line":110,"address":[],"length":0,"stats":{"Line":0}},{"line":113,"address":[],"length":0,"stats":{"Line":0}},{"line":114,"address":[],"length":0,"stats":{"Line":0}},{"line":115,"address":[],"length":0,"stats":{"Line":0}},{"line":117,"address":[],"length":0,"stats":{"Line":0}},{"line":118,"address":[],"length":0,"stats":{"Line":0}},{"line":122,"address":[],"length":0,"stats":{"Line":0}},{"l  printer driven through a raw TCP (port 9100) connection.\npub struct TcpReceiptPrinter {\n    addr: String,\n    stream: Arc\u003cMutex\u003cOption\u003cTcpStream\u003e\u003e\u003e,\n    info: DeviceInfo,\n    partial_cut: bool,\n}\n\nimpl TcpReceiptPrinter {\n    /// Create a new TCP printer targetting the given address.\n    ///\n    /// `addr` can be an IP (`\"192.168.1.100\"`) or hostname\n    /// (`\"printer.local\"`). Port 9100 is used unless specified as\n    /// `\"host:port\"`.\n    pub fn new(addr: impl Into\u003cString\u003e, info: DeviceInfo) -\u003e Self {\n        Self {\n            addr: addr.into(),\n            stream: Arc::new(Mutex::new(None)),\n            info,\n            partial_cut: false,\n        }\n    }\n\n    /// Set whether to use a partial cut instead of full cut.\n    pub fn with_partial_cut(mut self, partial: bool) -\u003e Self {\n        self.partial_cut = partial;\n        self\n    }\n\n    async fn ensure_connected(\u0026self) -\u003e Result\u003c(), HalError\u003e {\n        let mut guard = self.stream.lock().await;\n        if guard.is_some() {\n            return Ok(());\n        }\n\n        let stream = tcp::connect(\u0026self.addr).await?;\n        *guard = Some(stream);\n        Ok(())\n    }\n\n    async fn write_to_stream(\u0026self, data: \u0026[u8]) -\u003e Result\u003c(), HalError\u003e {\n        let mut guard = self.stream.lock().await;\n        let stream = guard\n            .as_mut()\n            .ok_or(HalError::NotFound(\"not connected\".into()))?;\n\n        tcp::write_all(stream, data).await\n    }\n}\n\n#[async_trait]\nimpl ReceiptPrinter for TcpReceiptPrinter {\n    async fn print_receipt(\u0026self, body: \u0026str) -\u003e Result\u003c(), HalError\u003e {\n        self.ensure_connected().await?;\n        let data = escpos::format_receipt(body);\n        self.write_to_stream(\u0026data).await\n    }\n\n    async fn print_raw(\u0026self, data: \u0026[u8]) -\u003e Result\u003c(), HalError\u003e {\n        self.ensure_connected().await?;\n        self.write_to_stream(data).await\n    }\n\n    async fn cut(\u0026self) -\u003e Result\u003c(), HalError\u003e {\n        self.ensure_connected().await?;\n        let data = if self.partial_cut {\n            escpos::CUT_PARTIAL.to_vec()\n        } else {\n            escpos::CUT_FULL.to_vec()\n        };\n        self.write_to_stream(\u0026data).await\n    }\n\n    fn device_info(\u0026self) -\u003e DeviceInfo {\n        self.info.clone()\n    }\n}\n","traces":[{"line":35,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":0}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":50,"address":[],"length":0,"stats":{"Line":0}},{"line":51,"address":[],"length":0,"stats":{"Line":0}},{"line":52,"address":[],"length":0,"stats":{"Line":0}},{"line":53,"address":[],"length":0,"stats":{"Line":0}},{"line":56,"address":[],"length":0,"stats":{"Line":0}},{"line":57,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"length":0,"stats":{"Line":0}},{"line":61,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":63,"address":[],"length":0,"stats":{"Line":0}},{"line":65,"address":[],"length":0,"stats":{"Line":0}},{"line":67,"address":[],"length":0,"stats":{"Line":0}},{"line":73,"address":[],"length":0,"stats":{"Line":0}},{"line":79,"address":[],"length":0,"stats":{"Line":0}},{"line":84,"address":[],"length":0,"stats":{"Line":0}},{"line":94,"address":[],"length":0,"stats":{"Line":0}},{"line":95,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":23},{"path":["C:","\\","My Script","oz-pos","crates","oz-hal","src","drivers","usb_printer.rs"],"content":"//! USB receipt printer driver (stub).\n//!\n//! Implements [`ReceiptPrinter`] via USB bulk-out transfers. Supports\n//! standard ESC/POS commands for text printing and paper cutting.\n//!\n//! **Stub status:** This driver sends plain text wrapped in minimal\n//! ESC/POS formatting. Advanced features (character encoding selection,\n//! barcode printing, logo upload, NV graphics) are not yet implemented.\n\nuse std::sync::Arc;\nuse std::time::Duration;\n\nuse async_trait::async_trait;\nuse tokio::sync::Mutex;\nuse tokio::task::spawn_blocking;\n\nuse crate::error::HalError;\nuse crate::traits::printer::ReceiptPrinter;\nuse crate::transport::usb::UsbDeviceInfo;\nuse crate::types::DeviceInfo;\n\nuse super::escpos;\n\n/// A receipt printer driven through a USB bulk OUT endpoint.\npub struct UsbReceiptPrinter {\n    handle: Arc\u003cMutex\u003cOption\u003crusb::DeviceHandle\u003crusb::Context\u003e\u003e\u003e\u003e,\n    info: DeviceInfo,\n    usb_info: UsbDeviceInfo,\n    /// Whether to use a partial cut instead of a full cut.\n    partial_cut: bool,\n}\n\nimpl UsbReceiptPrinter {\n    /// Attempt to create a driver for the given USB printer info.\n    pub fn try_new(info: UsbDeviceInfo) -\u003e Self {\n        let device_info = DeviceInfo::new(\u0026info.manufacturer, \u0026info.product, \u0026info.serial);\n\n        Self {\n            handle: Arc::new(Mutex::new(None)),\n            info: device_info,\n            usb_info: info,\n            partial_cut: false,\n        }\n    }\n\n    /// Set whether to use partial cut instead of full cut.\n    pub fn with_partial_cut(mut self, partial: bool) -\u003e Self {\n        self.partial_cut = partial;\n        self\n    }\n\n    /// Discover all known USB receipt printers.\n    pub fn discover_all() -\u003e Vec\u003cSelf\u003e {\n        let devices = match crate::transport::usb::probe_printers() {\n            Ok(d) =\u003e d,\n            Err(_) =\u003e return Vec::new(),\n        };\n        devices.into_iter().map(Self::try_new).collect()\n    }\n\n    async fn ensure_connected(\u0026self) -\u003e Result\u003c(), HalError\u003e {\n        let mut guard = self.handle.lock().await;\n        if guard.is_some() {\n            return Ok(());\n        }\n        let handle = crate::transport::usb::open_device(\n            self.usb_info.vid,\n            self.usb_info.pid,\n            self.usb_info.interface_number,\n        )?;\n        *guard = Some(handle);\n        Ok(())\n    }\n\n    async fn write_to_endpoint(\u0026self, data: \u0026[u8]) -\u003e Result\u003c(), HalError\u003e {\n        self.ensure_connected().await?;\n\n        let handle_arc = self.handle.clone();\n        let ep_out = self\n            .usb_info\n            .endpoint_out\n            .ok_or(HalError::NotFound(\"no OUT endpoint on printer\".into()))?;\n\n        let data_owned = data.to_vec();\n        let timeout = Duration::from_secs(5);\n\n        spawn_blocking(move || {\n            let mut guard = handle_arc.blocking_lock();\n            let handle = guard\n                .as_mut()\n                .ok_or(HalError::NotFound(\"not connected\".into()))?;\n\n            handle\n                .write_bulk(ep_out, \u0026data_owned, timeout)\n                .map_err(|e| {\n                    if matches!(e, rusb::Error::NoDevice) {\n                        *guard = None;\n                        HalError::Disconnected\n                    } else {\n                        HalError::Usb(e.to_string())\n                    }\n                })?;\n\n            Ok(())\n        })\n        .await\n        .map_err(|e| HalError::Usb(format!(\"write_bulk join error: {e}\")))?\n    }\n}\n\n#[async_trait]\nimpl ReceiptPrinter for UsbReceiptPrinter {\n    async fn print_receipt(\u0026self, body: \u0026str) -\u003e Result\u003c(), HalError\u003e {\n        let data = escpos::format_receipt(body);\n        self.write_to_endpoint(\u0026data).await\n    }\n\n    async fn print_raw(\u0026self, data: \u0026[u8]) -\u003e Result\u003c(), HalError\u003e {\n        self.write_to_endpoint(data).await\n    }\n\n    async fn cut(\u0026self) -\u003e Result\u003c(), HalError\u003e {\n        self.ensure_connected().await?;\n        let cut_cmd = if self.partial_cut {\n            escpos::CUT_PARTIAL\n        } else {\n            escpos::CUT_FULL\n        };\n        self.write_to_endpoint(cut_cmd).await\n    }\n\n    fn device_info(\u0026self) -\u003e DeviceInfo {\n        self.info.clone()\n    }\n}\n","traces":[{"line":35,"address":[],"length":0,"stats":{"Line":0}},{"line":36,"address":[],"length":0,"stats":{"Line":0}},{"line":39,"address":[],"length":0,"stats":{"Line":0}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":48,"address":[],"length":0,"stats":{"Line":0}},{"line":49,"address":[],"length":0,"stats":{"Line":0}},{"line":53,"address":[],"length":0,"stats":{"Line":0}},{"line":54,"address":[],"length":0,"stats":{"Line":0}},{"line":55,"address":[],"length":0,"stats":{"Line":0}},{"line":56,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"length":0,"stats":{"Line":0}},{"line":61,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":63,"address":[],"length":0,"stats":{"Line":0}},{"line":64,"address":[],"length":0,"stats":{"Line":0}},{"line":67,"address":[],"length":0,"stats":{"Line":0}},{"line":68,"address":[],"length":0,"stats":{"Line":0}},{"line":69,"address":[],"length":0,"stats":{"Line":0}},{"line":71,"address":[],"length":0,"stats":{"Line":0}},{"line":72,"address":[],"length":0,"stats":{"Line":0}},{"line":75,"address":[],"length":0,"stats":{"Line":0}},{"line":76,"address":[],"length":0,"stats":{"Line":0}},{"line":78,"address":[],"length":0,"stats":{"Line":0}},{"line":79,"address":[],"length":0,"stats":{"Line":0}},{"line":80,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[],"length":0,"stats":{"Line":0}},{"line":82,"address":[],"length":0,"stats":{"Line":0}},{"line":84,"address":[],"length":0,"stats":{"Line":0}},{"line":85,"address":[],"length":0,"stats":{"Line":0}},
