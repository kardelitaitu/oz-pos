ory`] row ties a product to its current stock level.\n//! The `qty` field is non-negative (enforced by the schema's `CHECK`\n//! constraint and the [`Inventory::adjust_qty`] helper).\n\nuse serde::{Deserialize, Serialize};\n\n/// Stock level for a single product.\n///\n/// # Schema mapping\n///\n/// Maps 1:1 to the `inventory` table (migration `002_products.sql`).\n/// The `product_id` is the primary key — there is at most one\n/// inventory row per product.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct Inventory {\n    /// FK to `products.id`.\n    pub product_id: String,\n\n    /// Current quantity on hand (≥ 0).\n    pub qty: i64,\n\n    /// ISO-8601 timestamp of the last stock adjustment.\n    pub updated_at: String,\n}\n\nimpl Inventory {\n    /// Create a new inventory row for a product.\n    ///\n    /// # Panics\n    ///\n    /// Panics if `qty` is negative.\n    pub fn new(product_id: impl Into\u003cString\u003e, qty: i64) -\u003e Self {\n        assert!(qty \u003e= 0, \"initial stock qty must be ≥ 0, got {qty}\");\n        Self {\n            product_id: product_id.into(),\n            qty,\n            updated_at: String::new(),\n        }\n    }\n\n    /// True when there is at least one unit in stock.\n    #[must_use]\n    pub fn is_in_stock(\u0026self) -\u003e bool {\n        self.qty \u003e 0\n    }\n\n    /// Adjust stock by `delta` (positive to restock, negative to sell).\n    ///\n    /// Returns `Some(new_qty)` on success, or `None` if the adjustment\n    /// would cause the stock level to go negative.\n    #[must_use]\n    pub fn adjust_qty(\u0026self, delta: i64) -\u003e Option\u003ci64\u003e {\n        self.qty.checked_add(delta).filter(|\u0026v| v \u003e= 0)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn new_inventory() {\n        let inv = Inventory::new(\"prod-1\", 50);\n        assert_eq!(inv.product_id, \"prod-1\");\n        assert_eq!(inv.qty, 50);\n        assert!(inv.updated_at.is_empty());\n    }\n\n    #[test]\n    fn zero_qty_is_allowed() {\n        let inv = Inventory::new(\"prod-1\", 0);\n        assert_eq!(inv.qty, 0);\n        assert!(!inv.is_in_stock());\n    }\n\n    #[test]\n    #[should_panic(expected = \"initial stock qty must be ≥ 0\")]\n    fn new_panics_on_negative_qty() {\n        Inventory::new(\"prod-1\", -1);\n    }\n\n    #[test]\n    fn is_in_stock_when_qty_positive() {\n        assert!(Inventory::new(\"p\", 1).is_in_stock());\n        assert!(Inventory::new(\"p\", 100).is_in_stock());\n    }\n\n    #[test]\n    fn is_not_in_stock_when_qty_zero() {\n        assert!(!Inventory::new(\"p\", 0).is_in_stock());\n    }\n\n    #[test]\n    fn adjust_qty_sell() {\n        let inv = Inventory::new(\"p\", 10);\n        assert_eq!(inv.adjust_qty(-3), Some(7));\n        assert_eq!(inv.adjust_qty(-7), Some(3));\n        // Selling exactly all stock is allowed.\n        assert_eq!(inv.adjust_qty(-10), Some(0));\n    }\n\n    #[test]\n    fn adjust_qty_restock() {\n        let inv = Inventory::new(\"p\", 10);\n        assert_eq!(inv.adjust_qty(5), Some(15));\n        assert_eq!(inv.adjust_qty(0), Some(10));\n    }\n\n    #[test]\n    fn adjust_qty_rejects_oversell() {\n        let inv = Inventory::new(\"p\", 3);\n        assert_eq!(inv.adjust_qty(-4), None);\n    }\n\n    #[test]\n    fn adjust_qty_handles_large_values() {\n        let inv = Inventory::new(\"p\", 1_000_000);\n        assert_eq!(inv.adjust_qty(500_000), Some(1_500_000));\n        assert_eq!(inv.adjust_qty(-999_999), Some(1));\n        assert_eq!(inv.adjust_qty(-1_000_001), None);\n    }\n\n    #[test]\n    fn serde_roundtrip() {\n        let inv = Inventory::new(\"prod-1\", 42);\n        let json = serde_json::to_string(\u0026inv).unwrap();\n        let back: Inventory = serde_json::from_str(\u0026json).unwrap();\n        assert_eq!(back, inv);\n    }\n\n    #[test]\n    fn adjust_qty_is_pure() {\n        // adjust_qty returns a new value without mutating self.\n        let inv = Inventory::new(\"p\", 10);\n        let _ = inv.adjust_qty(-5);\n        assert_eq!(inv.qty, 10, \"original should be unchanged\");\n    }\n}\n","traces":[{"line":34,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":35,"address":[],"length":0,"stats":{"Line":1729382256910270464}},{"line":37,"address":[],"length":0,"stats":{"Line":2377900603251621888}},{"line":39,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":45,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":46,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":54,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":55,"address":[],"length":0,"stats":{"Line":3602879701896396800}}],"covered":8,"coverable":8},{"path":["C:","\\","My Script","oz-pos","crates","oz-core","src","lib.rs"],"content":"//! Domain types for OZ-POS.\r\n//!\r\n//! `oz-core` is the foundation crate of the framework. It contains the\r\n//! types every other crate builds on: [`Money`] and [`Currency`] for\r\n//! pricing, [`Cart`] and [`CartLine`] for the sale pipeline, [`Sku`] and\r\n//! [`LineId`] identifiers, the SQL [`migrations`] runner, and the\r\n//! domain-level error type [`CoreError`].\r\n//!\r\n//! Rules enforced here (see `AGENTS.md` for the full policy):\r\n//!\r\n//! - **Money is always `i64` minor units.** Never `f32`/`f64`.\r\n//! - **All public items have `///` docs.** Library consumers depend on them.\r\n//! - **`#![deny(unsafe_code)]`** is on; open a discussion before adding `unsafe`.\r\n//! - **`#![warn(missing_docs)]`** is on; new public items must be documented.\r\n\r\n#![deny(unsafe_code)]\r\n#![warn(missing_docs)]\r\n\r\npub mod cart;\r\npub mod category;\r\npub mod customer;\r\npub mod db;\r\npub mod error;\r\npub mod features;\r\npub mod inventory;\r\npub mod migrations;\r\npub mod money;\r\npub mod product;\r\npub mod sale;\r\npub mod settings;\r\npub mod sku;\r\npub mod user;\r\n\r\npub use cart::{Cart, CartError, CartId, CartLine};\r\npub use category::Category;\r\npub use customer::Customer;\r\npub use db::{ProductWithDetails, Store};\r\npub use error::CoreError;\r\npub use features::{Feature, FeatureRegistry};\r\npub use inventory::Inventory;\r\npub use money::{Currency, Money};\r\npub use product::Product;\r\npub use sale::{InvalidTransition, Sale, SaleLine, SaleStatus};\r\npub use settings::Settings;\r\npub use sku::{LineId, Sku};\r\npub use user::{Role, User, builtin_roles, seed_users};\r\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","My Script","oz-pos","crates","oz-core","src","migrations.rs"],"content":"//! Migration runner.\r\n//!\r\n//! Migrations are `.sql` files under `crates/oz-core/migrations/`. They are\r\n//! embedded at compile time via [`include_str!`] (in `lib.rs`) and run in\r\n//! lexicographic order on first startup. Applied migrations are tracked in\r\n//! a `schema_migrations` table so subsequent runs are no-ops.\r\n//!\r\n//! This is a deliberately small, dependency-free runner. Larger projects\r\n//! may want `refinery` or `sqlx-migrate`, but the OZ-POS migration count\r\n//! is small (a handful of files) and the surface area of \"open conn, run\r\n//! .sql inside a transaction, mark applied\" is short enough to keep here.\r\n\r\nuse rusqlite::{Connection, Transaction, params};\r\n\r\nuse crate::error::CoreError;\r\n\r\n/// One embedded migration.\r\npub struct Migration {\r\n    /// Filename, e.g. `\"001_sales.sql\"`. Also used as the primary key in\r\n    /// `schema_migrations`.\r\n    pub id: \u0026'static str,\r\n    /// Raw SQL contents.\r\n    pub sql: \u0026'static str,\r\n}\r\n\r\n/// All migrations in the order they should be applied.\r\n///\r\n/// The list is exhaustive at compile time; adding a new migration means\r\n/// adding a new `Migration` entry here AND a new file in\r\n/// `crates/oz-core/migrations/`.\r\npub const ALL: \u0026[Migration] = \u0026[\r\n    Migration {\r\n        id: \"001_sales.sql\",\r\n        sql: include_str!(\"../migrations/001_sales.sql\"),\r\n    },\r\n    Migration {\r\n        id: \"002_products.sql\",\r\n        sql: include_str!(\"../migrations/002_products.sql\"),\r\n    },\r\n    Migration {\r\n        id: \"003_barcode.sql\",\r\n        sql: include_str!(\"../migrations/003_barcode.sql\"),\r\n    },\r\n    Migration {\r\n        id: \"004_sale_status.sql\",\r\n        sql: include_str!(\"../migrations/004_sale_status.sql\"),\r\n    },\r\n    Migration {\r\n        id: \"005_line_count_check.sql\",\r\n        sql: include_str!(\"../migrations/005_line_count_check.sql\"),\r\n    },\r\n    Migration {\r\n        id: \"006_currencies.sql\",\r\n        sql: include_str!(\"../migrations/006_currencies.sql\"),\r\n    },\r\n    Migration {\r\n        id: \"007_customers.sql\",\r\n        sql: include_str!(\"../migrations/007_customers.sql\"),\r\n    },\r\n];\r\n\r\n/// Apply every unapplied migration. Idempotent: running twice is a no-op\r\n/// after the first call.\r\n///\r\n/// Requires `\u0026mut Connection` because [`Connection::transaction`] does.\r\n/// The `ensure_schema_migrations_table` and `load_applied` helpers take\r\n/// `\u0026Connection` (read-only access) and are safe to call from any\r\n/// context.\r\npub fn run(conn: \u0026mut Connection) -\u003e Result\u003c(), CoreError\u003e {\r\n    ensure_schema_migrations_table(conn)?;\r\n    let applied = load_applied(conn)?;\r\n    for mig in ALL {\r\n        if applied.contains(mig.id) {\r\n            tracing::debug!(migration = mig.id, \"already applied; skipping\");\r\n            continue;\r\n        }\r\n        apply_one(conn, mig)?;\r\n    }\r\n    Ok(())\r\n}\r\n\r\nfn ensure_schema_migrations_table(conn: \u0026Connection) -\u003e Result\u003c(), CoreError\u003e {\r\n    conn.execute_batch(\r\n        \"CREATE TABLE IF NOT EXISTS schema_migrations (\r\n            id         TEXT PRIMARY KEY,\r\n            applied_at TEXT NOT NULL DEFAULT (strftime('%Y-%m-%dT%H:%M:%fZ', 'now'))\r\n        )\",\r\n    )?;\r\n    Ok(())\r\n}\r\n\r\nfn load_applied(conn: \u0026Connection) -\u003e Result\u003cstd::collections::HashSet\u003cString\u003e, CoreError\u003e {\r\n    let mut stmt = conn.prepare(\"SELECT id FROM schema_migrations\")?;\r\n    let rows = stmt.query_map([], |row| row.get::\u003c_, String\u003e(0))?;\r\n    let mut set = std::collections::HashSet::new();\r\n    for id in rows {\r\n        set.insert(id?);\r\n    }\r\n    Ok(set)\r\n}\r\n\r\nfn apply_one(conn: \u0026mut Connection, mig: \u0026Migration) -\u003e Result\u003c(), CoreError\u003e {\r\n    tracing::info!(migration = mig.id, \"applying migration\");\r\n    let tx: Transaction = conn.transaction()?;\r\n    tx.execute_batch(mig.sql)?;\r\n    tx.execute(\r\n        \"INSERT INTO schema_migrations (id) VALUES (?1)\",\r\n        params![mig.id],\r\n    )?;\r\n    tx.commit()?;\r\n    Ok(())\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    fn fresh() -\u003e Connection {\r\n        let conn = Connection::open_in_memory().unwrap();\r\n        conn.execute_batch(\"PRAGMA foreign_keys = ON\").unwrap();\r\n        conn\r\n    }\r\n\r\n    #[test]\r\n    fn first_run_applies_all_migrations() {\r\n        let mut conn = fresh();\r\n        run(\u0026mut conn).unwrap();\r\n        let applied = load_applied(\u0026conn).unwrap();\r\n        for mig in ALL {\r\n            assert!(\r\n                applied.contains(mig.id),\r\n                \"missing applied entry for {}\",\r\n                mig.id\r\n            );\r\n        }\r\n    }\r\n\r\n    #[test]\r\n    fn second_run_is_idempotent() {\r\n        let mut conn = fresh();\r\n        run(\u0026mut conn).unwrap();\r\n        run(\u0026mut conn).unwrap();\r\n        let applied = load_applied(\u0026conn).unwrap();\r\n        assert_eq!(applied.len(), ALL.len());\r\n    }\r\n\r\n    #[test]\r\n    fn migration_creates_sales_table() {\r\n        let mut conn = fresh();\r\n        run(\u0026mut conn).unwrap();\r\n        let exists: i64 = conn\r\n            .query_row(\r\n                \"SELECT COUNT(*) FROM sqlite_master WHERE type='table' AND name='sales'\",\r\n                [],\r\n                |r| r.get(0),\r\n            )\r\n            .unwrap();\r\n        assert_eq!(exists, 1, \"expected `sales` table after migration\");\r\n    }\r\n}\r\n","traces":[{"line":69,"address":[],"length":0,"stats":{"Line":13763000461244235776}},{"line":70,"address":[],"length":0,"stats":{"Line":9079256848778919936}},{"line":71,"address":[],"length":0,"stats":{"Line":4395513236313604096}},{"line":72,"address":[],"length":0,"stats":{"Line":4107282860161892352}},{"line":73,"address":[],"length":0,"stats":{"Line":12321848580485677056}},{"line":74,"address":[],"length":0,"stats":{"Line":504403158265495556}},{"line":75,"address":[],"length":0,"stats":{"Line":504403158265495556}},{"line":77,"address":[],"length":0,"stats":{"Line":1585267068834414579}},{"line":79,"address":[],"length":0,"stats":{"Line":14339461213547659264}},{"line":82,"address":[],"length":0,"stats":{"Line":13763000461244235776}},{"line":83,"address":[],"length":0,"stats":{"Line":9079256848778919936}},{"line":89,"address":[],"length":0,"stats":{"Line":13763000461244235776}},{"line":92,"address":[],"length":0,"stats":{"Line":13907115649320091648}},{"line":93,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":94,"address":[],"length":0,"stats":{"Line":3314649325744685056}},{"line":95,"address":[],"length":0,"stats":{"Line":9367487224930631680}},{"line":96,"address":[],"length":0,"stats":{"Line":15420325124116578304}},{"line":97,"address":[],"length":0,"stats":{"Line":3026418949592973311}},{"line":99,"address":[],"length":0,"stats":{"Line":14339461213547659264}},{"line":102,"address":[],"length":0,"stats":{"Line":3602879701896396804}},{"line":103,"address":[],"length":0,"stats":{"Line":3602879701896396804}},{"line":104,"address":[],"length":0,"stats":{"Line":14411518807585587212}},{"line":105,"address":[],"length":0,"stats":{"Line":7205759403792793600}},{"line":106,"address":[],"length":0,"stats":{"Line":10808639105689190400}},{"line":108,"address":[],"length":0,"stats":{"Line":3602879701896396800}},{"line":110,"address":[],"length":0,"stats":{"Line":7205759403792793600}},{"line":111,"address":[],"length":0,"stats":{"Line":3602879701896396800}}],"covered":27,"coverable":27},{"path":["C:","\\","My Script","oz-pos","crates","oz-core","src","money.rs"],"content":"//! Money and currency primitives.\r\n//!\r\n//! Money is **always** stored as integer minor units (e.g., cents for USD,\r\n//! sen for IDR, paise for INR). Pair with an ISO-4217 currency code for\r\n//! display. Floating point is forbidden anywhere in the money path — see\r\n//! the `rust-backend` skill for the full rationale and the\r\n//! checked-arithmetic patterns.\r\n\r\nuse serde::{Deserialize, Serialize};\r\nuse std::str::FromStr;\r\n\r\n/// A monetary amount in the smallest unit of a currency.\r\n///\r\n/// `minor_units` is the integer count of the smallest currency unit\r\n/// (cents for USD, sen for IDR, paise for INR). It is always paired\r\n/// with a [`Currency`] so the unit is unambiguous.\r\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash, Serialize, Deserialize)]\r\npub struct Money {\r\n    /// Amount in the smallest currency unit (e.g., cents for USD).\r\n    pub minor_units: i64,\r\n    /// ISO-4217 currency code, e.g. \"USD\", \"IDR\", \"EUR\".\r\n    pub currency: Currency,\r\n}\r\n\r\n/// Error returned by [`Currency`]'s [`FromStr`] impl when the input is\r\n/// not a valid ISO-4217 alpha-3 code.\r\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\r\npub struct InvalidCurrencyCode;\r\n\r\nimpl std::fmt::Display for InvalidCurrencyCode {\r\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\r\n        f.write_str(\"expected a 3-letter ISO-4217 currency code\")\r\n    }\r\n}\r\n\r\nimpl std::error::Error for InvalidCurrencyCode {}\r\n\r\n/// An ISO-4217 alpha-3 currency code stored as 3 raw ASCII bytes.\r\n///\r\n/// Wrapping the code in a newtype lets the type system enforce the\r\n/// 3-character shape; we never pass a `String` where a currency is\r\n/// expected.\r\n///\r\n/// # Wire format\r\n///\r\n/// Serialized as a 3-byte ASCII string (`\"USD\"`, not `[85, 83, 68]`)\r\n/// so the JSON boundary with the React/TypeScript front-end matches\r\n/// `ui/src/types/domain.ts`. The custom `Serialize`/`Deserialize`\r\n/// impls below enforce this; the inner `[u8; 3]` stays in place so\r\n/// the type remains `Copy` and downstream code is unchanged.\r\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash)]\r\npub struct Currency(pub [u8; 3]);\r\n\r\nimpl Currency {\r\n    /// The number of decimal places used by this currency.\r\n    ///\r\n    /// Returns the ISO-4217 minor-unit exponent for known codes (2 for\r\n    /// USD/EUR/IDR, 0 for JPY/KRW, 3 for KWD/OMR/BHD). Unknown codes\r\n    /// default to 2, the most common case; this matches the behaviour\r\n    /// of the rest of the project until a full ISO-4217 table is wired\r\n    /// up.\r\n    pub fn minor_unit_exponent(\u0026self) -\u003e u32 {\r\n        match \u0026self.0 {\r\n            b\"JPY\" | b\"KRW\" | b\"VND\" | b\"CLP\" | b\"ISK\" | b\"HUF\" =\u003e 0,\r\n            b\"KWD\" | b\"OMR\" | b\"BHD\" | b\"JOD\" | b\"TND\" =\u003e 3,\r\n            _ =\u003e 2,\r\n        }\r\n    }\r\n}\r\n\r\nimpl FromStr for Currency {\r\n    type Err = InvalidCurrencyCode;\r\n\r\n    fn from_str(s: \u0026str) -\u003e Result\u003cSelf, Self::Err\u003e {\r\n        let bytes = s.as_bytes();\r\n        if bytes.len() != 3 || !bytes.iter().all(|b| b.is_ascii_alphabetic()) {\r\n            return Err(InvalidCurrencyCode);\r\n        }\r\n        let mut out = [0u8; 3];\r\n        out.copy_from_slice(bytes);\r\n        Ok(Self(out))\r\n    }\r\n}\r\n\r\nimpl Serialize for Currency {\r\n    fn serialize\u003cS: serde::Serializer\u003e(\u0026self, ser: S) -\u003e Result\u003cS::Ok, S::Error\u003e {\r\n        let s = std::str::from_utf8(\u0026self.0)\r\n            .map_err(|e| serde::ser::Error::custom(format!(\"invalid currency bytes: {e}\")))?;\r\n        ser.serialize_str(s)\r\n    }\r\n}\r\n\r\nimpl\u003c'de\u003e Deserialize\u003c'de\u003e for Currency {\r\n    fn deserialize\u003cD: serde::Deserializer\u003c'de\u003e\u003e(de: D) -\u003e Result\u003cSelf, D::Error\u003e {\r\n        let s = String::deserialize(de)?;\r\n        s.parse::\u003cCurrency\u003e().map_err(serde::de::Error::custom)\r\n    }\r\n}\r\n\r\nimpl Money {\r\n    /// Construct a zero amount in the given currency.\r\n    #[must_use]\r\n    pub fn zero(currency: Currency) -\u003e Self {\r\n        Self {\r\n            minor_units: 0,\r\n            currency,\r\n        }\r\n    }\r\n\r\n    /// Construct from a major-unit amount (e.g., dollars). Multiplies by\r\n    /// the currency's exponent before storing.\r\n    ///\r\n    /// Returns `None` if the resulting minor-unit amount would overflow\r\n    /// `i64` (e.g. `from_major(i64::MAX, KWD)` — 3 decimal places).\r\n    #[must_use]\r\n    pub fn from_major(major: i64, currency: Currency) -\u003e Option\u003cSelf\u003e {\r\n        let exp = currency.minor_unit_exponent();\r\n        major.checked_mul(10_i64.pow(exp)).map(|minor_units| Self {\r\n            minor_units,\r\n            currency,\r\n        })\r\n    }\r\n\r\n    /// Add two Money values. Returns `None` if the currencies differ\r\n    /// (caller must convert first) or if the sum overflows `i64`.\r\n    #[must_use]\r\n    pub fn checked_add(self, other: Money) -\u003e Option\u003cMoney\u003e {\r\n        if self.currency != other.currency {\r\n            return None;\r\n        }\r\n        self.minor_units\r\n            .checked_add(other.minor_units)\r\n            .map(|v| Self {\r\n                minor_units: v,\r\n                currency: self.currency,\r\n            })\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    #[test]\r\n    fn money_zero_is_zero() {\r\n        let usd: Currency = \"USD\".parse().unwrap();\r\n        assert_eq!(Money::zero(usd).minor_units, 0);\r\n    }\r\n\r\n    #[test]\r\n    fn money_from_major_dollars() {\r\n        let usd: Currency = \"USD\".parse().unwrap();\r\n        let m = Money::from_major(12, usd).unwrap();\r\n        assert_eq!(m.minor_units, 1200);\r\n        assert_eq!(m.currency, usd);\r\n    }\r\n\r\n    #[test]\r\n    fn money_from_major_jpy_has_no_exponent() {\r\n        let jpy: Currency = \"JPY\".parse().unwrap();\r\n        let m = Money::from_major(12, jpy).unwrap();\r\n        assert_eq!(m.minor_units, 12);\r\n    }\r\n\r\n    #[test]\r\n    fn money_from_major_overflow_returns_none() {\r\n        let kwd: Currency = \"KWD\".parse().unwrap();\r\n        assert!(Money::from_major(i64::MAX, kwd).is_none());\r\n    }\r\n\r\n    #[test]\r\n    fn checked_add_same_currency() {\r\n        let usd: Currency = \"USD\".parse().unwrap();\r\n        let a = Money::from_major(5, usd).unwrap();\r\n        let b = Money::from_major(7, usd).unwrap();\r\n        assert_eq!(a.checked_add(b).unwrap().minor_units, 1200);\r\n    }\r\n\r\n    #[test]\r\n    fn checked_add_different_currency_returns_none() {\r\n        let usd: Currency = \"USD\".parse().unwrap();\r\n        let eur: Currency = \"EUR\".parse().unwrap();\r\n        let a = Money::from_major(5, usd).unwrap();\r\n        let b = Money::from_major(5, eur).unwrap();\r\n        assert!(a.checked_add(b).is_none());\r\n    }\r\n\r\n    #[test]\r\n    fn checked_add_overflow_returns_none() {\r\n        let usd: Currency = \"USD\".parse().unwrap();\r\n        let a = Money {\r\n            minor_units: i64::MAX,\r\n            currency: usd,\r\n        };\r\n        let b = Money::from_major(1, usd).unwrap();\r\n        assert!(a.checked_add(b).is_none());\r\n    }\r\n\r\n    #[test]\r\n    fn currency_from_str_rejects_bad_input() {\r\n        assert!(\"US\".parse::\u003cCurrency\u003e().is_err());\r\n        assert!(\"USDD\".parse::\u003cCurrency\u003e().is_err());\r\n        assert!(\"U2D\".parse::\u003cCurrency\u003e().is_err());\r\n        assert!(\"USD\".parse::\u003cCurrency\u003e().is_ok());\r\n    }\r\n\r\n    #[test]\r\n    fn minor_unit_exponent_known_codes() {\r\n        assert_eq!(\"USD\".parse::\u003cCurrency\u003e().unwrap().minor_unit_exponent(), 2);\r\n        assert_eq!(\"JPY\".parse::\u003cCurrency\u003e().unwrap().minor_unit_exponent(), 0);\r\n        assert_eq!(\"KWD\".parse::\u003cCurrency\u003e().unwrap().minor_unit_exponent(), 3);\r\n    }\r\n}\r\n","traces":[{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":11745387828182253568}},{"line":63,"address":[],"length":0,"stats":{"Line":11745387828182253568}},{"line":64,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":65,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":66,"address":[],"length":0,"stats":{"Line":11385099857992613888}},{"line":74,"address":[],"length":0,"stats":{"Line":8502796096475496448}},{"line":75,"address":[],"length":0,"stats":{"Line":7061644215716937728}},{"line":76,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":77,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":79,"address":[],"length":0,"stats":{"Line":16285016252571713536}},{"line":80,"address":[],"length":0,"stats":{"Line":5980780305148018688}},{"line":81,"address":[],"length":0,"stats":{"Line":8142508126285856768}},{"line":86,"address":[],"length":0,"stats":{"Line":3386706919782612992}},{"line":87,"address":[],"length":0,"stats":{"Line":10160120759347838976}},{"line":88,"address":[],"length":0,"stats":{"Line":3386706919782612992}},{"line":89,"address":[],"length":0,"stats":{"Line":10160120759347838976}},{"line":94,"address":[],"length":0,"stats":{"Line":1729382256910270464}},{"line":95,"address":[],"length":0,"stats":{"Line":5188146770730811392}},{"line":96,"address":[],"length":0,"stats":{"Line":3458764513820540928}},{"line":103,"address":[],"length":0,"stats":{"Line":2594073385365405696}},{"line":116,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":117,"address":[],"length":0,"stats":{"Line":3891110078048108544}},{"line":118,"address":[],"length":0,"stats":{"Line":6485183463413514240}},{"line":119,"address":[],"length":0,"stats":{"Line":1224979098644774912}},{"line":120,"address":[],"length":0,"stats":{"Line":1224979098644774912}},{"line":127,"address":[],"length":0,"stats":{"Line":4179340454199820288}},{"line":128,"address":[],"length":0,"stats":{"Line":4179340454199820288}},{"line":129,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":131,"address":[],"length":0,"stats":{"Line":4107282860161892352}},{"line":132,"address":[],"length":0,"stats":{"Line":8214565720323784704}},{"line":133,"address":[],"length":0,"stats":{"Line":4107282860161892352}},{"line":134,"address":[],"length":0,"stats":{"Line":3963167672086036480}},{"line":135,"address":[],"length":0,"stats":{"Line":3963167672086036480}}],"covered":33,"coverable":35},{"path":["C:","\\","My Script","oz-pos","crates","oz-core","src","product.rs"],"content":"//! Product domain type — the core inventory item.\n//!\n//! A [`Product`] wraps the fields stored in the `products` table:\n//! SKU (unique identifier), display name, price with currency,\n//! optional category and barcode, and timestamps. The struct lives\n//! in `oz-core` so every downstream crate (`oz-api`, `oz-cli`,\n//! `src-tauri`) uses the same definition.\n\nuse serde::{Deserialize, Serialize};\n\nuse crate::{Money, Sku};\n\n/// A product in the store's inventory.\n///\n/// # Schema mapping\n///\n/// Maps 1:1 to the `products` table (migrations `001_sales.sql`,\n/// `002_products.sql`, `003_barcode.sql`). Fields use domain types\n/// ([`Sku`], [`Money`]) rather than raw strings/integers so code\n/// downstream benefits from validation and checked arithmetic.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct Product {\n    /// Internal row id (UUID v4).\n    pub id: String,\n\n    /// Stock-keeping unit — the human-readable product code.\n    #[serde(with = \"sku_serde\")]\n    pub sku: Sku,\n\n    /// Display name shown on receipts and the POS UI.\n    pub name: String,\n\n    /// Sale price with currency.\n    pub price: Money,\n\n    /// Optional reference to a [`crate::Category`] row.\n    pub category_id: Option\u003cString\u003e,\n\n    /// Optional machine-readable barcode (EAN-13, UPC-A, etc.).\n    /// Unique when present; two products can share a `None` barcode.\n    pub barcode: Option\u003cString\u003e,\n\n    /// ISO-8601 creation timestamp.\n    pub created_at: String,\n\n    /// ISO-8601 last-update timestamp.\n    pub updated_at: String,\n}\n\nimpl Product {\n    /// Create a new product with the given SKU, name, and price.\n    ///\n    /// Generates a fresh UUID for `id` and sets both timestamps to\n    /// empty strings (the database layer fills them in on insert).\n    /// Optional fields (`category_id`, `barcode`) default to `None`.\n    ///\n    /// # Panics\n    ///\n    /// Panics if `name` is empty after trimming.\n    pub fn new(sku: impl Into\u003cSku\u003e, name: impl Into\u003cString\u003e, price: Money) -\u003e Self {\n        let name = name.into().trim().to_owned();\n        assert!(!name.is_empty(), \"product name must not be empty\");\n\n        Self {\n            id: uuid::Uuid::new_v4().to_string(),\n            sku: sku.into(),\n            name,\n            price,\n            category_id: None,\n            barcode: None,\n            created_at: String::new(),\n            updated_at: String::new(),\n        }\n    }\n\n    /// Set the category reference (builder-style).\n    #[must_use]\n    pub fn with_category(mut self, category_id: impl Into\u003cString\u003e) -\u003e Self {\n        self.category_id = Some(category_id.into());\n        self\n    }\n\n    /// Set the barcode (builder-style).\n    #[must_use]\n    pub fn with_barcode(mut self, barcode: impl Into\u003cString\u003e) -\u003e Self {\n        self.barcode = Some(barcode.into());\n        self\n    }\n}\n\n// ── Serde helpers ────────────────────────────────────────────────\n\n/// Custom serde module so `Sku` serializes as a bare string within the\n/// containing struct. Without this, `#[serde(transparent)]` on `Sku`\n/// would work on its own, but nesting inside `Product` requires the\n/// `#[serde(with = \"...\")]` indirection.\nmod sku_serde {\n    use serde::{Deserialize, Deserializer, Serializer};\n\n    pub fn serialize\u003cS: Serializer\u003e(sku: \u0026super::Sku, ser: S) -\u003e Result\u003cS::Ok, S::Error\u003e {\n        ser.serialize_str(sku.as_str())\n    }\n\n    pub fn deserialize\u003c'de, D: Deserializer\u003c'de\u003e\u003e(de: D) -\u003e Result\u003csuper::Sku, D::Error\u003e {\n        let s = String::deserialize(de)?;\n        super::Sku::try_new(s).ok_or_else(|| serde::de::Error::custom(\"SKU must not be empty\"))\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn usd() -\u003e crate::Currency {\n        \"USD\".parse().unwrap()\n    }\n\n    fn test_price() -\u003e Money {\n        Money::from_major(12, usd()).unwrap()\n    }\n\n    #[test]\n    fn new_product_has_generated_id() {\n        let p = Product::new(\"COFFEE\", \"Espresso\", test_price());\n        assert!(!p.id.is_empty(), \"id should be generated\");\n        assert_eq!(p.sku.as_str(), \"COFFEE\");\n        assert_eq!(p.name, \"Espresso\");\n        assert_eq!(p.price, test_price());\n        assert!(p.category_id.is_none());\n        assert!(p.barcode.is_none());\n        assert!(p.created_at.is_empty());\n        assert!(p.updated_at.is_empty());\n    }\n\n    #[test]\n    fn product_ids_are_unique() {\n        let a = Product::new(\"A\", \"Alpha\", test_price());\n        let b = Product::new(\"B\", \"Beta\", test_price());\n        assert_ne!(a.id, b.id);\n    }\n\n    #[test]\n    #[should_panic(expected = \"product name must not be empty\")]\n    fn new_product_panics_on_empty_name() {\n        Product::new(\"SKU\", \"   \", test_price());\n    }\n\n    #[test]\n    fn builder_sets_category() {\n        let p = Product::new(\"SKU\", \"Widget\", test_price())\n            .with_category(\"cat-tools\");\n        assert_eq!(p.category_id, Some(\"cat-tools\".into()));\n    }\n\n    #[test]\n    fn builder_sets_barcode() {\n        let p = Product::new(\"SKU\", \"Widget\", test_price())\n            .with_barcode(\"5901234123457\");\n        assert_eq!(p.barcode, Some(\"5901234123457\".into()));\n    }\n\n    #[test]\n    fn builder_chains() {\n        let p = Product::new(\"SKU\", \"Widget\", test_price())\n            .with_category(\"cat-tools\")\n            .with_barcode(\"5901234123457\");\n        assert_eq!(p.category_id, Some(\"cat-tools\".into()));\n        assert_eq!(p.barcode, Some(\"5901234123457\".into()));\n    }\n\n    #[test]\n    fn serde_roundtrip() {\n        let p = Product::new(\"COFFEE\", \"Espresso\", test_price())\n            .with_category(\"cat-drinks\")\n            .with_barcode(\"5901234123457\");\n        let json = serde_json::to_string(\u0026p).unwrap();\n        let back: Product = serde_json::from_str(\u0026json).unwrap();\n        assert_eq!(back, p);\n    }\n\n    #[test]\n    fn serde_deserialize_minimal() {\n        let json = r#\"{\n            \"id\": \"abc\",\n            \"sku\": \"COFFEE\",\n            \"name\": \"Espresso\",\n            \"price\": { \"minor_units\": 350, \"currency\": \"USD\" },\n            \"category_id\": null,\n            \"barcode\": null,\n            \"created_at\": \"\",\n            \"updated_at\": \"\"\n        }\"#;\n        let p: Product = serde_json::from_str(json).unwrap();\n        assert_eq!(p.sku.as_str(), \"COFFEE\");\n        assert_eq!(p.name, \"Espresso\");\n        assert_eq!(p.price.minor_units, 350);\n        assert_eq!(p.price.currency, usd());\n    }\n\n    #[test]\n    fn serde_deserialize_rejects_empty_sku() {\n        let json = r#\"{\n            \"id\": \"abc\",\n            \"sku\": \"\",\n            \"name\": \"Espresso\",\n            \"price\": { \"minor_units\": 350, \"currency\": \"USD\" },\n            \"category_id\": null,\n            \"barcode\": null,\n            \"created_at\": \"\",\n            \"updated_at\": \"\"\n        }\"#;\n        let result: Result\u003cProduct, _\u003e = serde_json::from_str(json);\n        assert!(result.is_err(), \"empty SKU should fail deserialization\");\n    }\n\n    #[test]\n    fn sku_serializes_as_bare_string() {\n        let p = Product::new(\"COFFEE\", \"Espresso\", test_price());\n        let json = serde_json::to_string(\u0026p).unwrap();\n        // Sku field should be \"COFFEE\", not {\"0\": \"COFFEE\"} or similar.\n        assert!(json.contains(r#\"\"sku\":\"COFFEE\"\"#), \"unexpected JSON: {json}\");\n    }\n}\n","traces":[{"line":60,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":61,"address":[],"length":0,"stats":{"Line":1945555039024054272}},{"line":62,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":65,"address":[],"length":0,"stats":{"Line":1729382256910270464}},{"line":66,"address":[],"length":0,"stats":{"Line":1729382256910270464}},{"line":71,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":72,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":78,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":79,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":80,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":85,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":86,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":87,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":100,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":101,"address":[],"length":0,"stats":{"Line":2377900603251621888}},{"line":104,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":105,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":106,"address":[],"length":0,"stats":{"Line":720575940379279360}}],"covered":18,"coverable":18},{"path":["C:","\\","My Script","oz-pos","crates","oz-core","src","sale.rs"],"content":"//! Sale domain type — the transaction lifecycle.\n//!\n//! A [`Sale`] represents a completed or in-progress point-of-sale\n//! transaction. It is built from a [`Cart`] via [`Sale::from_cart`],\n//! progresses through a state machine (`Pending → Active → Completed |\n//! Voided`), and maps 1:1 to the `sales` / `sale_lines` tables\n//! (migration `001_sales.sql`).\n\nuse serde::{Deserialize, Serialize};\n\nuse crate::{Cart, Currency, Money};\n\n/// The lifecycle state of a sale./// \n/// ```text\n/// Pending ──→ Active ──→ Completed\n///               │\n///               └──→ Voided\n/// ```\n///\n/// `Completed` and `Voided` are terminal — no further transitions are\n/// allowed from either state.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\n#[serde(rename_all = \"kebab-case\")]\npub enum SaleStatus {\n    /// Sale has been created but not yet started.\n    Pending,\n    /// Sale is in progress (items being scanned, cart open).\n    Active,\n    /// Sale has been paid and finalised.\n    Completed,\n    /// Sale has been cancelled.\n    Voided,\n}\n\nimpl SaleStatus {\n    /// Returns `true` when no further transitions are allowed.\n    pub fn is_terminal(self) -\u003e bool {\n        matches!(self, Self::Completed | Self::Voided)\n    }\n\n    /// Canonical string representation for database storage (kebab-case).\n    pub fn as_stored_str(self) -\u003e \u0026'static str {\n        match self {\n            Self::Pending =\u003e \"pending\",\n            Self::Active =\u003e \"active\",\n            Self::Completed =\u003e \"completed\",\n            Self::Voided =\u003e \"voided\",\n        }\n    }\n\n    /// Parse a status from its stored string representation.\n    pub fn from_stored_str(s: \u0026str) -\u003e Option\u003cSelf\u003e {\n        match s {\n            \"pending\" =\u003e Some(Self::Pending),\n            \"active\" =\u003e Some(Self::Active),\n            \"completed\" =\u003e Some(Self::Completed),\n            \"voided\" =\u003e Some(Self::Voided),\n            _ =\u003e None,\n        }\n    }\n\n    /// Check whether a transition from `from` to `to` is valid by the\n    /// state machine rules (without needing a full `Sale` instance).\n    pub fn can_transition_to(from: Self, to: Self) -\u003e bool {\n        matches!(\n            (from, to),\n            (Self::Pending, Self::Active)\n                | (Self::Active, Self::Completed)\n                | (Self::Active, Self::Voided)\n        )\n    }\n}\n\n/// Error returned when an invalid state transition is attempted.\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct InvalidTransition {\n    /// The state before the attempted transition.\n    pub from: SaleStatus,\n    /// The state that was requested.\n    pub to: SaleStatus,\n}\n\nimpl std::fmt::Display for InvalidTransition {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        write!(\n            f,\n            \"cannot transition from {:?} to {:?}\",\n            self.from, self.to\n        )\n    }\n}\n\nimpl std::error::Error for InvalidTransition {}\n\n/// A single line item within a sale.\n///\n/// # Schema mapping\n///\n/// Consolidates the `sale_lines` table columns (`unit_minor` +\n/// `currency` → `unit_price: Money`, `line_minor` + `currency` →\n/// `line_total: Money`). The database layer handles the mapping.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct SaleLine {\n    /// Internal row id (UUID v4).\n    pub id: String,\n\n    /// FK to `sales.id`.\n    pub sale_id: String,\n\n    /// The product SKU at time of sale.\n    pub sku: String,\n\n    /// Quantity sold (≥ 1).\n    pub qty: i64,\n\n    /// Unit price at time of sale (in minor units).\n    pub unit_price: Money,\n\n    /// Line total: `unit_price * qty` (in minor units).\n    pub line_total: Money,\n\n    /// Ordinal position of this line within the sale (1-indexed).\n    pub line_position: i64,\n}\n\n/// A point-of-sale transaction with line items and a state machine.\n///\n/// # Schema mapping\n///\n/// Maps to the `sales` table (migrations `001_sales.sql` +\n/// `004_sale_status.sql`). The `total` field consolidates `total_minor`\n/// + `currency` into a [`Money`]. Lines are stored in `sale_lines`.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct Sale {\n    /// Internal row id (UUID v4).\n    pub id: String,\n\n    /// Current state of the sale.\n    pub status: SaleStatus,\n\n    /// Grand total, computed from lines.\n    pub total: Money,\n\n    /// Number of line items.\n    pub line_count: i64,\n\n    /// Currency for all monetary values in this sale.\n    pub currency: Currency,\n\n    /// ISO-8601 creation timestamp.\n    pub created_at: String,\n\n    /// ISO-8601 timestamp of the last state transition.\n    pub updated_at: String,\n\n    /// Line items in positional order.\n    pub lines: Vec\u003cSaleLine\u003e,\n}\n\nimpl Sale {\n    /// Create a new sale from a [`Cart`].\n    ///\n    /// Converts every [`CartLine`] into a [`SaleLine`], computes the\n    /// grand total, and sets `status = Pending`. Timestamps are left\n    /// empty for the database layer to fill in.\n    ///\n    /// # Returns\n    ///\n    /// `None` if the cart's total overflows `i64` (cart is corrupt).\n    pub fn from_cart(cart: \u0026Cart) -\u003e Option\u003cSelf\u003e {\n        let id = uuid::Uuid::new_v4().to_string();\n        let total = cart.total()?;\n        let currency = cart.currency();\n        let line_count = cart.line_count() as i64;\n\n        let lines: Vec\u003cSaleLine\u003e = cart\n            .lines()\n            .iter()\n            .enumerate()\n            .map(|(i, cl)| {\n                let line_total = cl.total()?;\n                Some(SaleLine {\n                    id: uuid::Uuid::new_v4().to_string(),\n                    sale_id: id.clone(),\n                    sku: cl.sku.as_str().to_owned(),\n                    qty: cl.qty,\n                    unit_price: cl.unit_price,\n                    line_total,\n                    line_position: (i as i64) + 1,\n                })\n            })\n            .collect::\u003cOption\u003cVec\u003c_\u003e\u003e\u003e()?;\n\n        Some(Self {\n            id,\n            status: SaleStatus::Pending,\n            total,\n            line_count,\n            currency,\n            created_at: String::new(),\n            updated_at: String::new(),\n            lines,\n        })\n    }\n\n    /// Transition to a new state.\n    ///\n    /// # Valid transitions\n    ///\n    /// | From      | To          |\n    /// |-----------|-------------|\n    /// | Pending   | Active      |\n    /// | Active    | Completed   |\n    /// | Active    | Voided      |\n    ///\n    /// All other transitions return `Err(InvalidTransition)`.\n    pub fn transition_to(\n        \u0026mut self,\n        to: SaleStatus,\n    ) -\u003e Result\u003c(), InvalidTransition\u003e {\n        let from = self.status;\n        let valid = matches!(\n            (from, to),\n            (SaleStatus::Pending, SaleStatus::Active)\n                | (SaleStatus::Active, SaleStatus::Completed)\n                | (SaleStatus::Active, SaleStatus::Voided)\n        );\n\n        if valid {\n            self.status = to;\n            Ok(())\n        } else {\n            Err(InvalidTransition { from, to })\n        }\n    }\n\n    /// True when the sale cannot be modified further.\n    pub fn is_terminal(\u0026self) -\u003e bool {\n        self.status.is_terminal()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::Sku;\n\n    fn usd() -\u003e crate::Currency {\n        \"USD\".parse().unwrap()\n    }\n\n    fn price(minor: i64) -\u003e Money {\n        Money {\n            minor_units: minor,\n            currency: usd(),\n        }\n    }\n\n    fn make_cart() -\u003e Cart {\n        use crate::CartLine;\n        let mut cart = Cart::new(usd());\n        cart.add_line(CartLine::new(Sku::new(\"COFFEE\"), 2, price(350)))\n            .unwrap();\n        cart.add_line(CartLine::new(Sku::new(\"BAGEL\"), 1, price(450)))\n            .unwrap();\n        cart\n    }\n\n    // ── Construction ─────────────────────────────────────────────\n\n    #[test]\n    fn from_cart_builds_sale() {\n        let cart = make_cart();\n        let sale = Sale::from_cart(\u0026cart).unwrap();\n        assert_eq!(sale.status, SaleStatus::Pending);\n        assert_eq!(sale.total.minor_units, 1150); // 2×350 + 1×450\n        assert_eq!(sale.currency, usd());\n        assert_eq!(sale.line_count, 2);\n        assert_eq!(sale.lines.len(), 2);\n    }\n\n    #[test]\n    fn from_cart_lines_have_correct_positions() {\n        let cart = make_cart();\n        let sale = Sale::from_cart(\u0026cart).unwrap();\n        assert_eq!(sale.lines[0].line_position, 1);\n        assert_eq!(sale.lines[1].line_position, 2);\n    }\n\n    #[test]\n    fn from_cart_lines_link_to_sale() {\n        let cart = make_cart();\n        let sale = Sale::from_cart(\u0026cart).unwrap();\n        for line in \u0026sale.lines {\n            assert_eq!(line.sale_id, sale.id);\n        }\n    }\n\n    #[test]\n    fn from_cart_empty_returns_some() {\n        let cart = Cart::new(usd());\n        let sale = Sale::from_cart(\u0026cart).unwrap();\n        assert_eq!(sale.line_count, 0);\n        assert_eq!(sale.total.minor_units, 0);\n    }\n\n    #[test]\n    fn from_cart_preserves_timestamps_empty() {\n        let cart = make_cart();\n        let sale = Sale::from_cart(\u0026cart).unwrap();\n        assert!(sale.created_at.is_empty());\n        assert!(sale.updated_at.is_empty());\n    }\n\n    // ── State machine ────────────────────────────────────────────\n\n    #[test]\n    fn pending_to_active() {\n        let cart = make_cart();\n        let mut sale = Sale::from_cart(\u0026cart).unwrap();\n        assert!(sale.transition_to(SaleStatus::Active).is_ok());\n        assert_eq!(sale.status, SaleStatus::Active);\n    }\n\n    #[test]\n    fn pending_to_completed_rejected() {\n        let cart = make_cart();\n        let mut sale = Sale::from_cart(\u0026cart).unwrap();\n        let err = sale.transition_to(SaleStatus::Completed).unwrap_err();\n        assert_eq!(err.from, SaleStatus::Pending);\n        assert_eq!(err.to, SaleStatus::Completed);\n        assert_eq!(sale.status, SaleStatus::Pending); // unchanged\n    }\n\n    #[test]\n    fn active_to_completed() {\n        let cart = make_cart();\n        let mut sale = Sale::from_cart(\u0026cart).unwrap();\n        sale.transition_to(SaleStatus::Active).unwrap();\n        assert!(sale.transition_to(SaleStatus::Completed).is_ok());\n        assert_eq!(sale.status, SaleStatus::Completed);\n    }\n\n    #[test]\n    fn active_to_voided() {\n        let cart = make_cart();\n        let mut sale = Sale::from_cart(\u0026cart).unwrap();\n        sale.transition_to(SaleStatus::Active).unwrap();\n        assert!(sale.transition_to(SaleStatus::Voided).is_ok());\n        assert_eq!(sale.status, SaleStatus::Voided);\n    }\n\n    #[test]\n    fn completed_is_terminal() {\n        let cart = make_cart();\n        let mut sale = Sale::from_cart(\u0026cart).unwrap();\n        sale.transition_to(SaleStatus::Active).unwrap();\n        sale.transition_to(SaleStatus::Completed).unwrap();\n        assert!(sale.is_terminal());\n        assert!(sale.transition_to(SaleStatus::Voided).is_err());\n        assert!(sale.transition_to(SaleStatus::Active).is_err());\n    }\n\n    #[test]\n    fn voided_is_terminal() {\n        let cart = make_cart();\n        let mut sale = Sale::from_cart(\u0026cart).unwrap();\n        sale.transition_to(SaleStatus::Active).unwrap();\n        sale.transition_to(SaleStatus::Voided).unwrap();\n        assert!(sale.is_terminal());\n        assert!(sale.transition_to(SaleStatus::Completed).is_err());\n    }\n\n    #[test]\n    fn self_transition_is_always_invalid() {\n        let cart = make_cart();\n        let mut sale = Sale::from_cart(\u0026cart).unwrap();\n        assert!(sale.transition_to(SaleStatus::Pending).is_err());\n    }\n\n    // ── Serde ────────────────────────────────────────────────────\n\n    #[test]\n    fn serde_roundtrip() {\n        let cart = make_cart();\n        let sale = Sale::from_cart(\u0026cart).unwrap();\n        let json = serde_json::to_string(\u0026sale).unwrap();\n        let back: Sale = serde_json::from_str(\u0026json).unwrap();\n        assert_eq!(back, sale);\n    }\n\n    #[test]\n    fn status_serializes_as_kebab_case() {\n        let json = serde_json::to_string(\u0026SaleStatus::Pending).unwrap();\n        assert_eq!(json, \"\\\"pending\\\"\");\n        let json = serde_json::to_string(\u0026SaleStatus::Active).unwrap();\n        assert_eq!(json, \"\\\"active\\\"\");\n    }\n\n    // ── SaleLine totals ──────────────────────────────────────────\n\n    #[test]\n    fn sale_line_total_matches_unit_times_qty() {\n        let cart = make_cart();\n        let sale = Sale::from_cart(\u0026cart).unwrap();\n        let coffee = \u0026sale.lines[0];\n        assert_eq!(coffee.unit_price.minor_units, 350);\n        assert_eq!(coffee.qty, 2);\n        assert_eq!(coffee.line_total.minor_units, 700);\n    }\n\n    #[test]\n    fn grand_total_matches_sum_of_lines() {\n        let cart = make_cart();\n        let sale = Sale::from_cart(\u0026cart).unwrap();\n        let sum: i64 = sale.lines.iter().map(|l| l.line_total.minor_units).sum();\n        assert_eq!(sale.total.minor_units, sum);\n    }\n}\n","traces":[{"line":37,"address":[],"length":0,"stats":{"Line":144115188075855873}},{"line":38,"address":[],"length":0,"stats":{"Line":144115188075855873}},{"line":42,"address":[],"length":0,"stats":{"Line":1441151880758558720}},{"line":43,"address":[],"length":0,"stats":{"Line":1441151880758558720}},{"line":44,"address":[],"length":0,"stats":{"Line":1008806316530991104}},{"line":45,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":46,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":52,"address":[],"length":0,"stats":{"Line":1513209474796486656}},{"line":53,"address":[],"length":0,"stats":{"Line":1513209474796486656}},{"line":54,"address":[],"length":0,"stats":{"Line":2377900603251621888}},{"line":55,"address":[],"length":0,"stats":{"Line":1080863910568919040}},{"line":56,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":57,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"length":0,"stats":{"Line":0}},{"line":64,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":65,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":66,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":84,"address":[],"length":0,"stats":{"Line":0}},{"line":85,"address":[],"length":0,"stats":{"Line":0}},{"line":86,"address":[],"length":0,"stats":{"Line":0}},{"line":170,"address":[],"length":0,"stats":{"Line":2089670227099910144}},{"line":171,"address":[],"length":0,"stats":{"Line":6269010681299730432}},{"line":172,"address":[],"length":0,"stats":{"Line":6269010681299730432}},{"line":173,"address":[],"length":0,"stats":{"Line":6269010681299730432}},{"line":174,"address":[],"length":0,"stats":{"Line":4179340454199820288}},{"line":176,"address":[],"length":0,"stats":{"Line":6269010681299730432}},{"line":180,"address":[],"length":0,"stats":{"Line":5548434740920451072}},{"line":181,"address":[],"l gth":0,"stats":{"Line":288230376151711744}}],"covered":50,"coverable":56},{"path":["C:","\\","My Script","oz-pos","crates","oz-core","src","settings.rs"],"content":"//! Settings store — typed access to the `settings` key-value table.\n//!\n//! The [`Settings`] module provides read/write helpers for the\n//! `settings` table (migration `002_products.sql`). All methods take\n//! a `\u0026rusqlite::Connection` so callers control transaction boundaries.\n//!\n//! Feature flags are loaded/saved via [`FeatureRegistry`]'s\n//! `to_settings_rows` / `from_settings_rows` methods. The settings\n//! store is the bridge: it reads all rows from SQLite, extracts the\n//! `feature.*` subset for the registry, and writes them back.\n\nuse rusqlite::{Connection, params};\n\nuse crate::error::CoreError;\nuse crate::features::FeatureRegistry;\n\n/// Typed access to the `settings` table.\npub struct Settings;\n\n// ── Raw key-value helpers ────────────────────────────────────────────\n\nimpl Settings {\n    /// Read a single setting by key. Returns `None` if the key doesn't exist.\n    pub fn get(conn: \u0026Connection, key: \u0026str) -\u003e Result\u003cOption\u003cString\u003e, CoreError\u003e {\n        let mut stmt = conn.prepare(\"SELECT value FROM settings WHERE key = ?1\")?;\n        let mut rows = stmt.query_map(params![key], |row| row.get::\u003c_, String\u003e(0))?;\n        match rows.next() {\n            Some(Ok(v)) =\u003e Ok(Some(v)),\n            Some(Err(e)) =\u003e Err(e.into()),\n            None =\u003e Ok(None),\n        }\n    }\n\n    /// Insert or update a setting. The `updated_at` timestamp is set\n    /// by SQLite's DEFAULT expression.\n    pub fn set(conn: \u0026Connection, key: \u0026str, value: \u0026str) -\u003e Result\u003c(), CoreError\u003e {\n        conn.execute(\n            \"INSERT INTO settings (key, value) VALUES (?1, ?2)\n             ON CONFLICT(key) DO UPDATE SET value = excluded.value,\n                                            updated_at = strftime('%Y-%m-%dT%H:%M:%fZ', 'now')\",\n            params![key, value],\n        )?;\n        Ok(())\n    }\n\n    /// Delete a setting. Returns `true` if the key existed.\n    pub fn remove(conn: \u0026Connection, key: \u0026str) -\u003e Result\u003cbool, CoreError\u003e {\n        let n = conn.execute(\"DELETE FROM settings WHERE key = ?1\", params![key])?;\n        Ok(n \u003e 0)\n    }\n\n    /// Load every row from the `settings` table as `(key, value)` pairs.\n    pub fn load_all(conn: \u0026Connection) -\u003e Result\u003cVec\u003c(String, String)\u003e, CoreError\u003e {\n        let mut stmt = conn.prepare(\"SELECT key, value FROM settings ORDER BY key\")?;\n        let rows = stmt.query_map([], |row| {\n            Ok((row.get::\u003c_, String\u003e(0)?, row.get::\u003c_, String\u003e(1)?))\n        })?;\n        rows.map(|r| Ok(r?)).collect()\n    }\n\n    /// Write multiple settings inside a single transaction.\n    pub fn set_batch(\n        conn: \u0026Connection,\n        rows: \u0026[(String, String)],\n    ) -\u003e Result\u003c(), CoreError\u003e {\n        let tx = conn.unchecked_transaction()?;\n        for (key, value) in rows {\n            tx.execute(\n                \"INSERT INTO settings (key, value) VALUES (?1, ?2)\n                 ON CONFLICT(key) DO UPDATE SET value = excluded.value,\n                                                updated_at = strftime('%Y-%m-%dT%H:%M:%fZ', 'now')\",\n                params![key, value],\n            )?;\n        }\n        tx.commit()?;\n        Ok(())\n    }\n}\n\n// ── Feature flags ─────────────────────────────────────────────────────\n\nimpl Settings {\n    /// Load the feature flag registry from the `settings` table.\n    pub fn load_features(conn: \u0026Connection) -\u003e Result\u003cFeatureRegistry, CoreError\u003e {\n        let rows = Self::load_all(conn)?;\n        Ok(FeatureRegistry::from_settings_rows(\u0026rows))\n    }\n\n    /// Save the feature flag registry to the `settings` table.\n    ///\n    /// Writes all feature rows in a single transaction. Old feature rows\n    /// that are no longer enabled are **not** pruned — call\n    /// [`Settings::prune_stale_features`] to clean them up.\n    pub fn save_features(\n        conn: \u0026Connection,\n        reg: \u0026FeatureRegistry,\n    ) -\u003e Result\u003c(), CoreError\u003e {\n        let rows = reg.to_settings_rows();\n        Self::set_batch(conn, \u0026rows)\n    }\n\n    /// Remove stale feature rows (keys starting with `\"feature.\"` whose\n    /// value is `\"1\"`) that are not present in `reg`. Returns the number\n    /// of pruned rows.\n    pub fn prune_stale_features(\n        conn: \u0026Connection,\n        reg: \u0026FeatureRegistry,\n    ) -\u003e Result\u003cusize, CoreError\u003e {\n        let enabled_keys: std::collections::HashSet\u003cString\u003e = reg\n            .to_settings_rows()\n            .into_iter()\n            .map(|(k, _)| k)\n            .collect();\n\n        let all_features = Self::load_all(conn)?\n            .into_iter()\n            .filter(|(k, _)| k.starts_with(\"feature.\"))\n            .filter(|(k, _)| !enabled_keys.contains(k));\n\n        let mut removed = 0;\n        for (key, _) in all_features {\n            Self::remove(conn, \u0026key)?;\n            removed += 1;\n        }\n        Ok(removed)\n    }\n}\n\n// ── Typed store configuration ─────────────────────────────────────────\n\n/// Well-known settings keys for store configuration.\npub mod keys {\n    /// Store display name. Default: `\"OZ-POS Store\"`.\n    pub const STORE_NAME: \u0026str = \"store.name\";\n    /// Store street address (printed on receipts).\n    pub const STORE_ADDRESS: \u0026str = \"store.address\";\n    /// Store tax / VAT registration number.\n    pub const STORE_TAX_ID: \u0026str = \"store.tax_id\";\n    /// Default ISO-4217 currency code. Default: `\"USD\"`.\n    pub const DEFAULT_CURRENCY: \u0026str = \"store.default_currency\";\n    /// Store preset name (e.g., `\"simple-retail\"`, `\"restaurant\"`).\n    pub const STORE_PRESET: \u0026str = \"store.preset\";\n    /// Whether the Setup Wizard has been completed.\n    pub const SETUP_COMPLETE: \u0026str = \"store.setup_complete\";\n\n    // ── Receipt display settings ───────────────────────────────────\n    /// Show currency symbol prefix on amounts. `\"1\"` or `\"0\"`. Default `\"0\"`.\n    pub const RECEIPT_SHOW_CURRENCY: \u0026str = \"receipt.show_currency\";\n    /// Decimal separator style: `\"dot\"`, `\"comma\"`, or `\"none\"`. Default `\"dot\"`.\n    pub const RECEIPT_DECIMAL_SEP: \u0026str = \"receipt.decimal_separator\";\n    /// Show tax line on receipts. `\"1\"` or `\"0\"`. Default `\"1\"`.\n    pub const RECEIPT_SHOW_TAX: \u0026str = \"receipt.show_tax\";\n    /// Receipt footer text. Empty string means no footer.\n    pub const RECEIPT_FOOTER: \u0026str = \"receipt.footer\";\n    /// Paper width: `\"standard\"` (80 mm) or `\"narrow\"` (58 mm). Default `\"standard\"`.\n    pub const RECEIPT_PAPER_WIDTH: \u0026str = \"receipt.paper_width\";\n}\n\nimpl Settings {\n    /// Get the store display name.\n    pub fn get_store_name(conn: \u0026Connection) -\u003e Result\u003cOption\u003cString\u003e, CoreError\u003e {\n        Self::get(conn, keys::STORE_NAME)\n    }\n\n    /// Set the store display name.\n    pub fn set_store_name(conn: \u0026Connection, name: \u0026str) -\u003e Result\u003c(), CoreError\u003e {\n        Self::set(conn, keys::STORE_NAME, name)\n    }\n\n    /// Get the store address (printed on receipts).\n    pub fn get_store_address(conn: \u0026Connection) -\u003e Result\u003cOption\u003cString\u003e, CoreError\u003e {\n        Self::get(conn, keys::STORE_ADDRESS)\n    }\n\n    /// Set the store address.\n    pub fn set_store_address(conn: \u0026Connection, addr: \u0026str) -\u003e Result\u003c(), CoreError\u003e {\n        Self::set(conn, keys::STORE_ADDRESS, addr)\n    }\n\n    /// Get the store tax / VAT registration number.\n    pub fn get_store_tax_id(conn: \u0026Connection) -\u003e Result\u003cOption\u003cString\u003e, CoreError\u003e {\n        Self::get(conn, keys::STORE_TAX_ID)\n    }\n\n    /// Set the store tax / VAT registration number.\n    pub fn set_store_tax_id(conn: \u0026Connection, id: \u0026str) -\u003e Result\u003c(), CoreError\u003e {\n        Self::set(conn, keys::STORE_TAX_ID, id)\n    }\n\n    /// Get the default currency code (ISO-4217).\n    pub fn get_default_currency(conn: \u0026Connection) -\u003e Result\u003cOption\u003cString\u003e, CoreError\u003e {\n        Self::get(conn, keys::DEFAULT_CURRENCY)\n    }\n\n    /// Set the default currency code.\n    pub fn set_default_currency(conn: \u0026Connection, code: \u0026str) -\u003e Result\u003c(), CoreError\u003e {\n        Self::set(conn, keys::DEFAULT_CURRENCY, code)\n    }\n\n    // ── Receipt display settings ───────────────────────────────────\n\n    /// Whether to show the currency symbol prefix on receipt amounts.\n    pub fn get_receipt_show_currency(conn: \u0026Connection) -\u003e Result\u003cbool, CoreError\u003e {\n        Ok(Self::get(conn, keys::RECEIPT_SHOW_CURRENCY)?\n            .as_deref()\n            .unwrap_or(\"0\")\n            == \"1\")\n    }\n\n    /// Set whether to show the currency symbol prefix.\n    pub fn set_receipt_show_currency(conn: \u0026Connection, on: bool) -\u003e Result\u003c(), CoreError\u003e {\n        Self::set(conn, keys::RECEIPT_SHOW_CURRENCY, if on { \"1\" } else { \"0\" })\n    }\n\n    /// Decimal separator style: `\"dot\"`, `\"comma\"`, or `\"none\"`.\n    pub fn get_receipt_decimal_separator(conn: \u0026Connection) -\u003e Result\u003cString, CoreError\u003e {\n        Ok(Self::get(conn, keys::RECEIPT_DECIMAL_SEP)?\n            .unwrap_or_else(|| \"dot\".into()))\n    }\n\n    /// Set the decimal separator style.\n    pub fn set_receipt_decimal_separator(conn: \u0026Connection, val: \u0026str) -\u003e Result\u003c(), CoreError\u003e {\n        Self::set(conn, keys::RECEIPT_DECIMAL_SEP, val)\n    }\n\n    /// Whether to show the tax line on receipts.\n    pub fn get_receipt_show_tax(conn: \u0026Connection) -\u003e Result\u003cbool, CoreError\u003e {\n        Ok(Self::get(conn, keys::RECEIPT_SHOW_TAX)?\n            .as_deref()\n            .unwrap_or(\"1\")\n            == \"1\")\n    }\n\n    /// Set whether to show the tax line.\n    pub fn set_receipt_show_tax(conn: \u0026Connection, on: bool) -\u003e Result\u003c(), CoreError\u003e {\n        Self::set(conn, keys::RECEIPT_SHOW_TAX, if on { \"1\" } else { \"0\" })\n    }\n\n    /// Get the receipt footer text (empty = no footer).\n    pub fn get_receipt_footer(conn: \u0026Connection) -\u003e Result\u003cString, CoreError\u003e {\n        Ok(Self::get(conn, keys::RECEIPT_FOOTER)?.unwrap_or_default())\n    }\n\n    /// Set the receipt footer text.\n    pub fn set_receipt_footer(conn: \u0026Connection, text: \u0026str) -\u003e Result\u003c(), CoreError\u003e {\n        Self::set(conn, keys::RECEIPT_FOOTER, text)\n    }\n\n    /// Paper width: `\"standard\"` (80 mm) or `\"narrow\"` (58 mm).\n    pub fn get_receipt_paper_width(conn: \u0026Connection) -\u003e Result\u003cString, CoreError\u003e {\n        Ok(Self::get(conn, keys::RECEIPT_PAPER_WIDTH)?\n            .unwrap_or_else(|| \"standard\".into()))\n    }\n\n    /// Set the paper width.\n    pub fn set_receipt_paper_width(conn: \u0026Connection, val: \u0026str) -\u003e Result\u003c(), CoreError\u003e {\n        Self::set(conn, keys::RECEIPT_PAPER_WIDTH, val)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::migrations;\n    use crate::Feature;\n\n    fn fresh() -\u003e Connection {\n        let mut conn = Connection::open_in_memory().unwrap();\n        conn.pragma_update(None, \"foreign_keys\", \"ON\").unwrap();\n        migrations::run(\u0026mut conn).unwrap();\n        conn\n    }\n\n    // ── Raw get / set / remove ───────────────────────────────────\n\n    #[test]\n    fn get_returns_none_for_missing_key() {\n        let conn = fresh();\n        assert_eq!(Settings::get(\u0026conn, \"nope\").unwrap(), None);\n    }\n\n    #[test]\n    fn set_and_get_roundtrip() {\n        let conn = fresh();\n        Settings::set(\u0026conn, \"test.key\", \"hello\").unwrap();\n        assert_eq!(Settings::get(\u0026conn, \"test.key\").unwrap(), Some(\"hello\".into()));\n    }\n\n    #[test]\n    fn set_overwrites_existing() {\n        let conn = fresh();\n        Settings::set(\u0026conn, \"k\", \"v1\").unwrap();\n        Settings::set(\u0026conn, \"k\", \"v2\").unwrap();\n        assert_eq!(Settings::get(\u0026conn, \"k\").unwrap(), Some(\"v2\".into()));\n    }\n\n    #[test]\n    fn remove_existing_key() {\n        let conn = fresh();\n        Settings::set(\u0026conn, \"k\", \"v\").unwrap();\n        assert!(Settings::remove(\u0026conn, \"k\").unwrap());\n        assert_eq!(Settings::get(\u0026conn, \"k\").unwrap(), None);\n    }\n\n    #[test]\n    fn remove_missing_key_returns_false() {\n        let conn = fresh();\n        assert!(!Settings::remove(\u0026conn, \"nope\").unwrap());\n    }\n\n    // ── Batch ────────────────────────────────────────────────────\n\n    #[test]\n    fn set_batch_inserts_multiple() {\n        let conn = fresh();\n        let rows: Vec\u003c(String, String)\u003e = vec![\n            (\"a\".into(), \"1\".into()),\n            (\"b\".into(), \"2\".into()),\n        ];\n        Settings::set_batch(\u0026conn, \u0026rows).unwrap();\n        assert_eq!(Settings::get(\u0026conn, \"a\").unwrap(), Some(\"1\".into()));\n        assert_eq!(Settings::get(\u0026conn, \"b\").unwrap(), Some(\"2\".into()));\n    }\n\n    #[test]\n    fn load_all_returns_all_rows() {\n        let conn = fresh();\n        Settings::set(\u0026conn, \"a\", \"1\").unwrap();\n        Settings::set(\u0026conn, \"b\", \"2\").unwrap();\n        let all = Settings::load_all(\u0026conn).unwrap();\n        assert_eq!(all.len(), 2);\n        assert!(all.contains(\u0026(\"a\".into(), \"1\".into())));\n        assert!(all.contains(\u0026(\"b\".into(), \"2\".into())));\n    }\n\n    // ── Feature flags ────────────────────────────────────────────\n\n    #[test]\n    fn load_features_from_empty_db() {\n        let conn = fresh();\n        let reg = Settings::load_features(\u0026conn).unwrap();\n        assert_eq!(reg.count(), 0);\n    }\n\n    #[test]\n    fn save_and_load_features_roundtrip() {\n        let conn = fresh();\n        let reg = FeatureRegistry::simple_retail();\n        Settings::save_features(\u0026conn, \u0026reg).unwrap();\n        let loaded = Settings::load_features(\u0026conn).unwrap();\n        assert_eq!(loaded, reg);\n    }\n\n    #[test]\n    fn save_features_preserves_non_feature_settings() {\n        let conn = fresh();\n        Settings::set_store_name(\u0026conn, \"My Store\").unwrap();\n        Settings::set_default_currency(\u0026conn, \"IDR\").unwrap();\n\n        let reg = FeatureRegistry::simple_retail();\n        Settings::save_features(\u0026conn, \u0026reg).unwrap();\n\n        // Non-feature settings still there.\n        assert_eq!(\n            Settings::get_store_name(\u0026conn).unwrap(),\n            Some(\"My Store\".into())\n        );\n        assert_eq!(\n            Settings::get_default_currency(\u0026conn).unwrap(),\n            Some(\"IDR\".into())\n        );\n    }\n\n    #[test]\n    fn prune_stale_features_removes_old_flags() {\n        let conn = fresh();\n        let reg = FeatureRegistry::simple_retail();\n        let rows = reg.to_settings_rows();\n\n        // Write feature rows directly, including a stale one.\n        let mut all_rows = rows.clone();\n        all_rows.push((\"feature.old-flag\".into(), \"1\".into()));\n        Settings::set_batch(\u0026conn, \u0026all_rows).unwrap();\n\n        // Prune against the current registry.\n        let removed = Settings::prune_stale_features(\u0026conn, \u0026reg).unwrap();\n        assert_eq!(removed, 1);\n        // Load back — should match simple_retail.\n        let loaded = Settings::load_features(\u0026conn).unwrap();\n        assert_eq!(loaded, reg);\n    }\n\n    #[test]\n    fn prune_stale_features_noop_when_no_stale() {\n        let conn = fresh();\n        let reg = FeatureRegistry::simple_retail();\n        Settings::save_features(\u0026conn, \u0026reg).unwrap();\n\n        let removed = Settings::prune_stale_features(\u0026conn, \u0026reg).unwrap();\n        assert_eq!(removed, 0);\n        // Registry unchanged.\n        let loaded = Settings::load_features(\u0026conn).unwrap();\n        assert_eq!(loaded, reg);\n    }\n\n    #[test]\n    fn prune_stale_features_empty_registry_removes_all() {\n        let conn = fresh();\n        let reg = FeatureRegistry::simple_retail();\n        Settings::save_features(\u0026conn, \u0026reg).unwrap();\n\n        let empty_reg = FeatureRegistry::new();\n        let removed = Settings::prune_stale_features(\u0026conn, \u0026empty_reg).unwrap();\n        assert_eq!(removed, reg.count());\n\n        let loaded = Settings::load_features(\u0026conn).unwrap();\n        assert_eq!(loaded.count(), 0);\n    }\n\n    #[test]\n    fn prune_stale_features_preserves_non_feature_keys() {\n        let conn = fresh();\n        Settings::set_store_name(\u0026conn, \"My Store\").unwrap();\n        Settings::set_default_currency(\u0026conn, \"EUR\").unwrap();\n\n        // Write one feature flag that will be pruned.\n        let reg = FeatureRegistry::simple_retail();\n        Settings::save_features(\u0026conn, \u0026reg).unwrap();\n\n        // Now prune with a different registry (restaurant) — only feature\n        // rows that differ should be removed; store.name and default_currency\n        // should survive.\n        let restaurant = FeatureRegistry::restaurant();\n        let removed = Settings::prune_stale_features(\u0026conn, \u0026restaurant).unwrap();\n        assert!(removed \u003e 0);\n\n        assert_eq!(\n            Settings::get_store_name(\u0026conn).unwrap(),\n            Some(\"My Store\".into())\n        );\n        assert_eq!(\n            Settings::get_default_currency(\u0026conn).unwrap(),\n            Some(\"EUR\".into())\n        );\n    }\n\n    #[test]\n    fn prune_stale_features_multiple_stale() {\n        let conn = fresh();\n        // Write a bunch of stale feature flags.\n        let stale_rows: Vec\u003c(String, String)\u003e = vec![\n            (\"feature.old-1\".into(), \"1\".into()),\n            (\"feature.old-2\".into(), \"1\".into()),\n            (\"feature.old-3\".into(), \"1\".into()),\n            (\"feature.old-4\".into(), \"1\".into()),\n            (\"feature.old-5\".into(), \"1\".into()),\n        ];\n        Settings::set_batch(\u0026conn, \u0026stale_rows).unwrap();\n\n        let reg = FeatureRegistry::simple_retail();\n        let removed = Settings::prune_stale_features(\u0026conn, \u0026reg).unwrap();\n        assert_eq!(removed, 5);\n    }\n\n    // ── save_features edge cases ─────────────────────────────────\n\n    #[test]\n    fn save_features_empty_registry() {\n        let conn = fresh();\n        let reg = FeatureRegistry::new();\n        Settings::save_features(\u0026conn, \u0026reg).unwrap();\n\n        let loaded = Settings::load_features(\u0026conn).unwrap();\n        assert_eq!(loaded.count(), 0);\n    }\n\n    #[test]\n    fn save_features_overwrites_shared_keys() {\n        let conn = fresh();\n\n        // Save simple retail.\n        let retail = FeatureRegistry::simple_retail();\n        Settings::save_features(\u0026conn, \u0026retail).unwrap();\n\n        // Overwrite with restaurant — shared keys (e.g. cash-payment,\n        // receipt-printing) are upserted, but retail-only keys\n        // (simple-retail, barcode-scanning) are NOT removed.\n        let restaurant = FeatureRegistry::restaurant();\n        Settings::save_features(\u0026conn, \u0026restaurant).unwrap();\n\n        let loaded = Settings::load_features(\u0026conn).unwrap();\n\n        // Restaurant features are present.\n        assert!(loaded.is_enabled(Feature::Restaurant));\n        assert!(loaded.is_enabled(Feature::CashPayment));\n        assert!(loaded.is_enabled(Feature::DiscountEngine));\n\n        // Stale retail-only keys are still present because\n        // save_features does NOT prune.\n        assert!(loaded.is_enabled(Feature::SimpleRetail));\n        assert!(loaded.is_enabled(Feature::BarcodeScanning));\n\n        // After pruning, stale keys are gone and only restaurant remains.\n        Settings::prune_stale_features(\u0026conn, \u0026restaurant).unwrap();\n        let loaded = Settings::load_features(\u0026conn).unwrap();\n        assert!(!loaded.is_enabled(Feature::SimpleRetail));\n        assert!(!loaded.is_enabled(Feature::BarcodeScanning));\n        assert!(loaded.is_enabled(Feature::Restaurant));\n        assert_eq!(loaded, restaurant);\n    }\n\n    #[test]\n    fn save_features_idempotent() {\n        let conn = fresh();\n        let reg = FeatureRegistry::simple_retail();\n\n        // Save twice.\n        Settings::save_features(\u0026conn, \u0026reg).unwrap();\n        Settings::save_features(\u0026conn, \u0026reg).unwrap();\n\n        let loaded = Settings::load_features(\u0026conn).unwrap();\n        assert_eq!(loaded, reg);\n        assert_eq!(loaded.count(), reg.count());\n    }\n\n    #[test]\n    fn save_features_stale_rows_remain_until_pruned() {\n        let conn = fresh();\n        let reg = FeatureRegistry::simple_retail();\n\n        // Write a stale feature row with a KNOWN key that isn't in\n        // simple_retail (card-payment). This will be picked up by\n        // load_features because from_settings_rows parses known keys.\n        Settings::set(\u0026conn, \"feature.card-payment\", \"1\").unwrap();\n\n        // Save features does NOT prune — stale rows stay.\n        Settings::save_features(\u0026conn, \u0026reg).unwrap();\n\n        let loaded = Settings::load_features(\u0026conn).unwrap();\n        // card-payment is not in simple_retail, so count = reg + 1.\n        assert_eq!(loaded.count(), reg.count() + 1);\n        assert!(loaded.is_enabled(Feature::CardPayment));\n\n        // After pruning, card-payment is removed.\n        Settings::prune_stale_features(\u0026conn, \u0026reg).unwrap();\n        let loaded = Settings::load_features(\u0026conn).unwrap();\n        assert_eq!(loaded, reg);\n        assert!(!loaded.is_enabled(Feature::CardPayment));\n    }\n\n    // ── Batch edge cases ─────────────────────────────────────────\n\n    #[test]\n    fn set_batch_empty_vec() {\n        let conn = fresh();\n        Settings::set_batch(\u0026conn, \u0026[]).unwrap();\n        // No crash, no rows.\n        assert_eq!(Settings::load_all(\u0026conn).unwrap().len(), 0);\n    }\n\n    #[test]\n    fn set_batch_overwrites_existing_keys() {\n        let conn = fresh();\n        Settings::set(\u0026conn, \"k\", \"old\").unwrap();\n\n        let rows = vec![(\"k\".into(), \"new\".into())];\n        Settings::set_batch(\u0026conn, \u0026rows).unwrap();\n\n        assert_eq!(Settings::get(\u0026conn, \"k\").unwrap(), Some(\"new\".into()));\n    }\n\n    // ── Typed store config ───────────────────────────────────────\n\n    #[test]\n    fn store_name_default_is_none() {\n        let conn = fresh();\n        assert_eq!(Settings::get_store_name(\u0026conn).unwrap(), None);\n    }\n\n    #[test]\n    fn set_and_get_store_name() {\n        let conn = fresh();\n        Settings::set_store_name(\u0026conn, \"Acme POS\").unwrap();\n        assert_eq!(\n            Settings::get_store_name(\u0026conn).unwrap(),\n            Some(\"Acme POS\".into())\n        );\n    }\n\n    #[test]\n    fn set_and_get_default_currency() {\n        let conn = fresh();\n        Settings::set_default_currency(\u0026conn, \"EUR\").unwrap();\n        assert_eq!(\n            Settings::get_default_currency(\u0026conn).unwrap(),\n            Some(\"EUR\".into())\n        );\n    }\n\n    #[test]\n    fn remove_idempotent() {\n        let conn = fresh();\n        Settings::set(\u0026conn, \"k\", \"v\").unwrap();\n        assert!(Settings::remove(\u0026conn, \"k\").unwrap());\n        assert!(!Settings::remove(\u0026conn, \"k\").unwrap());\n    }\n}\n","traces":[{"line":24,"address":[],"length":0,"stats":{"Line":2738188573441261568}},{"line":25,"address":[],"length":0,"stats":{"Line":10952754293765046272}},{"line":26,"address":[],"length":0,"stats":{"Line":15132094747964866560}},{"line":27,"address":[],"length":0,"stats":{"Line":5476377146882523136}},{"line":28,"address":[],"length":0,"stats":{"Line":4179340454199820288}},{"line":29,"address":[],"length":0,"stats":{"Line":0}},{"line":30,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":36,"address":[],"length":0,"stats":{"Line":2954361355555045376}},{"line":37,"address":[],"length":0,"stats":{"Line":5908722711110090752}},{"line":41,"address":[],"length":0,"stats":{"Line":2954361355555045376}},{"line":43,"address":[],"length":0,"stats":{"Line":2954361355555045376}},{"line":47,"address":[],"length":0,"stats":{"Line":1873497444986126336}},{"line":48,"address":[],"length":0,"stats":{"Line":9367487224930631680}},{"line":49,"address":[],"length":0,"stats":{"Line":1873497444986126336}},{"line":53,"address":[],"length":0,"stats":{"Line":2882303761517117440}},{"line":54,"address":[],"length":0,"stats":{"Line":11529215046068469760}},{"line":55,"address":[],"length":0,"stats":{"Line":13186539708940812288}},{"line":56,"address":[],"length":0,"stats":{"Line":6629298651489370112}},{"line":58,"address":[],"length":0,"stats":{"Line":10304235947423694848}},{"line":62,"address":[],"length":0,"stats":{"Line":2089670227099910144}},{"line":66,"address":[],"length":0,"stats":{"Line":6269010681299730432}},{"line":67,"address":[],"length":0,"stats":{"Line":5836665117072162816}},{"line":68,"address":[],"length":0,"stats":{"Line":14843864371813154816}},{"line":72,"address":[],"length":0,"stats":{"Line":11096869481840902144}},{"line":75,"add
