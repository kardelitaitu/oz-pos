# Compilation caching for OZ-POS local development.
#
# After installing sccache, run the one-time setup script:
#   powershell -File scripts/setup-cache.ps1   # Windows
#   bash scripts/setup-cache.sh                 # Linux / macOS

[build]
# sccache wraps rustc and caches compiled artifacts on disk.
# A cold `cargo check --workspace` drops from ~22s to ~0.6s on the
# second run (38x speedup on a 32-thread dev machine).
# CI also uses sccache via RUSTC_WRAPPER env var in .github/workflows/.
rustc-wrapper = "sccache"

# ------------------------------------------------------------------
# Fast linkers (local dev only)
# ------------------------------------------------------------------
# Uncomment the [target] sections below after installing the linker.
# One-time install:
#   sudo apt install mold        # Debian / Ubuntu
#   brew install llvm            # macOS -- then add to PATH
#
# [target.x86_64-unknown-linux-gnu]
# linker = "mold"
#
# [target.x86_64-apple-darwin]
# linker = "ld64.lld"
#
# [target.aarch64-apple-darwin]
# linker = "ld64.lld"
