# ── OZ-POS E2E Test Stack — Docker Compose ───────────────────────────
#
# Lightweight backend for end-to-end tests.  Starts the cloud server
# with SQLite (no PostgreSQL needed for testing) and the license server.
# Redis is included for cache-dependent integration tests.
#
# Usage:
#   docker compose -f docker-compose.e2e.yml up -d
#   cd ui && npm run dev &
#   cd ui && npx playwright test --config e2e/playwright.config.ts
#   docker compose -f docker-compose.e2e.yml down -v
#
# Environment:
#   OZ_API_SECRET    — JWT secret (default: e2e-test-secret)
#   OZ_API_PORT      — Cloud server port (default: 3099)

services:

  # ── Cloud Server ──────────────────────────────────────────────────
  e2e-cloud-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3099:3099"
    environment:
      OZ_DB_PATH: /data/e2e-test.db
      OZ_API_PORT: "3099"
      RUST_LOG: "warn"
      OZ_API_SECRET: "${OZ_API_SECRET:-e2e-test-secret}"
      # SQLite default — no DATABASE_URL needed.
      REDIS_URL: "redis://e2e-redis:6379"
    volumes:
      - e2e_cloud_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://localhost:3099/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      e2e-redis:
        condition: service_healthy

  # ── License Server ───────────────────────────────────────────────
  e2e-license-server:
    build:
      context: ./apps/license-server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      OZ_LICENSE_PRIVATE_KEY: "${OZ_LICENSE_PRIVATE_KEY:-}"
    volumes:
      - e2e_pb_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "/pb/healthcheck", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Redis Cache ──────────────────────────────────────────────────
  e2e-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  e2e_cloud_data:
  e2e_pb_data:
